/* ══════════════════════════════════════════════
   FORMULA ENGINE
══════════════════════════════════════════════ */
const FormulaEngine = {
  // Parse cell reference like "A1" → {col:0, row:0}
  parseRef(ref) {
    const m = ref.trim().toUpperCase().match(/^([A-Z]+)(\d+)$/);
    if (!m) return null;
    let col = 0;
    for (let i = 0; i < m[1].length; i++) col = col * 26 + m[1].charCodeAt(i) - 64;
    col -= 1;
    return { col, row: parseInt(m[2]) - 1 };
  },
  // Parse range like "A1:C3" → array of {col,row}
  parseRange(range) {
    const parts = range.trim().split(':');
    if (parts.length !== 2) return null;
    const s = this.parseRef(parts[0]);
    const e = this.parseRef(parts[1]);
    if (!s || !e) return null;
    const cells = [];
    for (let r = Math.min(s.row, e.row); r <= Math.max(s.row, e.row); r++)
      for (let c = Math.min(s.col, e.col); c <= Math.max(s.col, e.col); c++)
        cells.push({ row: r, col: c });
    return cells;
  },
  // Resolve a reference (single cell or range) to numeric values
  resolveValues(token, rows, depth) {
    if (depth > 10) return [];
    if (token.includes(':')) {
      const cells = this.parseRange(token);
      if (!cells) return [];
      return cells.map(({ row, col }) => {
        const v = rows[row]?.[col] ?? '';
        return this.evalCell(String(v), rows, depth + 1);
      }).filter(v => v !== null && v !== '' && !isNaN(Number(v))).map(Number);
    }
    const ref = this.parseRef(token);
    if (!ref) return [];
    const v = rows[ref.row]?.[ref.col] ?? '';
    const ev = this.evalCell(String(v), rows, depth + 1);
    return [Number(ev)].filter(n => !isNaN(n));
  },
  // Evaluate a cell value (handles formulas)
  evalCell(raw, rows, depth = 0) {
    if (!raw || typeof raw !== 'string') return raw;
    if (!raw.startsWith('=')) return raw;
    if (depth > 20) return '#REF!';
    try {
      return this.evalFormula(raw.slice(1).trim(), rows, depth);
    } catch (e) {
      return '#ERR!';
    }
  },
  evalFormula(expr, rows, depth) {
    // Tokenize and evaluate
    const up = expr.toUpperCase();
    // Functions
    const fnMatch = up.match(/^([A-Z]+)\((.*)\)$/s);
    if (fnMatch) {
      const fn = fnMatch[1];
      const args = this.splitArgs(fnMatch[2]);
      return this.evalFn(fn, args, rows, depth);
    }
    // Arithmetic with cell refs — substitute refs with values
    const substituted = expr.replace(/[A-Z]+\d+/gi, (ref) => {
      const r = this.parseRef(ref);
      if (!r) return ref;
      const v = rows[r.row]?.[r.col] ?? '0';
      const ev = this.evalCell(String(v), rows, depth + 1);
      return isNaN(Number(ev)) ? '0' : Number(ev);
    });
    // Safe arithmetic eval using Function
    if (/^[\d\s\+\-\*\/\(\)\.\%]+$/.test(substituted)) {
      // eslint-disable-next-line no-new-func
      const result = Function('"use strict"; return (' + substituted + ')')();
      return isFinite(result) ? (Number.isInteger(result) ? result : parseFloat(result.toFixed(10))) : '#DIV/0!';
    }
    // String literal
    if (/^".*"$/.test(expr)) return expr.slice(1, -1);
    // Bare cell ref
    const ref = this.parseRef(expr.trim());
    if (ref) {
      const v = rows[ref.row]?.[ref.col] ?? '';
      return this.evalCell(String(v), rows, depth + 1);
    }
    return '#NAME?';
  },
  splitArgs(str) {
    const args = []; let depth = 0; let cur = '';
    for (const ch of str) {
      if (ch === '(' ) depth++;
      else if (ch === ')') depth--;
      else if (ch === ',' && depth === 0) { args.push(cur.trim()); cur = ''; continue; }
      cur += ch;
    }
    if (cur.trim()) args.push(cur.trim());
    return args;
  },
  evalFn(fn, args, rows, depth) {
    const nums = (argList) => argList.flatMap(a => {
      if (a.includes(':') || /^[A-Z]+\d+$/i.test(a)) return this.resolveValues(a, rows, depth + 1);
      const ev = this.evalFormula(a, rows, depth + 1);
      return isNaN(Number(ev)) ? [] : [Number(ev)];
    });
    const strVal = (a) => {
      if (/^".*"$/.test(a)) return a.slice(1, -1);
      const ref = this.parseRef(a.trim());
      if (ref) return String(rows[ref.row]?.[ref.col] ?? '');
      return String(this.evalFormula(a, rows, depth + 1) ?? '');
    };
    switch (fn) {
      case 'SUM': { const vs = nums(args); return vs.length ? vs.reduce((a, b) => a + b, 0) : 0; }
      case 'AVERAGE': case 'AVG': { const vs = nums(args); return vs.length ? vs.reduce((a, b) => a + b, 0) / vs.length : '#DIV/0!'; }
      case 'MIN': { const vs = nums(args); return vs.length ? Math.min(...vs) : 0; }
      case 'MAX': { const vs = nums(args); return vs.length ? Math.max(...vs) : 0; }
      case 'COUNT': { return nums(args).length; }
      case 'COUNTA': { return args.flatMap(a => this.resolveValues(a, rows, depth + 1)).filter(v => v !== '').length; }
      case 'ROUND': { const [v, d] = args; return parseFloat(Number(this.evalFormula(v, rows, depth + 1)).toFixed(Number(this.evalFormula(d, rows, depth + 1)) || 0)); }
      case 'ABS': return Math.abs(Number(this.evalFormula(args[0], rows, depth + 1)));
      case 'SQRT': return Math.sqrt(Number(this.evalFormula(args[0], rows, depth + 1)));
      case 'POWER': case 'POW': return Math.pow(Number(this.evalFormula(args[0], rows, depth + 1)), Number(this.evalFormula(args[1], rows, depth + 1)));
      case 'IF': {
        const cond = this.evalFormula(args[0], rows, depth + 1);
        const truthy = (cond === true || (typeof cond === 'string' && cond.toUpperCase() === 'TRUE') || Number(cond) !== 0);
        return truthy ? this.evalFormula(args[1] || '', rows, depth + 1) : this.evalFormula(args[2] || '0', rows, depth + 1);
      }
      case 'AND': return args.every(a => { const v = this.evalFormula(a, rows, depth + 1); return v === true || (typeof v === 'string' && v.toUpperCase() === 'TRUE') || Number(v) !== 0; });
      case 'OR': return args.some(a => { const v = this.evalFormula(a, rows, depth + 1); return v === true || (typeof v === 'string' && v.toUpperCase() === 'TRUE') || Number(v) !== 0; });
      case 'NOT': { const v = this.evalFormula(args[0], rows, depth + 1); return !(v === true || (typeof v === 'string' && v.toUpperCase() === 'TRUE') || Number(v) !== 0); }
      case 'CONCATENATE': case 'CONCAT': return args.map(a => strVal(a)).join('');
      case 'LEN': return String(strVal(args[0])).length;
      case 'LEFT': return String(strVal(args[0])).slice(0, Number(this.evalFormula(args[1] || '1', rows, depth + 1)));
      case 'RIGHT': { const s = String(strVal(args[0])); const n = Number(this.evalFormula(args[1] || '1', rows, depth + 1)); return s.slice(s.length - n); }
      case 'MID': { const s = String(strVal(args[0])); const st = Number(this.evalFormula(args[1], rows, depth + 1)) - 1; const n = Number(this.evalFormula(args[2], rows, depth + 1)); return s.slice(st, st + n); }
      case 'UPPER': return String(strVal(args[0])).toUpperCase();
      case 'LOWER': return String(strVal(args[0])).toLowerCase();
      case 'TRIM': return String(strVal(args[0])).trim();
      case 'TEXT': { const v = Number(this.evalFormula(args[0], rows, depth + 1)); return isNaN(v) ? '#VALUE!' : v.toLocaleString('es-ES'); }
      case 'VALUE': return Number(strVal(args[0]));
      case 'TODAY': return new Date().toLocaleDateString('es-ES');
      case 'NOW': return new Date().toLocaleString('es-ES');
      case 'YEAR': return new Date(strVal(args[0])).getFullYear();
      case 'MONTH': return new Date(strVal(args[0])).getMonth() + 1;
      case 'DAY': return new Date(strVal(args[0])).getDate();
      case 'ISNUMBER': { const v = this.evalFormula(args[0], rows, depth + 1); return !isNaN(Number(v)) && v !== ''; }
      case 'ISBLANK': { const ref = this.parseRef(args[0].trim()); if (!ref) return false; return (rows[ref.row]?.[ref.col] ?? '') === ''; }
      case 'VLOOKUP': {
        const lookup = String(strVal(args[0]));
        const range = args[1];
        const colIdx = Number(this.evalFormula(args[2], rows, depth + 1)) - 1;
        if (!range.includes(':')) return '#N/A';
        const cells = this.parseRange(range);
        if (!cells) return '#N/A';
        const minCol = Math.min(...cells.map(c => c.col));
        const rowNums = [...new Set(cells.map(c => c.row))];
        for (const r of rowNums) {
          const firstVal = String(rows[r]?.[minCol] ?? '');
          if (firstVal.toUpperCase() === lookup.toUpperCase()) {
            return rows[r]?.[minCol + colIdx] ?? '#N/A';
          }
        }
        return '#N/A';
      }
      default: return '#NAME?';
    }
  },
  // Format display value
  formatDisplay(raw, rows) {
    if (!raw || typeof raw !== 'string') return String(raw ?? '');
    if (!raw.startsWith('=')) return raw;
    const result = this.evalCell(raw, rows, 0);
    if (result === null || result === undefined) return '';
    if (typeof result === 'boolean') return result ? 'TRUE' : 'FALSE';
    const num = Number(result);
    if (!isNaN(num) && result !== '') {
      if (Number.isInteger(num)) return String(num);
      return parseFloat(num.toFixed(8)).toString();
    }
    return String(result);
  }
};

/* ── SHEET EDITOR ────────────────────────────── */
function SheetEditor({doc, onChange}) {
  const INIT_ROWS = 30;
  const INIT_COLS = 12;
  const [sheets, setSheets] = useState(() => {
    if (doc.sheets && doc.sheets.length > 0) return doc.sheets;
    const defaultRows = doc.rows && doc.rows.length > 0 ? doc.rows : Array.from({length: INIT_ROWS}, () => Array(INIT_COLS).fill(''));
    const defaultCols = doc.cols && doc.cols.length > 0 ? doc.cols : Array.from({length: INIT_COLS}, (_, i) => String.fromCharCode(65 + i));
    return [{ id: 'sh1', name: 'Hoja 1', rows: defaultRows, cols: defaultCols }];
  });
  const [activeSheet, setActiveSheet] = useState(0);
  const [selCell, setSelCell] = useState({row: 0, col: 0});
  const [editCell, setEditCell] = useState(null); // {row, col}
  const [editVal, setEditVal] = useState('');
  const [formulaVal, setFormulaVal] = useState('');
  const [selRange, setSelRange] = useState(null); // {start, end}
  const [isSelecting, setIsSelecting] = useState(false);
  const [ctxMenu, setCtxMenu] = useState(null);
  const [showCF, setShowCF] = useState(false);
  const [showChart, setShowChart] = useState(false);
  const editRef = useRef(null);
  const containerRef = useRef(null);
  const sheetRef = useRef(null);

  const sheet = sheets[activeSheet] || sheets[0];
  const rows = sheet.rows;
  const cols = sheet.cols;

  // Persist sheets to doc
  useEffect(() => {
    const timer = setTimeout(() => {
      onChange({...doc, sheets, rows: sheets[0]?.rows || [], cols: sheets[0]?.cols || []});
    }, 300);
    return () => clearTimeout(timer);
  }, [sheets]);

  function updateSheet(updates) {
    setSheets(prev => prev.map((s, i) => i === activeSheet ? {...s, ...updates} : s));
  }

  function setCell(r, c, v) {
    const nr = rows.map((row, ri) => ri === r ? row.map((cell, ci) => ci === c ? v : cell) : row);
    updateSheet({rows: nr});
  }

  function getCellRef(r, c) {
    return String.fromCharCode(65 + c) + (r + 1);
  }

  function startEdit(r, c) {
    const raw = rows[r]?.[c] ?? '';
    setEditCell({row: r, col: c});
    setEditVal(raw);
    setFormulaVal(raw);
    setTimeout(() => editRef.current?.focus(), 0);
  }

  function commitEdit() {
    if (!editCell) return;
    setCell(editCell.row, editCell.col, editVal);
    setEditCell(null);
  }

  function cancelEdit() {
    setEditCell(null);
    setEditVal('');
  }

  // Expand grid if needed
  function ensureSize(r, c) {
    let newRows = [...rows];
    let newCols = [...cols];
    while (newRows.length <= r) newRows.push(Array(newCols.length).fill(''));
    while (newCols.length <= c) { newCols.push(String.fromCharCode(65 + newCols.length)); newRows = newRows.map(row => [...row, '']); }
    if (newRows !== rows || newCols !== cols) updateSheet({rows: newRows, cols: newCols});
  }

  function handleCellKeyDown(e) {
    const {row, col} = editCell || selCell;
    if (!editCell) {
      if (e.key === 'Enter' || (e.key.length === 1 && !e.ctrlKey && !e.metaKey)) {
        e.preventDefault();
        if (e.key === 'Enter') startEdit(row, col);
        else { startEdit(row, col); setEditVal(e.key); setFormulaVal(e.key); }
        return;
      }
      if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); setCell(row, col, ''); return; }
      if (e.key === 'Tab') { e.preventDefault(); const nc = col + (e.shiftKey ? -1 : 1); if (nc >= 0) { ensureSize(row, nc); setSelCell({row, col: nc}); } return; }
      if (e.key === 'ArrowRight') { e.preventDefault(); ensureSize(row, col + 1); setSelCell({row, col: col + 1}); return; }
      if (e.key === 'ArrowLeft') { e.preventDefault(); if (col > 0) setSelCell({row, col: col - 1}); return; }
      if (e.key === 'ArrowDown') { e.preventDefault(); ensureSize(row + 1, col); setSelCell({row: row + 1, col}); return; }
      if (e.key === 'ArrowUp') { e.preventDefault(); if (row > 0) setSelCell({row: row - 1, col}); return; }
      if (e.key === 'F2') { e.preventDefault(); startEdit(row, col); return; }
      if ((e.ctrlKey || e.metaKey) && e.key === 'c') {
        const v = rows[row]?.[col] ?? '';
        navigator.clipboard?.writeText(v).catch(() => {});
        showToast('Copiado ✓');
        return;
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'v') {
        e.preventDefault();
        navigator.clipboard?.readText().then(text => { if (text) setCell(row, col, text.trim()); }).catch(() => {});
        return;
      }
    } else {
      if (e.key === 'Escape') { e.preventDefault(); cancelEdit(); return; }
      if (e.key === 'Enter') { e.preventDefault(); commitEdit(); ensureSize(row + 1, col); setSelCell({row: row + 1, col}); return; }
      if (e.key === 'Tab') { e.preventDefault(); commitEdit(); const nc = col + (e.shiftKey ? -1 : 1); if (nc >= 0) { ensureSize(row, nc); setSelCell({row, col: nc}); } return; }
    }
  }

  function handleFormulaKeyDown(e) {
    if (e.key === 'Enter') { e.preventDefault(); if (editCell) { setEditVal(formulaVal); setTimeout(() => commitEdit(), 0); } }
    if (e.key === 'Escape') { cancelEdit(); }
  }

  function handleCtxMenu(e, r, c) {
    e.preventDefault();
    setCtxMenu({ x: e.clientX, y: e.clientY, row: r, col: c });
  }

  useEffect(() => {
    if (ctxMenu) {
      const h = () => setCtxMenu(null);
      document.addEventListener('click', h);
      return () => document.removeEventListener('click', h);
    }
  }, [ctxMenu]);

  function addRowBelow(r) {
    const nr = [...rows];
    nr.splice(r + 1, 0, Array(cols.length).fill(''));
    updateSheet({rows: nr});
    setCtxMenu(null);
  }
  function deleteRow(r) {
    if (rows.length <= 1) return;
    updateSheet({rows: rows.filter((_, i) => i !== r)});
    setCtxMenu(null);
  }
  function addColRight(c) {
    const nc = [...cols];
    nc.splice(c + 1, 0, String.fromCharCode(65 + c + 1));
    const nr = rows.map(row => { const r2 = [...row]; r2.splice(c + 1, 0, ''); return r2; });
    updateSheet({rows: nr, cols: nc});
    setCtxMenu(null);
  }
  function deleteCol(c) {
    if (cols.length <= 1) return;
    updateSheet({rows: rows.map(row => row.filter((_, i) => i !== c)), cols: cols.filter((_, i) => i !== c)});
    setCtxMenu(null);
  }
  function clearCell(r, c) {
    setCell(r, c, '');
    setCtxMenu(null);
  }
  function addSheet() {
    const n = sheets.length + 1;
    setSheets(prev => [...prev, {id: 'sh'+Date.now(), name: `Hoja ${n}`, rows: Array.from({length: INIT_ROWS}, () => Array(INIT_COLS).fill('')), cols: Array.from({length: INIT_COLS}, (_, i) => String.fromCharCode(65 + i))}]);
    setActiveSheet(sheets.length);
  }
  function removeSheet(idx) {
    if (sheets.length <= 1) { showToast('Necesitas al menos una hoja', 'error'); return; }
    setSheets(prev => prev.filter((_, i) => i !== idx));
    setActiveSheet(Math.max(0, idx - 1));
  }

  // Import CSV or XLSX
  function importFile() {
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = '.csv,.tsv,.txt,.xlsx,.xls';
    inp.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const ext = file.name.split('.').pop().toLowerCase();
      if (ext === 'xlsx' || ext === 'xls') {
        importXLSX(file, (data) => {
          updateSheet({rows: data.rows, cols: data.cols});
          showToast(`XLSX importado: ${data.rows.length} filas · ${data.cols.length} columnas ✓`);
        }, (err) => showToast('Error importando XLSX: ' + err, 'error'));
      } else {
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const parsed = parseCSVRobust(ev.target.result);
            if (!parsed.rows.length) { showToast('Archivo vacío o inválido', 'error'); return; }
            updateSheet({rows: parsed.rows, cols: parsed.cols});
            showToast(`Importado: ${parsed.rows.length} filas ✓`);
          } catch (err) { showToast('Error al parsear archivo', 'error'); }
        };
        reader.readAsText(file, 'UTF-8');
      }
    };
    inp.click();
  }

  function exportCSV() {
    const csvRows = [cols.join(','), ...rows.map(row => row.map(cell => {
      const v = FormulaEngine.formatDisplay(String(cell ?? ''), rows);
      if (v.includes(',') || v.includes('"') || v.includes('\n')) return `"${v.replace(/"/g, '""')}"`;
      return v;
    }).join(','))];
    const blob = new Blob([csvRows.join('\n')], {type: 'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = (doc.name || 'hoja') + '.csv';
    a.click(); URL.revokeObjectURL(url);
    showToast('CSV exportado ✓');
  }

  const selRef = selCell ? getCellRef(selCell.row, selCell.col) : 'A1';
  const currentRaw = selCell ? (rows[selCell.row]?.[selCell.col] ?? '') : '';

  return (
    <div className="sheet-outer" tabIndex={0} onKeyDown={handleCellKeyDown} ref={sheetRef} style={{outline:'none'}}>
      {/* Formula bar */}
      <div className="formula-bar">
        <input className="formula-cell-ref" value={editCell ? getCellRef(editCell.row, editCell.col) : selRef} readOnly/>
        <span style={{color:'var(--text3)',fontSize:13,fontFamily:'monospace'}}>fx</span>
        <input
          className="formula-input"
          value={editCell ? formulaVal : currentRaw}
          placeholder="Introduce un valor o fórmula (ej: =SUM(A1:A10))"
          onChange={e => { setFormulaVal(e.target.value); if (editCell) setEditVal(e.target.value); else if (selCell) startEdit(selCell.row, selCell.col); setFormulaVal(e.target.value); }}
          onKeyDown={handleFormulaKeyDown}
        />
        <span style={{fontSize:11,color:'var(--text3)',background:'var(--bg4)',padding:'2px 7px',borderRadius:4,whiteSpace:'nowrap'}}>
          {rows.length}×{cols.length}
        </span>
        <button className="toolbar-btn" style={{fontSize:11}} onClick={importFile} title="Importar CSV / XLSX">↑ Importar</button>
        <button className="toolbar-btn" style={{fontSize:11}} onClick={exportCSV} title="Exportar CSV">↓ CSV</button>
        <div className="toolbar-sep" style={{margin:'0 2px'}}/>
        <button className={`toolbar-btn${showCF?' active':''}`} style={{fontSize:11}} onClick={()=>{setShowCF(p=>!p);setShowChart(false);}} title="Formato condicional">🎨 Formato</button>
        <button className={`toolbar-btn${showChart?' active':''}`} style={{fontSize:11}} onClick={()=>{setShowChart(p=>!p);setShowCF(false);}} title="Gráfico desde datos">📊 Gráfico</button>
      </div>
      {/* CF Panel */}
      {showCF && (
        <div style={{borderBottom:'1px solid var(--border)',background:'var(--bg2)',flexShrink:0,maxHeight:280,overflow:'auto'}}>
          <ConditionalFormatPanel doc={doc} onUpdate={d=>onChange({...d,sheets})} cols={cols} onClose={()=>setShowCF(false)}/>
        </div>
      )}
      {/* Chart Panel */}
      {showChart && (
        <div style={{borderBottom:'1px solid var(--border)',background:'var(--bg2)',flexShrink:0,maxHeight:380,overflow:'auto'}}>
          <SheetChartPanel doc={doc} rows={rows} cols={cols}/>
        </div>
      )}
      {/* Sheet content */}
      <div className="sheet-container" ref={containerRef} onClick={() => containerRef.current?.focus()}>
        <table className="sheet-table" style={{borderCollapse:'collapse'}}>
          <thead>
            <tr>
              <th className="sheet-col-header" style={{width:42}}></th>
              {cols.map((c, ci) => (
                <th key={ci} className={`sheet-col-header${selCell?.col===ci?' selected':''}`}>{c}</th>
              ))}
              <th className="sheet-col-header" style={{cursor:'pointer'}} onClick={() => { const nc = cols.length; ensureSize(0, nc); }} title="Añadir columna">+</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((row, ri) => (
              <tr key={ri}>
                <td className={`sheet-row-header${selCell?.row===ri?' selected':''}`}>{ri + 1}</td>
                {row.map((cell, ci) => {
                  const isEdit = editCell?.row === ri && editCell?.col === ci;
                  const isSel = selCell?.row === ri && selCell?.col === ci;
                  const rawVal = cell ?? '';
                  const dispVal = FormulaEngine.formatDisplay(String(rawVal), rows);
                  const isFormula = String(rawVal).startsWith('=');
                  const isError = isFormula && String(dispVal).startsWith('#');
                  const isNum = !isFormula && !isNaN(Number(rawVal)) && rawVal !== '';
                  return (
                    <td
                      key={ci}
                      className={`sheet-cell${isSel ? ' selected' : ''}${isFormula && !isError ? ' formula-cell' : ''}${isError ? ' error-cell' : ''}`}
                      onClick={() => { if (!isEdit) { commitEdit(); setSelCell({row: ri, col: ci}); } }}
                      onDoubleClick={() => startEdit(ri, ci)}
                      onContextMenu={e => handleCtxMenu(e, ri, ci)}
                    >
                      {isEdit ? (
                        <input
                          ref={editRef}
                          className="cell-edit-input"
                          value={editVal}
                          onChange={e => { setEditVal(e.target.value); setFormulaVal(e.target.value); }}
                          onKeyDown={handleCellKeyDown}
                          onBlur={commitEdit}
                          autoFocus
                        />
                      ) : (
                        <div className={`cell-display${isNum || isError ? ' align-right' : ''}`}
                          style={isError ? {color:'var(--red)',fontFamily:'monospace',fontSize:11} : isFormula ? {color:'var(--teal)', ...(getCFStyle(doc.cfRules, ci, dispVal)||{})} : (getCFStyle(doc.cfRules, ci, rawVal)||{})}>
                          {dispVal}
                        </div>
                      )}
                    </td>
                  );
                })}
                <td className="sheet-cell" style={{cursor:'default',background:'transparent',border:'1px solid transparent'}}/>
              </tr>
            ))}
            <tr>
              <td className="sheet-row-header" style={{cursor:'pointer'}} onClick={() => { const nr2 = [...rows, Array(cols.length).fill('')]; updateSheet({rows: nr2}); }} title="Añadir fila">+</td>
              {cols.map((_, ci) => <td key={ci} className="sheet-cell" style={{background:'transparent',border:'1px solid transparent'}}/>)}
            </tr>
          </tbody>
        </table>
      </div>
      {/* Sheet tabs */}
      <div className="sheet-tabs-bar">
        {sheets.map((s, i) => (
          <div key={s.id} style={{display:'flex',alignItems:'center',gap:0}}>
            <button className={`sheet-tab-btn${activeSheet===i?' active':''}`} onClick={() => setActiveSheet(i)}>
              {s.name}
            </button>
            {sheets.length > 1 && activeSheet === i && (
              <button onClick={() => removeSheet(i)} style={{border:'none',background:'none',color:'var(--text3)',cursor:'pointer',fontSize:14,padding:'0 3px',lineHeight:1}} title="Eliminar hoja">×</button>
            )}
          </div>
        ))}
        <button className="sheet-add-tab" onClick={addSheet} title="Nueva hoja">+</button>
      </div>
      {/* Context menu */}
      {ctxMenu && (
        <div className="ctx-menu" style={{top: ctxMenu.y, left: ctxMenu.x}}>
          <div className="ctx-item" onClick={() => clearCell(ctxMenu.row, ctxMenu.col)}>🧹 Limpiar celda</div>
          <div className="ctx-sep"/>
          <div className="ctx-item" onClick={() => addRowBelow(ctxMenu.row)}>↓ Insertar fila abajo</div>
          <div className="ctx-item danger" onClick={() => deleteRow(ctxMenu.row)}>✕ Eliminar fila</div>
          <div className="ctx-sep"/>
          <div className="ctx-item" onClick={() => addColRight(ctxMenu.col)}>→ Insertar columna</div>
          <div className="ctx-item danger" onClick={() => deleteCol(ctxMenu.col)}>✕ Eliminar columna</div>
          <div className="ctx-sep"/>
          <div className="ctx-item" onClick={() => { const v = rows[ctxMenu.row]?.[ctxMenu.col] ?? ''; const d = FormulaEngine.formatDisplay(String(v), rows); navigator.clipboard?.writeText(d).catch(()=>{}); showToast('Copiado ✓'); setCtxMenu(null); }}>📋 Copiar</div>
        </div>
      )}
    </div>
  );
}

function parseCSVRobust(text) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  const delim = text.indexOf('\t') !== -1 ? '\t' : ',';
  function parseLine(line) {
    const cells = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (inQ) {
        if (ch === '"' && line[i+1] === '"') { cur += '"'; i++; }
        else if (ch === '"') inQ = false;
        else cur += ch;
      } else {
        if (ch === '"') inQ = true;
        else if (ch === delim) { cells.push(cur); cur = ''; }
        else cur += ch;
      }
    }
    cells.push(cur);
    return cells;
  }
  const allRows = lines.filter(l => l.trim()).map(parseLine);
  if (!allRows.length) return {rows: [], cols: []};
  const maxCols = Math.max(...allRows.map(r => r.length));
  const cols = allRows[0].map((c, i) => c.trim() || String.fromCharCode(65 + i));
  const rows = allRows.slice(1).map(r => Array.from({length: maxCols - 1}, (_, i) => r[i + 1] ?? ''));
  if (rows.length === 0) {
    // No header row — treat all as data
    return {rows: allRows.map(r => Array.from({length: maxCols}, (_, i) => r[i] ?? '')), cols: Array.from({length: maxCols}, (_, i) => String.fromCharCode(65 + i))};
  }
  return {rows, cols};
}

/* ── SLIDE EDITOR ───────────────────────────── */
function SlideEditor({doc, onChange}) {
  const [activeSlide, setActiveSlide] = useState(0);
  const [presenting, setPresenting] = useState(false);
  const slides = doc.slides && doc.slides.length > 0 ? doc.slides : [{title:'Diapositiva 1', body:'', layout:'title'}];

  function updateSlide(idx, field, val) {
    const ns = slides.map((s, i) => i === idx ? {...s, [field]: val} : s);
    onChange({...doc, slides: ns});
  }
  function addSlide() {
    const ns = [...slides, {title: `Diapositiva ${slides.length + 1}`, body: '', layout: 'content'}];
    onChange({...doc, slides: ns});
    setActiveSlide(ns.length - 1);
  }
  function dupSlide(idx) {
    const ns = [...slides.slice(0, idx + 1), {...slides[idx], title: slides[idx].title + ' (copia)'}, ...slides.slice(idx + 1)];
    onChange({...doc, slides: ns});
    setActiveSlide(idx + 1);
  }
  function delSlide(idx) {
    if (slides.length <= 1) { showToast('Necesitas al menos una diapositiva', 'error'); return; }
    const ns = slides.filter((_, i) => i !== idx);
    onChange({...doc, slides: ns});
    setActiveSlide(Math.max(0, idx - 1));
  }
  function moveSlide(from, to) {
    if (to < 0 || to >= slides.length) return;
    const ns = [...slides];
    const [item] = ns.splice(from, 1);
    ns.splice(to, 0, item);
    onChange({...doc, slides: ns});
    setActiveSlide(to);
  }
  function exportSlidesPDF() {
    const now = new Date().toLocaleDateString('es-ES', {day:'2-digit', month:'long', year:'numeric'});
    const slideHTML = slides.map((s, i) => `
      <div style="background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:36px 44px;margin-bottom:16px;page-break-inside:avoid;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
        <div style="font-size:10px;color:#bbb;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">Diapositiva ${i + 1} · ${s.layout || 'content'}</div>
        <div style="font-size:22px;font-weight:700;color:#111;margin-bottom:14px;line-height:1.2">${esc(s.title) || '<em style="color:#ccc">Sin título</em>'}</div>
        <div style="font-size:13px;color:#444;line-height:1.7;white-space:pre-wrap">${esc(s.body || '')}</div>
      </div>`).join('');
    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${esc(doc.name)}</title>
      <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Arial,sans-serif;padding:24px;background:#f8f8ff}@page{size:A4;margin:1.2cm}@media print{body{padding:0;background:white}}</style>
      </head><body>
      <div style="margin-bottom:20px;padding-bottom:12px;border-bottom:3px solid #7c6af7">
        <div style="font-size:22px;font-weight:700;color:#111">${esc(doc.name)}</div>
        <div style="font-size:11px;color:#888;margin-top:3px">${slides.length} diapositivas · ${now}</div>
      </div>
      ${slideHTML}</body></html>`;
    safeOpenPrint(html);
    showToast('PDF generado ✓');
  }

  const s = slides[activeSlide] || slides[0];
  const LAYOUTS = [{v:'title',l:'Portada'},{v:'content',l:'Contenido'},{v:'two-col',l:'Dos columnas'},{v:'blank',l:'En blanco'},{v:'quote',l:'Cita destacada'}];

  return (
    <div className="slide-editor">
      {presenting && <PresentationMode doc={doc} onClose={()=>setPresenting(false)}/>}
      {/* Slide list panel */}
      <div className="slide-list">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,padding:'0 2px'}}>
          <span style={{fontSize:11,color:'var(--text3)',fontWeight:600}}>{slides.length} diaps.</span>
          <button className="toolbar-btn" style={{fontSize:11,padding:'2px 6px'}} onClick={addSlide} title="Nueva diapositiva">+ Nueva</button>
        </div>
        {slides.map((sl, i) => (
          <div key={i} className={`slide-thumb${activeSlide === i ? ' active' : ''}`} onClick={() => setActiveSlide(i)}
            style={{background: sl.layout === 'title' ? 'linear-gradient(135deg,rgba(124,106,247,0.15),rgba(0,212,180,0.08))' : undefined}}>
            {sl.layout === 'blank' ? (
              <div style={{fontSize:10,color:'var(--text3)',fontStyle:'italic'}}>En blanco</div>
            ) : sl.layout === 'quote' ? (
              <div style={{fontSize:11,color:'var(--accent2)',fontStyle:'italic',textAlign:'center',padding:'0 4px',lineHeight:1.4}}>"{(sl.title||'').slice(0,30)}"</div>
            ) : (
              <>
                <div style={{fontSize:9,fontWeight:700,color:'var(--text)',textAlign:'center',overflow:'hidden',textOverflow:'ellipsis',padding:'0 4px',wordBreak:'break-word',lineHeight:1.3,maxHeight:32}}>{sl.title || 'Sin título'}</div>
                {sl.body && <div style={{fontSize:8,color:'var(--text3)',marginTop:3,textAlign:'center',overflow:'hidden',maxHeight:16,padding:'0 4px'}}>{sl.body.slice(0,40)}</div>}
              </>
            )}
            <div className="slide-thumb-num">{i + 1}</div>
          </div>
        ))}
      </div>

      {/* Main canvas */}
      <div className="slide-canvas">
        <div className="slide-header-bar">
          <span style={{fontSize:12,color:'var(--text3)'}}>Diapositiva {activeSlide + 1} / {slides.length}</span>
          <select className="toolbar-select" style={{width:130}} value={s.layout || 'content'} onChange={e => updateSlide(activeSlide, 'layout', e.target.value)}>
            {LAYOUTS.map(l => <option key={l.v} value={l.v}>{l.l}</option>)}
          </select>
          <div className="toolbar-sep"/>
          <button className="toolbar-btn" style={{fontSize:11}} onClick={() => moveSlide(activeSlide, activeSlide - 1)} disabled={activeSlide === 0} title="Mover arriba">↑</button>
          <button className="toolbar-btn" style={{fontSize:11}} onClick={() => moveSlide(activeSlide, activeSlide + 1)} disabled={activeSlide === slides.length - 1} title="Mover abajo">↓</button>
          <button className="toolbar-btn" style={{fontSize:11}} onClick={() => dupSlide(activeSlide)} title="Duplicar">⎘</button>
          <div style={{marginLeft:'auto',display:'flex',gap:6}}>
            <button className="btn btn-accent btn-sm" style={{fontSize:11}} onClick={()=>setPresenting(true)} title="Presentar a pantalla completa (F5)">▶ Presentar</button>
            <button className="btn btn-sm" style={{fontSize:11}} onClick={exportSlidesPDF} title="Exportar PDF">{Ic.pdf} PDF</button>
            <button className="btn btn-danger btn-sm" style={{fontSize:11}} onClick={() => delSlide(activeSlide)}>✕ Eliminar</button>
          </div>
        </div>
        <div className="slide-content">
          {s.layout === 'quote' ? (
            <>
              <div style={{textAlign:'center',fontSize:48,color:'var(--accent)',margin:'8px 0'}}>❝</div>
              <input className="slide-title-input" placeholder="Texto de la cita..." value={s.title||''} onChange={e => updateSlide(activeSlide, 'title', e.target.value)}
                style={{textAlign:'center',fontSize:22,fontStyle:'italic',borderBottom:'2px solid var(--accent)'}}/>
              <input style={{background:'transparent',border:'none',borderBottom:'1px dashed var(--border2)',color:'var(--text3)',fontSize:14,padding:'6px 0',width:'100%',outline:'none',textAlign:'center'}}
                placeholder="— Autor / Fuente" value={s.body||''} onChange={e => updateSlide(activeSlide, 'body', e.target.value)}/>
            </>
          ) : s.layout === 'blank' ? (
            <textarea className="slide-body-input" style={{flex:1,minHeight:280}} placeholder="Diapositiva en blanco — escribe libremente..." value={s.body||''} onChange={e => updateSlide(activeSlide, 'body', e.target.value)}/>
          ) : s.layout === 'two-col' ? (
            <>
              <input className="slide-title-input" placeholder="Título de la diapositiva..." value={s.title||''} onChange={e => updateSlide(activeSlide, 'title', e.target.value)}/>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,flex:1}}>
                <textarea className="slide-body-input" style={{height:'100%'}} placeholder="Columna izquierda..." value={(s.col1)||''} onChange={e => updateSlide(activeSlide, 'col1', e.target.value)}/>
                <textarea className="slide-body-input" style={{height:'100%'}} placeholder="Columna derecha..." value={(s.col2)||''} onChange={e => updateSlide(activeSlide, 'col2', e.target.value)}/>
              </div>
            </>
          ) : (
            <>
              {s.layout === 'title' && <div style={{fontSize:11,color:'var(--accent2)',fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase',marginBottom:4}}>PORTADA</div>}
              <input className="slide-title-input" placeholder={s.layout==='title'?'Título principal...':'Título de la diapositiva...'} value={s.title||''} onChange={e => updateSlide(activeSlide, 'title', e.target.value)}/>
              <textarea className="slide-body-input" placeholder="Contenido, puntos clave, notas..." value={s.body||''} onChange={e => updateSlide(activeSlide, 'body', e.target.value)} style={{flex:1}}/>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── RICH TEXT EDITOR (DOCX) ─────────────────── */
function RichTextEditor({doc, onUpdate}) {
  const editorRef = useRef(null);
  const lastDocId = useRef(null);
  const saveTimer = useRef(null);
  const [activeFormats, setActiveFormats] = useState({});
  const [wordCount, setWordCount] = useState(0);
  const [showTemplates, setShowTemplates] = useState(false);
  const [showVersions, setShowVersions] = useState(false);

  // Sync content only when doc changes (not on every keystroke)
  useEffect(() => {
    const el = editorRef.current;
    if (!el) return;
    if (lastDocId.current !== doc.id) {
      lastDocId.current = doc.id;
      el.innerHTML = doc.content || '';
      updateWordCount(el);
    }
  }, [doc.id]);

  function updateWordCount(el) {
    const text = (el || editorRef.current)?.innerText || '';
    setWordCount(text.trim() ? text.trim().split(/\s+/).length : 0);
  }

  function saveContent() {
    const el = editorRef.current;
    if (!el) return;
    const raw = el.innerHTML;
    const sanitized = sanitizeHTML(raw);
    onUpdate({...doc, content: sanitized});
  }

  function applyTemplate(tmpl) {
    const el = editorRef.current;
    if (!el) return;
    if (el.innerHTML.trim() && !confirm('¿Reemplazar el contenido actual con la plantilla?')) return;
    el.innerHTML = tmpl.content;
    lastDocId.current = null; // prevent overwrite on next sync
    saveContent();
    showToast(`Plantilla "${tmpl.name}" aplicada ✓`);
  }

  function handleInput() {
    updateWordCount();
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(saveContent, 400);
  }

  function handleKeyDown(e) {
    // Tab → insert spaces instead of losing focus
    if (e.key === 'Tab') {
      e.preventDefault();
      document.execCommand('insertHTML', false, '&nbsp;&nbsp;&nbsp;&nbsp;');
      return;
    }
    // Ctrl+B/I/U shortcuts (browser handles most, just track state)
    if ((e.ctrlKey || e.metaKey)) {
      if (e.key === 'z') { /* undo — browser handles */ updateFormatState(); }
    }
  }

  function sanitizeHTML(html) {
    const allowed = ['b','strong','i','em','u','s','strike','h1','h2','h3','h4','p','br','ul','ol','li','blockquote','pre','code','a','table','thead','tbody','tr','th','td','hr','div','span'];
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    function clean(node) {
      if (node.nodeType === 3) return; // text node
      if (node.nodeType === 1) {
        const tag = node.tagName.toLowerCase();
        if (!allowed.includes(tag)) { node.replaceWith(...node.childNodes); return; }
        // Strip dangerous attrs
        const attrs = [...node.attributes];
        for (const attr of attrs) {
          const name = attr.name.toLowerCase();
          if (name.startsWith('on') || name === 'src' && tag !== 'img') node.removeAttribute(attr.name);
          if (name === 'href') {
            const href = attr.value;
            if (href.toLowerCase().startsWith('javascript:')) node.removeAttribute('href');
          }
        }
      }
      [...node.childNodes].forEach(clean);
    }
    [...tmp.childNodes].forEach(clean);
    return tmp.innerHTML;
  }

  function exec(cmd, val = null) {
    editorRef.current?.focus();
    document.execCommand(cmd, false, val);
    setTimeout(() => { updateFormatState(); saveContent(); }, 0);
  }

  function updateFormatState() {
    setActiveFormats({
      bold: document.queryCommandState('bold'),
      italic: document.queryCommandState('italic'),
      underline: document.queryCommandState('underline'),
      strikeThrough: document.queryCommandState('strikeThrough'),
      justifyLeft: document.queryCommandState('justifyLeft'),
      justifyCenter: document.queryCommandState('justifyCenter'),
      justifyRight: document.queryCommandState('justifyRight'),
      insertUnorderedList: document.queryCommandState('insertUnorderedList'),
      insertOrderedList: document.queryCommandState('insertOrderedList'),
    });
  }

  function insertTable() {
    const rows = parseInt(prompt('Número de filas:', '3')) || 3;
    const cols = parseInt(prompt('Número de columnas:', '3')) || 3;
    let th = Array.from({length: cols}, (_, i) => `<th style="border:1px solid #444;padding:7px 12px;background:rgba(124,106,247,0.12);font-weight:600">Col ${i+1}</th>`).join('');
    let tr = Array.from({length: rows}, () => `<tr>${Array.from({length: cols}, () => `<td style="border:1px solid #444;padding:7px 12px;min-width:80px"> </td>`).join('')}</tr>`).join('');
    const tableHTML = `<table style="border-collapse:collapse;width:100%;margin:12px 0"><thead><tr>${th}</tr></thead><tbody>${tr}</tbody></table><p><br></p>`;
    exec('insertHTML', tableHTML);
  }

  function insertLink() {
    const url = prompt('URL del enlace:', 'https://');
    if (!url) return;
    const text = prompt('Texto del enlace:', url);
    exec('insertHTML', `<a href="${encodeURI(url)}" target="_blank" rel="noopener noreferrer">${esc(text || url)}</a>`);
  }

  function insertHR() { exec('insertHTML', '<hr/><p><br></p>'); }
  function insertCode() { exec('insertHTML', '<pre><code>// Tu código aquí</code></pre><p><br></p>'); }
  function insertBlockquote() { exec('formatBlock', 'blockquote'); }

  function exportDocxContent() {
    const content = editorRef.current?.innerHTML || '';
    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${esc(doc.name)}</title>
      <style>body{font-family:'Segoe UI',Arial,sans-serif;max-width:800px;margin:40px auto;padding:0 24px;color:#111;font-size:14px;line-height:1.7}
      h1{font-size:28px;font-weight:700;margin:20px 0 10px}h2{font-size:22px;font-weight:600;margin:16px 0 8px}h3{font-size:18px;font-weight:600;margin:14px 0 6px}
      table{border-collapse:collapse;width:100%;margin:12px 0}td,th{border:1px solid #ddd;padding:7px 12px}th{background:#f5f5ff;font-weight:600}
      blockquote{border-left:3px solid #7c6af7;padding:8px 16px;margin:12px 0;background:#f8f8ff;color:#555}
      code{background:#f5f5f5;padding:2px 6px;border-radius:3px;font-family:monospace;font-size:13px}
      pre{background:#f5f5f5;padding:14px;border-radius:6px;overflow-x:auto}pre code{background:none;padding:0}
      hr{border:none;border-top:1px solid #ddd;margin:16px 0}
      @page{size:A4;margin:2cm}@media print{body{max-width:100%;margin:0;padding:0}}</style>
      </head><body>
      <div style="margin-bottom:24px;padding-bottom:12px;border-bottom:2px solid #7c6af7">
        <h1 style="margin:0 0 4px">${esc(doc.name)}</h1>
        <div style="font-size:11px;color:#999">${new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'long',year:'numeric'})} · ${wordCount} palabras</div>
      </div>
      ${content}</body></html>`;
    safeOpenPrint(html);
    showToast('Documento exportado a PDF ✓');
  }

  function exportTXT() {
    const text = editorRef.current?.innerText || '';
    const blob = new Blob([text], {type: 'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = (doc.name || 'documento') + '.txt';
    a.click(); URL.revokeObjectURL(url);
    showToast('TXT exportado ✓');
  }

  function exportMarkdown() {
    // Basic HTML→Markdown
    let md = (editorRef.current?.innerHTML || '')
      .replace(/<h1[^>]*>(.*?)<\/h1>/gi, '# $1\n\n')
      .replace(/<h2[^>]*>(.*?)<\/h2>/gi, '## $1\n\n')
      .replace(/<h3[^>]*>(.*?)<\/h3>/gi, '### $1\n\n')
      .replace(/<strong[^>]*>(.*?)<\/strong>/gi, '**$1**')
      .replace(/<b[^>]*>(.*?)<\/b>/gi, '**$1**')
      .replace(/<em[^>]*>(.*?)<\/em>/gi, '*$1*')
      .replace(/<i[^>]*>(.*?)<\/i>/gi, '*$1*')
      .replace(/<u[^>]*>(.*?)<\/u>/gi, '_$1_')
      .replace(/<s[^>]*>(.*?)<\/s>/gi, '~~$1~~')
      .replace(/<a[^>]*href="([^"]*)"[^>]*>(.*?)<\/a>/gi, '[$2]($1)')
      .replace(/<li[^>]*>(.*?)<\/li>/gi, '- $1\n')
      .replace(/<br\s*\/?>/gi, '\n')
      .replace(/<p[^>]*>/gi, '').replace(/<\/p>/gi, '\n\n')
      .replace(/<[^>]+>/g, '')
      .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&nbsp;/g,' ');
    const blob = new Blob([md.trim()], {type: 'text/markdown;charset=utf-8'});
    const url = URL.createObjectURL(blob); const a = document.createElement('a');
    a.href = url; a.download = (doc.name || 'documento') + '.md'; a.click(); URL.revokeObjectURL(url);
    showToast('Markdown exportado ✓');
  }

  const TB = ({cmd, val, label, title, style={}}) => (
    <button className={`toolbar-btn${activeFormats[cmd] ? ' active' : ''}`} title={title || label}
      onMouseDown={e => { e.preventDefault(); exec(cmd, val); }} style={style}>{label}</button>
  );

  return (
    <div style={{display:'flex', flexDirection:'column', flex:1, overflow:'hidden'}}>
      <DocTemplateModal open={showTemplates} onClose={()=>setShowTemplates(false)} onSelect={applyTemplate}/>
      {/* Toolbar */}
      <div className="doc-toolbar">
        {/* History */}
        <button className="toolbar-btn" onMouseDown={e=>{e.preventDefault();exec('undo');}} title="Deshacer (Ctrl+Z)">↩</button>
        <button className="toolbar-btn" onMouseDown={e=>{e.preventDefault();exec('redo');}} title="Rehacer (Ctrl+Y)">↪</button>
        <div className="toolbar-sep"/>
        {/* Block format */}
        <select className="toolbar-select" onChange={e => { exec('formatBlock', e.target.value); e.target.value=''; }} defaultValue="">
          <option value="" disabled>Estilo</option>
          <option value="p">Párrafo</option>
          <option value="h1">Encabezado 1</option>
          <option value="h2">Encabezado 2</option>
          <option value="h3">Encabezado 3</option>
          <option value="pre">Código</option>
        </select>
        <select className="toolbar-select" style={{width:80}} onChange={e => { exec('fontSize', e.target.value); e.target.value=''; }} defaultValue="">
          <option value="" disabled>Tamaño</option>
          {[1,2,3,4,5,6,7].map(s => <option key={s} value={s}>{[10,12,14,16,18,24,36][s-1]}px</option>)}
        </select>
        <div className="toolbar-sep"/>
        {/* Basic formatting */}
        <TB cmd="bold" label={<b>B</b>} title="Negrita (Ctrl+B)"/>
        <TB cmd="italic" label={<i>I</i>} title="Cursiva (Ctrl+I)"/>
        <TB cmd="underline" label={<u>U</u>} title="Subrayado (Ctrl+U)"/>
        <TB cmd="strikeThrough" label={<s>S</s>} title="Tachado"/>
        <div className="toolbar-sep"/>
        {/* Colors */}
        <input type="color" className="toolbar-colorpicker" title="Color de texto" defaultValue="#f0f0f4"
          onChange={e => exec('foreColor', e.target.value)} style={{background:'var(--bg3)'}}/>
        <input type="color" className="toolbar-colorpicker" title="Color de fondo" defaultValue="#1c1c21"
          onChange={e => exec('hiliteColor', e.target.value)} style={{background:'rgba(124,106,247,0.3)'}}/>
        <div className="toolbar-sep"/>
        {/* Alignment */}
        <TB cmd="justifyLeft" label="⬅" title="Alinear izquierda"/>
        <TB cmd="justifyCenter" label="↔" title="Centrar"/>
        <TB cmd="justifyRight" label="➡" title="Alinear derecha"/>
        <div className="toolbar-sep"/>
        {/* Lists */}
        <TB cmd="insertUnorderedList" label="• Lista" title="Lista con viñetas"/>
        <TB cmd="insertOrderedList" label="1. Lista" title="Lista numerada"/>
        <div className="toolbar-sep"/>
        {/* Inserts */}
        <button className="toolbar-btn" onMouseDown={e=>{e.preventDefault();insertTable();}} title="Insertar tabla">⊞ Tabla</button>
        <button className="toolbar-btn" onMouseDown={e=>{e.preventDefault();insertLink();}} title="Insertar enlace">🔗 Link</button>
        <button className="toolbar-btn" onMouseDown={e=>{e.preventDefault();insertBlockquote();}} title="Cita">❝ Cita</button>
        <button className="toolbar-btn" onMouseDown={e=>{e.preventDefault();insertCode();}} title="Bloque de código">{'</>'} Código</button>
        <button className="toolbar-btn" onMouseDown={e=>{e.preventDefault();insertHR();}} title="Separador">— HR</button>
        <div className="toolbar-sep"/>
        {/* Templates & Versions */}
        <button className="toolbar-btn" onMouseDown={e=>{e.preventDefault();setShowTemplates(true);}} title="Plantillas de documentos">📄 Plantillas</button>
        <button className={`toolbar-btn${showVersions?' active':''}`} onMouseDown={e=>{e.preventDefault();setShowVersions(p=>!p);}} title="Versiones">🕐 Versiones{(doc.versions||[]).length>0?` (${doc.versions.length})`:''}</button>
        <div className="toolbar-sep"/>
        {/* Export */}
        <button className="toolbar-btn" style={{marginLeft:'auto'}} onMouseDown={e=>{e.preventDefault();exportDocxContent();}} title="Exportar PDF">{Ic.pdf} PDF</button>
        <button className="toolbar-btn" onMouseDown={e=>{e.preventDefault();exportTXT();}} title="Exportar TXT">TXT</button>
        <button className="toolbar-btn" onMouseDown={e=>{e.preventDefault();exportMarkdown();}} title="Exportar Markdown">MD</button>
      </div>
      {/* Word count bar */}
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'3px 12px',background:'var(--bg3)',borderBottom:'1px solid var(--border)',fontSize:11,color:'var(--text3)',flexShrink:0}}>
        <span>{wordCount} palabras</span>
        {(doc.versions||[]).length>0 && <span style={{color:'var(--accent2)'}}>🕐 {doc.versions.length} versión(es) guardada(s)</span>}
        <span style={{marginLeft:'auto',fontSize:10}}>Ctrl+B Negrita · Ctrl+I Cursiva · Ctrl+U Subrayado · Tab Sangría</span>
      </div>
      {/* Main area: editor + optional versions panel */}
      <div style={{display:'flex',flex:1,overflow:'hidden',minHeight:0}}>
        {/* Editor */}
        <div
          ref={editorRef}
          className="doc-body"
          contentEditable
          suppressContentEditableWarning
          data-placeholder="Comienza a escribir tu documento... Usa la barra de herramientas o atajos de teclado (Ctrl+B, Ctrl+I, Ctrl+U)"
        onInput={handleInput}
        onKeyDown={handleKeyDown}
        onKeyUp={updateFormatState}
        onMouseUp={updateFormatState}
        onFocus={updateFormatState}
        spellCheck={true}
        style={{flex:1}}
      />
        {showVersions && (
          <DocVersionPanel doc={doc} onUpdate={onUpdate} onClose={()=>setShowVersions(false)}/>

  );
}

/* ── PROCESADOR DE TEXTOS MAIN ─────────────── */
function DocumentProcessor() {
  const [store, setStore] = useStore();
  const documents = store.documents || [];
  const [activeDoc, setActiveDoc] = useState(null);
  const [exportOpen, setExportOpen] = useState(false);
  const [showNewMenu, setShowNewMenu] = useState(false);
  const [importOpen, setImportOpen] = useState(false);
  const menuRef = useRef(null);

  // Auto-select first doc
  useEffect(() => {
    if (documents.length > 0 && !activeDoc) setActiveDoc(documents[0].id);
    if (documents.length > 0 && activeDoc && !documents.find(d => d.id === activeDoc)) setActiveDoc(documents[0].id);
  }, [documents.length]);

  // Close new menu on outside click
  useEffect(() => {
    if (!showNewMenu) return;
    const h = e => { if (menuRef.current && !menuRef.current.contains(e.target)) setShowNewMenu(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, [showNewMenu]);

  function addDoc(type) {
    const names = {xlsx:'Nueva Hoja', docx:'Nuevo Documento', pptx:'Nueva Presentación', csv:'Nuevo CSV', access:'Nueva Base de Datos'};
    const newDoc = {
      id: uid(), name: names[type] || 'Nuevo', type,
      created_at: new Date().toISOString(),
      content: '', rows: [], cols: [], slides: [{title:'Diapositiva 1', body:'', layout:'title'}], sheets: null,
      // Access DB fields
      accessTables: type === 'access' ? [] : undefined,
      accessQueries: type === 'access' ? [] : undefined,
      accessForms: type === 'access' ? [] : undefined,
    };
    setStore(s => ({...s, documents: [...(s.documents || []), newDoc]}));
    setActiveDoc(newDoc.id);
    setShowNewMenu(false);
    showToast(`${names[type]} creado ✓`);
  }

  function removeDoc(id, e) {
    e.stopPropagation();
    if (!confirm('¿Eliminar este documento?')) return;
    setStore(s => ({...s, documents: (s.documents || []).filter(d => d.id !== id)}));
    if (activeDoc === id) setActiveDoc(documents.filter(d => d.id !== id)[0]?.id || null);
  }

  function updateDoc(updated) {
    setStore(s => ({...s, documents: (s.documents || []).map(d => d.id === updated.id ? updated : d)}));
  }

  function importFile() {
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = '.csv,.tsv,.txt,.md,.json';
    inp.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const text = ev.target.result;
        const ext = file.name.split('.').pop().toLowerCase();
        if (ext === 'csv' || ext === 'tsv') {
          const parsed = parseCSVRobust(text);
          const newDoc = {id:uid(), name:file.name.replace(/\.[^.]+$/,''), type:'xlsx', created_at:new Date().toISOString(),
            content:'', rows:parsed.rows, cols:parsed.cols, slides:[], sheets:null};
          setStore(s => ({...s, documents:[...(s.documents||[]),newDoc]}));
          setActiveDoc(newDoc.id);
          showToast(`CSV importado: ${parsed.rows.length} filas ✓`);
        } else {
          const newDoc = {id:uid(), name:file.name.replace(/\.[^.]+$/,''), type:'docx', created_at:new Date().toISOString(),
            content: ext==='md' ? mdToHtml(text) : `<pre>${esc(text)}</pre>`, rows:[], cols:[], slides:[], sheets:null};
          setStore(s => ({...s, documents:[...(s.documents||[]),newDoc]}));
          setActiveDoc(newDoc.id);
          showToast(`Archivo importado ✓`);
        }
      };
      reader.readAsText(file, 'UTF-8');
    };
    inp.click();
  }

  function mdToHtml(md) {
    return md
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code>$1</code>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/^(?!<[hup])(.+)$/gm, '<p>$1</p>');
  }

  const doc = documents.find(d => d.id === activeDoc);

  return (
    <div style={{display:'flex', flexDirection:'column', height:'100%', gap:0}}>
      {/* HERO */}
      <div className="doc-hero">
        <div style={{display:'flex', alignItems:'center', gap:12}}>
          <div style={{width:40,height:40,background:'var(--accent-bg)',borderRadius:'var(--r)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--accent2)',border:'1px solid rgba(124,106,247,0.25)'}}>{Ic.docs}</div>
          <div>
            <div style={{fontFamily:'var(--font-head)',fontSize:16,fontWeight:700}}>Procesador de Textos & Documentos</div>
            <div style={{fontSize:12,color:'var(--text3)',marginTop:1}}>{documents.length} documento(s) · Hojas de cálculo con fórmulas · Editor rico · Presentaciones</div>
          </div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <button className="btn btn-sm" onClick={importFile} title="Importar archivo CSV/TXT/MD">↑ Importar</button>
          <div style={{position:'relative'}} ref={menuRef}>
            <button className="btn" onClick={() => setShowNewMenu(p => !p)}>{Ic.plus} Nuevo</button>
            {showNewMenu && (
              <div style={{position:'absolute',right:0,top:'calc(100% + 6px)',background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:'var(--r2)',padding:6,zIndex:50,width:220,boxShadow:'0 8px 30px rgba(0,0,0,0.4)'}}>
                {[['xlsx','📊','Hoja de Cálculo','Fórmulas, datos, CSV'],['docx','📝','Documento de Texto','Editor rico, exportar PDF'],['pptx','📑','Presentación','Diapositivas, portadas'],['access','🗄️','Base de Datos','Tablas, consultas, formularios']].map(([t,icon,label,desc]) => (
                  <div key={t} onClick={() => addDoc(t)}
                    style={{padding:'10px 12px',cursor:'pointer',borderRadius:7,transition:'all var(--transition)',display:'flex',gap:10,alignItems:'center'}}
                    onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <span style={{fontSize:18}}>{icon}</span>
                    <div><div style={{fontSize:13,fontWeight:500,color:'var(--text)'}}>{label}</div><div style={{fontSize:11,color:'var(--text3)'}}>{desc}</div></div>
                  </div>
                ))}
              </div>
            )}
          </div>
          <button className="btn btn-accent" onClick={() => {
            if (documents.length === 0) { showToast('Crea un documento primero', 'error'); return; }
            setExportOpen(true);
          }}>{Ic.pdf} Exportar</button>
        </div>
      </div>

      <DocExportModal open={exportOpen} onClose={() => setExportOpen(false)} documents={documents}/>

      {documents.length === 0 ? (
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:20}}>
          <div style={{fontSize:56,lineHeight:1}}>📄</div>
          <div style={{fontFamily:'var(--font-head)',fontSize:20,fontWeight:700}}>Sin documentos</div>
          <div style={{fontSize:13,color:'var(--text3)',textAlign:'center',maxWidth:380,lineHeight:1.6}}>
            Crea hojas de cálculo con fórmulas reales (SUM, IF, VLOOKUP…), documentos de texto ricos o presentaciones.
          </div>
          <div style={{display:'flex',gap:10,flexWrap:'wrap',justifyContent:'center'}}>
            {[['xlsx','📊 Hoja de Cálculo'],['docx','📝 Documento'],['pptx','📑 Presentación'],['access','🗄️ Base de Datos']].map(([t,l]) => (
              <button key={t} className="btn btn-accent" onClick={() => addDoc(t)} style={{fontSize:13}}>{l}</button>
            ))}
          </div>
          <button className="btn btn-sm" onClick={importFile} style={{fontSize:12,color:'var(--text3)'}}>↑ O importa un CSV/TXT/MD</button>
        </div>
      ) : (
        <>
          {/* Tabs */}
          <div className="doc-tabs">
            {documents.map(d => (
              <div key={d.id} className={`doc-tab${activeDoc === d.id ? ' active' : ''}`} onClick={() => setActiveDoc(d.id)}>
                <span className="doc-tab-icon">{d.type==='xlsx'?'📊':d.type==='pptx'?'📑':d.type==='csv'?'🗃️':d.type==='access'?'🗄️':'📝'}</span>
                <span style={{maxWidth:130,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.name}</span>
                <span className="doc-tab-close" onClick={e => removeDoc(d.id, e)}>{Ic.close}</span>
              </div>
            ))}
          </div>
          {doc && <DocEditorPane key={doc.id} doc={doc} onUpdate={updateDoc}/>}
        </>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════
   ACCESS DATABASE ENGINE — Motor SQL en memoria
══════════════════════════════════════════════ */

// ── Micro SQL Engine ──────────────────────────
const MicroSQL = {
  // Execute a SQL string against an in-memory DB (array of tables)
  execute(sql, tables) {
    const s = sql.trim().replace(/\s+/g, ' ');
    const up = s.toUpperCase();
    try {
      if (up.startsWith('SELECT')) return this.select(s, tables);
      if (up.startsWith('INSERT')) return this.insert(s, tables);
      if (up.startsWith('UPDATE')) return this.update(s, tables);
      if (up.startsWith('DELETE')) return this.delete(s, tables);
      if (up.startsWith('CREATE TABLE')) return this.createTable(s, tables);
      if (up.startsWith('DROP TABLE')) return this.dropTable(s, tables);
      if (up.startsWith('ALTER TABLE')) return this.alterTable(s, tables);
      return { error: 'Sentencia SQL no reconocida. Usa SELECT, INSERT, UPDATE, DELETE, CREATE TABLE, DROP TABLE, ALTER TABLE.' };
    } catch(e) {
      return { error: e.message };
    }
  },

  getTable(name, tables) {
    return tables.find(t => t.name.toUpperCase() === name.toUpperCase());
  },

  evalCondition(row, colNames, cond) {
    if (!cond) return true;
    // Simple expression evaluator: COL OP VALUE [AND/OR ...]
    const parts = cond.split(/\s+(?:AND|OR)\s+/i);
    const ops = [...cond.matchAll(/\s+(AND|OR)\s+/gi)].map(m => m[1].toUpperCase());
    const results = parts.map(p => {
      const m = p.trim().match(/^(\w+)\s*(=|!=|<>|>=|<=|>|<|LIKE|NOT LIKE|IS NULL|IS NOT NULL)\s*(.*)$/i);
      if (!m) return true;
      const col = colNames.indexOf(m[1].toUpperCase());
      if (col === -1) return true;
      const op = m[2].toUpperCase();
      let val = (m[3] || '').trim().replace(/^['"]|['"]$/g, '');
      const cellVal = String(row[col] ?? '');
      if (op === '=' || op === '==') return cellVal.toLowerCase() === val.toLowerCase();
      if (op === '!=' || op === '<>') return cellVal.toLowerCase() !== val.toLowerCase();
      if (op === '>') return parseFloat(cellVal) > parseFloat(val);
      if (op === '<') return parseFloat(cellVal) < parseFloat(val);
      if (op === '>=') return parseFloat(cellVal) >= parseFloat(val);
      if (op === '<=') return parseFloat(cellVal) <= parseFloat(val);
      if (op === 'LIKE') { const rx = new RegExp('^' + val.replace(/%/g,'.*').replace(/_/g,'.') + '$','i'); return rx.test(cellVal); }
      if (op === 'NOT LIKE') { const rx = new RegExp('^' + val.replace(/%/g,'.*').replace(/_/g,'.') + '$','i'); return !rx.test(cellVal); }
      if (op === 'IS NULL') return cellVal === '' || cellVal === 'null';
      if (op === 'IS NOT NULL') return cellVal !== '' && cellVal !== 'null';
      return true;
    });
    let r = results[0];
    for (let i = 0; i < ops.length; i++) {
      if (ops[i] === 'AND') r = r && results[i+1];
      else r = r || results[i+1];
    }
    return r;
  },

  select(sql, tables) {
    // SELECT [DISTINCT] cols FROM tbl [JOIN tbl2 ON ...] [WHERE ...] [ORDER BY ...] [LIMIT n]
    const m = sql.match(/SELECT\s+(DISTINCT\s+)?([\s\S]+?)\s+FROM\s+(\w+)(?:\s+(?:INNER\s+)?JOIN\s+(\w+)\s+ON\s+([\s\S]+?))?\s*(?:WHERE\s+([\s\S]+?))?\s*(?:ORDER\s+BY\s+([\s\S]+?))?\s*(?:LIMIT\s+(\d+))?\s*$/i);
    if (!m) throw new Error('Sintaxis SELECT inválida. Uso: SELECT cols FROM tabla [WHERE cond] [ORDER BY col] [LIMIT n]');
    const [, distinct, colsPart, tblName, joinTbl, joinOn, where, orderBy, limit] = m;
    const tbl = this.getTable(tblName, tables);
    if (!tbl) throw new Error(`Tabla "${tblName}" no encontrada`);

    let colNames = tbl.cols.map(c => c.name.toUpperCase());
    let rows = tbl.rows.map(r => [...r]);

    // JOIN
    if (joinTbl) {
      const jTbl = this.getTable(joinTbl, tables);
      if (!jTbl) throw new Error(`Tabla JOIN "${joinTbl}" no encontrada`);
      const jCols = jTbl.cols.map(c => c.name.toUpperCase());
      const jOn = joinOn.trim().split('=').map(s => s.trim().split('.').pop().toUpperCase());
      const myCol = colNames.indexOf(jOn[0]);
      const theirCol = jCols.indexOf(jOn[1]);
      const joined = [];
      for (const row of rows) {
        for (const jrow of jTbl.rows) {
          if (String(row[myCol]) === String(jrow[theirCol])) {
            joined.push([...row, ...jrow]);
          }
        }
      }
      colNames = [...colNames, ...jCols.map(c => joinTbl.toUpperCase()+'.'+c)];
      rows = joined;
    }

    // WHERE
    if (where) rows = rows.filter(r => this.evalCondition(r, colNames, where.trim()));

    // SELECT columns
    let selectedCols;
    let outCols;
    if (colsPart.trim() === '*') {
      selectedCols = colNames.map((_, i) => i);
      outCols = tbl.cols.map(c => c.name);
      if (joinTbl) { const jTbl = this.getTable(joinTbl, tables); outCols = [...outCols, ...jTbl.cols.map(c => joinTbl+'.'+c.name)]; }
    } else {
      const parts = colsPart.split(',').map(s => s.trim());
      outCols = [];
      selectedCols = parts.map(p => {
        // Handle aggregates: COUNT(*), SUM(col), AVG(col), MAX(col), MIN(col)
        const aggM = p.match(/^(COUNT|SUM|AVG|MAX|MIN)\(([^)]*)\)(?:\s+AS\s+(\w+))?$/i);
        if (aggM) { outCols.push(aggM[3] || aggM[0]); return {agg: aggM[1].toUpperCase(), col: aggM[2].trim()}; }
        const aliasM = p.match(/^(\w+)\s+AS\s+(\w+)$/i);
        if (aliasM) { outCols.push(aliasM[2]); return colNames.indexOf(aliasM[1].toUpperCase()); }
        outCols.push(p);
        return colNames.indexOf(p.toUpperCase());
      });
    }

    // Aggregate if needed
    const hasAgg = selectedCols.some(c => typeof c === 'object');
    let outRows;
    if (hasAgg) {
      outRows = [selectedCols.map(c => {
        if (typeof c === 'object') {
          const vals = rows.map(r => c.col === '*' ? 1 : parseFloat(r[colNames.indexOf(c.col.toUpperCase())]) || 0);
          if (c.agg === 'COUNT') return c.col === '*' ? rows.length : vals.filter(v => !isNaN(v)).length;
          if (c.agg === 'SUM') return vals.reduce((a,b) => a+b, 0);
          if (c.agg === 'AVG') return vals.length ? (vals.reduce((a,b) => a+b, 0)/vals.length).toFixed(4) : 0;
          if (c.agg === 'MAX') return Math.max(...vals);
          if (c.agg === 'MIN') return Math.min(...vals);
        }
        return rows[0]?.[c] ?? '';
      })];
    } else {
      outRows = rows.map(r => selectedCols.map(c => typeof c === 'number' && c >= 0 ? r[c] : ''));
    }

    // DISTINCT
    if (distinct) {
      const seen = new Set();
      outRows = outRows.filter(r => { const k = r.join('|'); if (seen.has(k)) return false; seen.add(k); return true; });
    }

    // ORDER BY
    if (orderBy) {
      const [obCol, obDir] = orderBy.trim().split(/\s+/);
      const obIdx = outCols.map(c => c.toUpperCase()).indexOf(obCol.toUpperCase());
      if (obIdx >= 0) {
        outRows.sort((a, b) => {
          const av = a[obIdx], bv = b[obIdx];
          const an = parseFloat(av), bn = parseFloat(bv);
          const cmp = (!isNaN(an) && !isNaN(bn)) ? an - bn : String(av).localeCompare(String(bv));
          return (obDir || '').toUpperCase() === 'DESC' ? -cmp : cmp;
        });
      }
    }

    // LIMIT
    if (limit) outRows = outRows.slice(0, parseInt(limit));

    return { cols: outCols, rows: outRows, rowCount: outRows.length, type: 'select' };
  },

  insert(sql, tables) {
    const m = sql.match(/INSERT\s+INTO\s+(\w+)\s*\(([^)]+)\)\s*VALUES\s*\(([^)]+)\)/i);
    if (!m) throw new Error('Sintaxis INSERT inválida. Uso: INSERT INTO tabla (col1, col2) VALUES (val1, val2)');
    const tbl = this.getTable(m[1], tables);
    if (!tbl) throw new Error(`Tabla "${m[1]}" no encontrada`);
    const cols = m[2].split(',').map(s => s.trim());
    const vals = m[3].split(',').map(s => s.trim().replace(/^['"]|['"]$/g, ''));
    const newRow = tbl.cols.map(c => {
      if (c.pk) return String(Math.max(0, ...tbl.rows.map(r => parseInt(r[tbl.cols.indexOf(c)]) || 0)) + 1);
      const idx = cols.findIndex(col => col.toUpperCase() === c.name.toUpperCase());
      return idx >= 0 ? vals[idx] : (c.default ?? '');
    });
    tbl.rows.push(newRow);
    return { message: `1 fila insertada en "${m[1]}"`, rowCount: 1, type: 'insert', tables };
  },

  update(sql, tables) {
    const m = sql.match(/UPDATE\s+(\w+)\s+SET\s+([\s\S]+?)\s*(?:WHERE\s+([\s\S]+))?$/i);
    if (!m) throw new Error('Sintaxis UPDATE inválida. Uso: UPDATE tabla SET col=val [WHERE cond]');
    const tbl = this.getTable(m[1], tables);
    if (!tbl) throw new Error(`Tabla "${m[1]}" no encontrada`);
    const setClause = m[2];
    const where = m[3];
    const colNames = tbl.cols.map(c => c.name.toUpperCase());
    const sets = setClause.split(',').map(s => {
      const [k, ...rest] = s.split('=');
      return { col: k.trim().toUpperCase(), val: rest.join('=').trim().replace(/^['"]|['"]$/g, '') };
    });
    let count = 0;
    tbl.rows = tbl.rows.map(r => {
      if (where && !this.evalCondition(r, colNames, where.trim())) return r;
      count++;
      const nr = [...r];
      sets.forEach(({col, val}) => { const i = colNames.indexOf(col); if (i >= 0) nr[i] = val; });
      return nr;
    });
    return { message: `${count} fila(s) actualizadas en "${m[1]}"`, rowCount: count, type: 'update', tables };
  },

  delete(sql, tables) {
    const m = sql.match(/DELETE\s+FROM\s+(\w+)\s*(?:WHERE\s+([\s\S]+))?$/i);
    if (!m) throw new Error('Sintaxis DELETE inválida. Uso: DELETE FROM tabla [WHERE cond]');
    const tbl = this.getTable(m[1], tables);
    if (!tbl) throw new Error(`Tabla "${m[1]}" no encontrada`);
    const colNames = tbl.cols.map(c => c.name.toUpperCase());
    const before = tbl.rows.length;
    if (m[2]) tbl.rows = tbl.rows.filter(r => !this.evalCondition(r, colNames, m[2].trim()));
    else tbl.rows = [];
    const count = before - tbl.rows.length;
    return { message: `${count} fila(s) eliminadas de "${m[1]}"`, rowCount: count, type: 'delete', tables };
  },

  createTable(sql, tables) {
    const m = sql.match(/CREATE\s+TABLE\s+(?:IF\s+NOT\s+EXISTS\s+)?(\w+)\s*\(([^)]+)\)/i);
    if (!m) throw new Error('Sintaxis CREATE TABLE inválida. Uso: CREATE TABLE nombre (col1 TIPO, col2 TIPO, ...)');
    const name = m[1];
    if (this.getTable(name, tables)) throw new Error(`La tabla "${name}" ya existe`);
    const colDefs = m[2].split(',').map(s => s.trim());
    const cols = colDefs.map(def => {
      const parts = def.split(/\s+/);
      const isPK = def.toUpperCase().includes('PRIMARY KEY') || def.toUpperCase().includes('AUTOINCREMENT');
      const isNotNull = def.toUpperCase().includes('NOT NULL');
      const defMatch = def.match(/DEFAULT\s+['"]?([^'"]+)['"]?/i);
      return {
        name: parts[0].replace(/[^a-zA-Z0-9_]/g,''),
        type: (parts[1] || 'TEXT').replace(/[^A-Z]/gi,'').toUpperCase(),
        pk: isPK, notNull: isNotNull,
        default: defMatch ? defMatch[1] : ''
      };
    }).filter(c => c.name && !['PRIMARY','FOREIGN','UNIQUE','INDEX'].includes(c.name.toUpperCase()));
    if (!cols.find(c => c.pk)) cols[0].pk = true; // auto PK on first col
    tables.push({ id: uid(), name, cols, rows: [] });
    return { message: `Tabla "${name}" creada con ${cols.length} columna(s)`, type: 'create', tables };
  },

  dropTable(sql, tables) {
    const m = sql.match(/DROP\s+TABLE\s+(?:IF\s+EXISTS\s+)?(\w+)/i);
    if (!m) throw new Error('Sintaxis DROP TABLE inválida');
    const idx = tables.findIndex(t => t.name.toUpperCase() === m[1].toUpperCase());
    if (idx === -1) throw new Error(`Tabla "${m[1]}" no encontrada`);
    tables.splice(idx, 1);
    return { message: `Tabla "${m[1]}" eliminada`, type: 'drop', tables };
  },

  alterTable(sql, tables) {
    const addM = sql.match(/ALTER\s+TABLE\s+(\w+)\s+ADD\s+(?:COLUMN\s+)?(\w+)\s+(\w+)/i);
    if (addM) {
      const tbl = this.getTable(addM[1], tables);
      if (!tbl) throw new Error(`Tabla "${addM[1]}" no encontrada`);
      tbl.cols.push({ name: addM[2], type: addM[3].toUpperCase(), pk: false, notNull: false, default: '' });
      tbl.rows = tbl.rows.map(r => [...r, '']);
      return { message: `Columna "${addM[2]}" añadida a "${addM[1]}"`, type: 'alter', tables };
    }
    const dropM = sql.match(/ALTER\s+TABLE\s+(\w+)\s+DROP\s+(?:COLUMN\s+)?(\w+)/i);
    if (dropM) {
      const tbl = this.getTable(dropM[1], tables);
      if (!tbl) throw new Error(`Tabla "${dropM[1]}" no encontrada`);
      const ci = tbl.cols.findIndex(c => c.name.toUpperCase() === dropM[2].toUpperCase());
      if (ci === -1) throw new Error(`Columna "${dropM[2]}" no encontrada`);
      tbl.cols.splice(ci, 1);
      tbl.rows = tbl.rows.map(r => r.filter((_, i) => i !== ci));
      return { message: `Columna "${dropM[2]}" eliminada de "${dropM[1]}"`, type: 'alter', tables };
    }
    throw new Error('ALTER TABLE: usa ADD COLUMN o DROP COLUMN');
  }
};

const FIELD_TYPES = ['TEXT','INTEGER','REAL','BOOLEAN','DATE','DATETIME','BLOB'];
const FIELD_TYPE_ICONS = {TEXT:'Aa',INTEGER:'123',REAL:'1.5',BOOLEAN:'☑',DATE:'📅',DATETIME:'🕐',BLOB:'📦'};

// ── Table Designer ────────────────────────────
function TableDesigner({ table, onSave, onCancel }) {
  const [name, setName] = useState(table?.name || '');
  const [cols, setCols] = useState(table?.cols?.length > 0 ? table.cols.map(c=>({...c})) : [
    {name:'ID', type:'INTEGER', pk:true, notNull:true, default:''},
    {name:'Nombre', type:'TEXT', pk:false, notNull:false, default:''},
  ]);
  const [selCol, setSelCol] = useState(0);

  function addCol() {
    setCols(p => [...p, {name:`Col${p.length+1}`, type:'TEXT', pk:false, notNull:false, default:''}]);
  }
  function delCol(i) {
    if (cols.length <= 1) return;
    setCols(p => p.filter((_,j) => j !== i));
    setSelCol(0);
  }
  function upd(i, field, val) {
    setCols(p => p.map((c,j) => j===i ? {...c,[field]:val} : (field==='pk'&&val ? {...c,pk:false} : c)));
  }
  function moveUp(i) { if (i===0) return; setCols(p => { const a=[...p]; [a[i-1],a[i]]=[a[i],a[i-1]]; return a; }); setSelCol(i-1); }
  function moveDown(i) { if (i===cols.length-1) return; setCols(p => { const a=[...p]; [a[i],a[i+1]]=[a[i+1],a[i]]; return a; }); setSelCol(i+1); }

  function save() {
    if (!name.trim()) { showToast('El nombre de la tabla es obligatorio','error'); return; }
    if (cols.some(c => !c.name.trim())) { showToast('Todos los campos necesitan nombre','error'); return; }
    const cleanName = name.trim().replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
    onSave({ id: table?.id || uid(), name: cleanName, cols, rows: table?.rows || [] });
  }

  const sel = cols[selCol];

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      {/* Header */}
      <div style={{padding:'10px 14px',borderBottom:'1px solid var(--border)',background:'var(--bg3)',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>

        <div>
          <input value={name} onChange={e=>setName(e.target.value.replace(/\s+/g,'_'))} placeholder="NombreTabla"
            style={{background:'transparent',border:'none',borderBottom:'2px solid var(--accent)',color:'var(--text)',fontFamily:'var(--font-head)',fontSize:16,fontWeight:700,padding:'2px 4px',outline:'none',width:220}}/>
        </div>
        <span style={{fontSize:12,color:'var(--text3)',marginLeft:4}}>(diseñador de tabla)</span>
        <div style={{marginLeft:'auto',display:'flex',gap:6}}>
          <button className="btn btn-sm" onClick={addCol}>{Ic.plus} Añadir campo</button>
          <button className="btn btn-sm" onClick={onCancel}>Cancelar</button>
          <button className="btn btn-accent btn-sm" onClick={save}>{Ic.save} Guardar tabla</button>
        </div>
      </div>
      <div style={{display:'flex',flex:1,overflow:'hidden'}}>
        {/* Column list */}
        <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          {/* Grid header */}
          <div className="td-header">
            <div className="td-header-cell" style={{width:40,textAlign:'center'}}>🔑</div>
            <div className="td-header-cell">Nombre del campo</div>
            <div className="td-header-cell">Tipo de datos</div>
            <div className="td-header-cell">Requerido</div>
            <div className="td-header-cell">Valor por defecto</div>
          </div>
          <div style={{flex:1,overflowY:'auto'}}>
            {cols.map((c, i) => (
              <div key={i} className={`td-row${selCol===i?' selected':''}`} onClick={()=>setSelCol(i)}>
                <div className="td-cell td-pk-icon">
                  <input type="radio" checked={c.pk} onChange={()=>upd(i,'pk',true)} style={{accentColor:'var(--amber)',cursor:'pointer'}} title="Clave primaria"/>
                </div>
                <div className="td-cell">
                  <input className="td-cell-input" value={c.name} onChange={e=>upd(i,'name',e.target.value.replace(/[^a-zA-Z0-9_]/g,''))} placeholder="nombre_campo"/>
                </div>
                <div className="td-cell">
                  <select className="td-cell-select" value={c.type} onChange={e=>upd(i,'type',e.target.value)}>
                    {FIELD_TYPES.map(t => <option key={t} value={t}>{FIELD_TYPE_ICONS[t]} {t}</option>)}
                  </select>
                </div>
                <div className="td-cell" style={{justifyContent:'center'}}>
                  <input type="checkbox" checked={c.notNull} onChange={e=>upd(i,'notNull',e.target.checked)} style={{accentColor:'var(--accent)',cursor:'pointer'}}/>
                </div>
                <div className="td-cell">
                  <input className="td-cell-input" value={c.default} onChange={e=>upd(i,'default',e.target.value)} placeholder="(ninguno)"/>
                </div>
              </div>
            ))}
          </div>
        </div>
        {/* Properties panel */}
        {sel && (
          <div style={{width:240,flexShrink:0,borderLeft:'1px solid var(--border)',background:'var(--bg3)',padding:14,overflow:'auto'}}>
            <div style={{fontSize:12,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:12}}>Propiedades del campo</div>

              <div>
                <div style={{fontSize:11,color:'var(--text3)',marginBottom:3}}>Tipo</div>
                <select className="form-select" style={{fontSize:12}} value={sel.type} onChange={e=>upd(selCol,'type',e.target.value)}>

              </div>
              <div style={{display:'flex',gap:10,alignItems:'center'}}>
                <label style={{display:'flex',alignItems:'center',gap:5,fontSize:12,cursor:'pointer'}}>
                  <input type="radio" checked={sel.pk} onChange={()=>upd(selCol,'pk',true)} style={{accentColor:'var(--amber)'}}/> Clave primaria 🔑
                </label>
              </div>
              <div style={{display:'flex',gap:10,alignItems:'center'}}>
                <label style={{display:'flex',alignItems:'center',gap:5,fontSize:12,cursor:'pointer'}}>
                  <input type="checkbox" checked={sel.notNull} onChange={e=>upd(selCol,'notNull',e.target.checked)} style={{accentColor:'var(--accent)'}}/> Requerido
                </label>
              </div>
              <div>
                <div style={{fontSize:11,color:'var(--text3)',marginBottom:3}}>Valor por defecto</div>
                <input value={sel.default} onChange={e=>upd(selCol,'default',e.target.value)}
                  className="form-input" style={{fontSize:12}} placeholder="(vacío)"/>
              </div>
              <div style={{height:1,background:'var(--border)',margin:'4px 0'}}/>
              <div style={{display:'flex',gap:6}}>
                <button className="btn btn-sm" style={{flex:1,fontSize:11}} onClick={()=>moveUp(selCol)}>↑ Subir</button>
                <button className="btn btn-sm" style={{flex:1,fontSize:11}} onClick={()=>moveDown(selCol)}>↓ Bajar</button>
              </div>
              <button className="btn btn-danger btn-sm" style={{fontSize:11}} onClick={()=>delCol(selCol)}>✕ Eliminar campo</button>
