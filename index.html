const AUTO_TRIGGERS = [
  {value:'contact_stage', label:'Cuando contacto cambia a etapa'},
  {value:'deal_stage', label:'Cuando deal cambia a etapa'},
  {value:'task_overdue', label:'Cuando tarea está vencida'},
  {value:'deal_created', label:'Cuando se crea un deal'},
  {value:'contact_created', label:'Cuando se crea un contacto'},
];
const AUTO_ACTIONS = [
  {value:'create_task', label:'Crear tarea automáticamente'},
  {value:'create_note', label:'Añadir nota al contacto'},
  {value:'change_stage', label:'Cambiar etapa del contacto'},
  {value:'send_email_template', label:'Preparar email desde plantilla'},
];
const TRIGGER_VALUE_OPTIONS = {
  contact_stage: STAGES,
  deal_stage: STAGES,
  task_overdue: [],
  deal_created: [],
  contact_created: [],
};

// Run automations engine — called whenever contacts/deals change
function runAutomations(store, event) {
  const {automations=[]} = store;
  const active = automations.filter(a=>a.active);
  const additions = {tasks:[], notes:[], emails:[]};
  for (const auto of active) {
    const {trigger, action} = auto;
    let matches = false;
    if (trigger.type === event.type) {
      if (['contact_stage','deal_stage'].includes(trigger.type)) matches = trigger.value === event.value;
      else matches = true;
    }
    if (!matches) continue;
    const contactId = event.contactId || '';
    if (action.type === 'create_task') {
      const dueDate = new Date(Date.now() + (action.days_offset||0)*86400000).toISOString().split('T')[0];
      additions.tasks.push({id:uid(), contact_id:contactId, title:action.title||'Tarea automática', description:`Creada por automatización: ${auto.name}`, due_date:dueDate, priority:action.priority||'medium', done:false});
    } else if (action.type === 'create_note') {
      additions.notes.push({id:uid(), contact_id:contactId, content:`[Auto] ${action.content||auto.name}`, created_at:new Date().toISOString()});
    }
  }
  return additions;
}

function Automations() {
  const [store, setStore] = useStore();
  const automations = store.automations || [];
  const [modal, setModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [runLog, setRunLog] = useState([]);
  const emptyForm = {name:'',active:true,trigger:{type:'contact_stage',value:'lead'},action:{type:'create_task',title:'',content:'',priority:'medium',days_offset:1}};
  const [form, setForm] = useState(emptyForm);

  function openNew() { setEditing(null); setForm(emptyForm); setModal(true); }
  function openEdit(a) { setEditing(a); setForm(JSON.parse(JSON.stringify(a))); setModal(true); }
  function toggleActive(id) {
    setStore(s=>({...s, automations:(s.automations||[]).map(a=>a.id===id?{...a,active:!a.active}:a)}));
  }
  function del(id) {
    if (!confirm('¿Eliminar automatización?')) return;
    setStore(s=>({...s, automations:(s.automations||[]).filter(a=>a.id!==id)}));
  }
  function save() {
    if (!form.name.trim()) { showToast('El nombre es obligatorio','error'); return; }
    const rec = {...form, id: editing?.id || uid()};
    setStore(s=>({...s, automations: editing ? (s.automations||[]).map(a=>a.id===editing.id?rec:a) : [...(s.automations||[]),rec]}));
    showToast(editing?'Automatización actualizada ✓':'Automatización creada ✓');
    setModal(false);
  }
  function testRun(a) {
    const sampleContact = store.contacts[0];
    if (!sampleContact) { showToast('Necesitas al menos un contacto para probar','error'); return; }
    const event = {type:a.trigger.type, value:a.trigger.value, contactId:sampleContact.id};
    const adds = runAutomations({...store, automations:[a]}, event);
    const total = adds.tasks.length + adds.notes.length;
    setRunLog(p=>[{id:uid(),name:a.name,result:total>0?`✓ Ejecutada: ${total} acción(s) sobre "${sampleContact.name}"`:'⚠ Sin coincidencia en este contexto',ts:new Date().toISOString()},...p].slice(0,20));
    if (total > 0) {
      setStore(s=>({...s, tasks:[...s.tasks,...adds.tasks], notes:[...s.notes,...adds.notes]}));
      showToast(`Automatización ejecutada: ${total} acción(s) creadas ✓`);
    } else {
      showToast('Sin acciones en este contexto de prueba','error');
    }
  }

  const triggerLabel = v => AUTO_TRIGGERS.find(t=>t.value===v)?.label || v;
  const actionLabel = v => AUTO_ACTIONS.find(a=>a.value===v)?.label || v;
  const tvOpts = TRIGGER_VALUE_OPTIONS[form.trigger?.type] || [];

  return (
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div>
          <div style={{fontFamily:'var(--font-head)',fontSize:16,fontWeight:700}}>⚡ Automatizaciones</div>
          <div style={{fontSize:12,color:'var(--text3)',marginTop:1}}>Reglas If/Then sin código — {automations.filter(a=>a.active).length} activas de {automations.length}</div>
        </div>
        <button className="btn btn-accent" style={{marginLeft:'auto'}} onClick={openNew}>{Ic.plus} Nueva regla</button>
      </div>

      {automations.length===0 && (
        <div style={{textAlign:'center',padding:'40px 20px',color:'var(--text3)'}}>
          <div style={{fontSize:48,marginBottom:12}}>⚡</div>
          <div style={{fontSize:14,fontWeight:600,color:'var(--text2)',marginBottom:6}}>Sin automatizaciones</div>
          <div style={{fontSize:12,maxWidth:360,margin:'0 auto',lineHeight:1.6}}>Crea reglas If/Then para automatizar tareas, notas y cambios de etapa cuando ocurran eventos en tu CRM.</div>
          <button className="btn btn-accent" style={{marginTop:14}} onClick={openNew}>⚡ Crear primera regla</button>
        </div>
      )}

      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {automations.map(a=>(
          <div key={a.id} className={`auto-card${a.active?' active':''}`}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
              <label className="toggle-switch" title={a.active?'Desactivar':'Activar'}>
                <input type="checkbox" checked={a.active} onChange={()=>toggleActive(a.id)}/>
                <span className="toggle-slider"/>
              </label>
              <span style={{fontWeight:600,fontSize:13,color:'var(--text)'}}>{a.name}</span>
              <div style={{marginLeft:'auto',display:'flex',gap:5}}>
                <button className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={()=>testRun(a)} title="Probar ahora">▶ Probar</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>openEdit(a)}>{Ic.edit}</button>
                <button className="btn btn-ghost btn-sm" style={{color:'var(--red)'}} onClick={()=>del(a.id)}>{Ic.trash}</button>
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <span className="auto-trigger-badge">
                🔔 {triggerLabel(a.trigger.type)}{a.trigger.value?' → '+SL[a.trigger.value]:''}
              </span>
              <span className="auto-arrow">→</span>
              <span className="auto-action-badge">
                ⚡ {actionLabel(a.action.type)}{a.action.title?' "'+a.action.title+'"':''}{a.action.content?' "'+a.action.content.slice(0,40)+'"':''}
              </span>
            </div>
          </div>
        ))}
      </div>

      {runLog.length>0 && (
        <div style={{marginTop:4}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',marginBottom:6}}>Log de ejecuciones</div>

            <div key={l.id} style={{fontSize:12,color:'var(--text2)',padding:'5px 8px',background:'var(--bg3)',borderRadius:5,marginBottom:4,display:'flex',gap:8,alignItems:'center'}}>

/* ══════════════════════════════════════════════
   4. MODO PRESENTACIÓN PANTALLA COMPLETA
══════════════════════════════════════════════ */
function PresentationMode({doc, onClose}) {
  const slides = doc?.slides || [];
  const [current, setCurrent] = useState(0);
  const total = slides.length;

  useEffect(() => {
    function handleKey(e) {
      if (e.key==='Escape') onClose();
      if (e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' ') { e.preventDefault(); setCurrent(p=>Math.min(p+1,total-1)); }
      if (e.key==='ArrowLeft'||e.key==='ArrowUp') { e.preventDefault(); setCurrent(p=>Math.max(p-1,0)); }
      if (e.key==='Home') setCurrent(0);
      if (e.key==='End') setCurrent(total-1);
    }
    document.addEventListener('keydown', handleKey);
    return ()=>document.removeEventListener('keydown', handleKey);
  }, [total, onClose]);

  if (!slides.length) return null;
  const slide = slides[current] || slides[0];
  const progress = total > 1 ? ((current+1)/total*100) : 100;

  const slideClass = `presentation-slide layout-${slide.layout||'content'}`;
  const accentColor = slide.layout==='title' ? '#7c6af7' : slide.layout==='quote' ? '#00d4b4' : '#5a5a7e';

  return (
    <div className="presentation-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className={slideClass}>
        <div className="presentation-accent"/>
        {slide.layout==='quote' ? (
          <>
            <div style={{fontSize:'clamp(48px,8vw,96px)',color:accentColor,lineHeight:1,marginBottom:16,opacity:.8}}>❝</div>
            <div className="presentation-title" style={{fontStyle:'italic',fontSize:'clamp(22px,4vw,48px)'}}>{slide.title||'Cita'}</div>
            {slide.body && <div style={{fontSize:'clamp(13px,1.8vw,20px)',color:accentColor,marginTop:12,fontStyle:'italic'}}>— {slide.body}</div>}
          </>
        ) : slide.layout==='two-col' ? (
          <div style={{width:'100%',maxWidth:1100}}>
            <div className="presentation-title" style={{marginBottom:32}}>{slide.title||''}</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:40}}>
              <div style={{background:'rgba(255,255,255,0.04)',borderRadius:12,padding:'24px',border:'1px solid rgba(255,255,255,0.08)'}}>
                <div className="presentation-body" style={{textAlign:'left'}}>{slide.col1||''}</div>
              </div>
              <div style={{background:'rgba(255,255,255,0.04)',borderRadius:12,padding:'24px',border:'1px solid rgba(255,255,255,0.08)'}}>
                <div className="presentation-body" style={{textAlign:'left'}}>{slide.col2||''}</div>
              </div>
            </div>
          </div>
        ) : slide.layout==='blank' ? (
          <div className="presentation-body" style={{fontSize:'clamp(16px,2.5vw,28px)'}}>{slide.body||''}</div>
        ) : (
          <>
            {slide.layout==='title' && (
              <div style={{width:60,height:4,background:`linear-gradient(to right,${accentColor},#00d4b4)`,borderRadius:2,marginBottom:24}}/>
            )}
            <div className="presentation-title">{slide.title||'Sin título'}</div>
            {slide.body && <div className="presentation-body">{slide.body}</div>}
          </>
        )}
        <div className="presentation-slide-num">{current+1} / {total}</div>
        <div className="presentation-progress" style={{width:progress+'%'}}/>
        <div className="presentation-nav">
          <button className="presentation-nav-btn" onClick={()=>setCurrent(p=>Math.max(p-1,0))} disabled={current===0}>← Anterior</button>
          <div className="presentation-counter">{doc.name} · {current+1} de {total}</div>
          <button className="presentation-nav-btn" onClick={()=>{ if(current===total-1) onClose(); else setCurrent(p=>p+1);}}>
            {current===total-1 ? 'Finalizar ✓' : 'Siguiente →'}
          </button>
        </div>
      </div>
      <div style={{position:'absolute',top:16,right:16}}>
        <button onClick={onClose} style={{background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.2)',color:'white',padding:'8px 16px',borderRadius:999,cursor:'pointer',fontSize:13,backdropFilter:'blur(8px)'}}>✕ Salir (Esc)</button>
      </div>
    </div>
  );
}

function DocVersionPanel({doc, onUpdate, onClose}) {
  const versions = doc.versions || [];
  const [preview, setPreview] = useState(null);

  function saveVersion() {
    const v = {id:uid(), n:versions.length+1, ts:new Date().toISOString(), content:doc.content, rows:doc.rows, cols:doc.cols, sheets:doc.sheets, slides:doc.slides, label:`v${versions.length+1} — ${new Date().toLocaleString('es-ES',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}`};
    onUpdate({...doc, versions:[...versions,v]});
    showToast(`Versión ${v.label} guardada ✓`);
  }

  function restoreVersion(v) {
    if (!confirm(`¿Restaurar a ${v.label}? El estado actual se perderá.`)) return;
    onUpdate({...doc, content:v.content||doc.content, rows:v.rows||doc.rows, cols:v.cols||doc.cols, sheets:v.sheets||doc.sheets, slides:v.slides||doc.slides});
    showToast(`Restaurado a ${v.label} ✓`);
    setPreview(null);
  }

  function deleteVersion(id) {
    onUpdate({...doc, versions:versions.filter(v=>v.id!==id)});
    if (preview?.id===id) setPreview(null);
  }

  return (
    <div style={{width:280,flexShrink:0,borderLeft:'1px solid var(--border)',background:'var(--bg3)',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'10px 14px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>🕐 Versiones</span>
        <span style={{fontSize:11,color:'var(--text3)',marginLeft:'auto'}}>{versions.length} guardadas</span>
        <button className="btn btn-ghost btn-sm" style={{padding:'2px 6px'}} onClick={onClose}>✕</button>
      </div>
      <div style={{padding:10,borderBottom:'1px solid var(--border)'}}>
        <button className="btn btn-accent btn-sm" style={{width:'100%',fontSize:12}} onClick={saveVersion}>{Ic.save} Guardar versión actual</button>
      </div>
      <div style={{flex:1,overflow:'auto',padding:10}}>
        {versions.length===0 && <div style={{textAlign:'center',color:'var(--text3)',fontSize:12,padding:'20px 0'}}>Sin versiones guardadas</div>}
        {[...versions].reverse().map((v,i)=>(
          <div key={v.id} className={`version-item${preview?.id===v.id?' current':''}`} onClick={()=>setPreview(preview?.id===v.id?null:v)}>
            <div className={`version-num${preview?.id===v.id?' current':''}`}>{v.n}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{v.label}</div>
              <div style={{fontSize:10,color:'var(--text3)'}}>{timeAgo(v.ts)}</div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:3}}>
              <button className="btn btn-accent btn-sm" style={{fontSize:10,padding:'2px 6px'}} onClick={e=>{e.stopPropagation();restoreVersion(v);}}>Restaurar</button>
              <button className="btn btn-ghost btn-sm" style={{fontSize:10,padding:'2px 6px',color:'var(--red)'}} onClick={e=>{e.stopPropagation();deleteVersion(v.id);}}>✕</button>
            </div>
          </div>
        ))}
      </div>
      {preview && (
        <div style={{padding:'10px',borderTop:'1px solid var(--border)',background:'var(--bg2)'}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:6}}>Vista previa: {preview.label}</div>
          {preview.content && <div style={{fontSize:11,color:'var(--text2)',maxHeight:80,overflow:'hidden',lineHeight:1.5}} dangerouslySetInnerHTML={{__html:(preview.content||'').slice(0,300)+'…'}}/>}
          {preview.rows?.length>0 && <div style={{fontSize:11,color:'var(--text2)'}}>Hoja de cálculo: {preview.rows.length} filas</div>}
          {preview.slides?.length>0 && <div style={{fontSize:11,color:'var(--text2)'}}>{preview.slides.length} diapositivas</div>}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════
   6. FORMATO CONDICIONAL EN CELDAS
══════════════════════════════════════════════ */
const CF_OPS = ['>','<','>=','<=','=','!=','contains','is_empty','is_not_empty'];
const CF_FORMATS = [
  {id:'red_bg', label:'Fondo rojo', bg:'rgba(240,80,80,0.25)', color:'#f05050'},
  {id:'green_bg', label:'Fondo verde', bg:'rgba(34,201,122,0.2)', color:'#22c97a'},
  {id:'amber_bg', label:'Fondo ámbar', bg:'rgba(245,166,35,0.2)', color:'#f5a623'},
  {id:'blue_bg', label:'Fondo azul', bg:'rgba(59,158,255,0.2)', color:'#3b9eff'},
  {id:'bold', label:'Negrita', bg:'transparent', color:'inherit', fontWeight:'bold'},
  {id:'italic', label:'Cursiva', bg:'transparent', color:'inherit', fontStyle:'italic'},
  {id:'strikethrough', label:'Tachado', bg:'transparent', color:'var(--text3)', textDecoration:'line-through'},
];

function evalCFRule(rule, cellValue) {
  const v = String(cellValue ?? '');
  const rv = rule.value || '';
  const numV = parseFloat(v), numRv = parseFloat(rv);
  switch(rule.op) {
    case '>': return !isNaN(numV)&&!isNaN(numRv)&&numV>numRv;
    case '<': return !isNaN(numV)&&!isNaN(numRv)&&numV<numRv;
    case '>=': return !isNaN(numV)&&!isNaN(numRv)&&numV>=numRv;
    case '<=': return !isNaN(numV)&&!isNaN(numRv)&&numV<=numRv;
    case '=': return v.toLowerCase()===rv.toLowerCase();
    case '!=': return v.toLowerCase()!==rv.toLowerCase();
    case 'contains': return v.toLowerCase().includes(rv.toLowerCase());
    case 'is_empty': return v.trim()==='';
    case 'is_not_empty': return v.trim()!=='';
    default: return false;
  }
}

function getCFStyle(rules=[], colIdx, cellValue) {
  for (const rule of rules) {
    if (rule.col !== '*' && Number(rule.col) !== colIdx) continue;
    if (!evalCFRule(rule, cellValue)) continue;
    const fmt = CF_FORMATS.find(f=>f.id===rule.format);
    if (!fmt) continue;
    return {background:fmt.bg, color:fmt.color, fontWeight:fmt.fontWeight||'', fontStyle:fmt.fontStyle||'', textDecoration:fmt.textDecoration||''};
  }
  return null;
}

function ConditionalFormatPanel({doc, onUpdate, cols, onClose}) {

  function addRule() {
    onUpdate({...doc, cfRules:[...rules, {...newRule}]});

    showToast('Regla de formato añadida ✓');
  }
  function delRule(id) { onUpdate({...doc, cfRules:rules.filter(r=>r.id!==id)}); }

  const fmt = (id) => CF_FORMATS.find(f=>f.id===id);

  return (
    <div style={{padding:14,display:'flex',flexDirection:'column',gap:10}}>
      <div style={{display:'flex',alignItems:'center',gap:8}}>

      </div>
      {/* Existing rules */}
      {rules.map(r=>{
        const f=fmt(r.format);
        return (
          <div key={r.id} className="cf-rule">
            <div className="cf-preview" style={{background:f?.bg||'transparent',border:`2px solid ${f?.color||'var(--border2)'}`}}/>
            <span style={{fontSize:12,color:'var(--text2)',flex:1}}>
              Col <strong>{r.col==='*'?'(todas)':cols?.[Number(r.col)]||r.col}</strong> {r.op} <strong>{r.value||'—'}</strong> → <strong>{f?.label}</strong>
            </span>
            <button className="btn btn-ghost btn-sm" style={{color:'var(--red)',padding:'2px 5px'}} onClick={()=>delRule(r.id)}>✕</button>
          </div>
        );
      })}
      {rules.length===0 && <div style={{fontSize:12,color:'var(--text3)',textAlign:'center',padding:'8px 0'}}>Sin reglas. Añade una abajo.</div>}
      {/* New rule form */}
      <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:10}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:8,textTransform:'uppercase'}}>Nueva regla</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 100px 1fr 1fr',gap:6,marginBottom:8}}>
          <div>
            <div style={{fontSize:10,color:'var(--text3)',marginBottom:3}}>Columna</div>
            <select className="form-select" style={{fontSize:11}} value={newRule.col} onChange={e=>setNewRule(p=>({...p,col:e.target.value}))}>
              <option value="*">Todas</option>
              {(cols||[]).map((c,i)=><option key={i} value={i}>{c}</option>)}
            </select>
          </div>
          <div>
            <div style={{fontSize:10,color:'var(--text3)',marginBottom:3}}>Condición</div>
            <select className="form-select" style={{fontSize:11}} value={newRule.op} onChange={e=>setNewRule(p=>({...p,op:e.target.value}))}>
              {CF_OPS.map(o=><option key={o} value={o}>{o}</option>)}
            </select>
          </div>
          <div>
            <div style={{fontSize:10,color:'var(--text3)',marginBottom:3}}>Valor</div>
            <input className="form-input" style={{fontSize:11}} value={newRule.value} onChange={e=>setNewRule(p=>({...p,value:e.target.value}))} disabled={newRule.op.includes('empty')} placeholder="valor..."/>
          </div>
          <div>
            <div style={{fontSize:10,color:'var(--text3)',marginBottom:3}}>Formato</div>
            <select className="form-select" style={{fontSize:11}} value={newRule.format} onChange={e=>setNewRule(p=>({...p,format:e.target.value}))}>
              {CF_FORMATS.map(f=><option key={f.id} value={f.id}>{f.label}</option>)}
            </select>
          </div>

        <button className="btn btn-accent btn-sm" style={{width:'100%',fontSize:12}} onClick={addRule}>{Ic.plus} Añadir regla</button>
      </div>
    </div>
  );
}

    });
    return ()=>{ if(chartRef.current) chartRef.current.destroy(); };
  },[chartType,labelCol,valueCol,maxRows,JSON.stringify(labels),JSON.stringify(values),title]);

  const CTYPES=[['bar','Barras'],['line','Líneas'],['area','Área'],['pie','Pastel'],['doughnut','Dónut'],['column','Columnas']];

/* ══════════════════════════════════════════════
   8. IMPORTACIÓN XLSX REAL
══════════════════════════════════════════════ */
function importXLSX(file, onSuccess, onError) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      // Try SheetJS if available, otherwise CSV fallback
      if (window.XLSX) {
        const wb = window.XLSX.read(e.target.result, {type:'binary'});
        const wsName = wb.SheetNames[0];
        const ws = wb.Sheets[wsName];
        const data = window.XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        if (!data.length) { onError('Archivo vacío'); return; }
        const cols = (data[0]||[]).map((c,i)=>String(c||String.fromCharCode(65+i)));
        const rows = data.slice(1).map(r=>Array.from({length:cols.length},(_,i)=>String(r[i]??'')));
        onSuccess({cols, rows, sheetNames:wb.SheetNames});
      } else {
        // Read as text (CSV-like)
        const text = new TextDecoder('utf-8').decode(e.target.result);
        const parsed = parseCSVRobust(text);
        onSuccess({...parsed, sheetNames:['Hoja1']});
      }
    } catch(err) { onError(err.message); }
  };
  reader.onerror = ()=>onError('Error leyendo archivo');
  // Read as binary for SheetJS, text as fallback
  if (window.XLSX) reader.readAsBinaryString(file);
  else reader.readAsArrayBuffer(file);
}

/* ══════════════════════════════════════════════
   9. RELACIONES REFERENCIALES EN ACCESS
══════════════════════════════════════════════ */
function validateForeignKeys(tables) {
  const errors = [];
  for (const tbl of tables) {
    for (const col of tbl.cols) {
      if (!col.fk_table || !col.fk_col) continue;
      const refTbl = tables.find(t=>t.name===col.fk_table);
      if (!refTbl) { errors.push(`${tbl.name}.${col.name}: referencia a tabla inexistente "${col.fk_table}"`); continue; }
      const refCol = refTbl.cols.find(c=>c.name===col.fk_col);
      if (!refCol) { errors.push(`${tbl.name}.${col.name}: columna "${col.fk_col}" no existe en "${col.fk_table}"`); continue; }
      const refValues = new Set(refTbl.rows.map(r=>String(r[refTbl.cols.indexOf(refCol)]??'')));
      for (const row of tbl.rows) {
        const colIdx = tbl.cols.indexOf(col);
        const val = String(row[colIdx]??'');
        if (val && !refValues.has(val)) {
          errors.push(`${tbl.name}.${col.name}: valor "${val}" no existe en ${col.fk_table}.${col.fk_col}`);
        }
      }
    }
  }
  return errors;
}

  const col = cols[colIdx] || {};
  const [fkTable, setFkTable] = useState(col.fk_table||'');

            <option value="">(sin FK)</option>

          </select>
        </div>
        <div>
          <div style={{fontSize:10,color:'var(--text3)',marginBottom:3}}>Columna de referencia</div>
          <select className="form-select" style={{fontSize:12}} value={fkCol} onChange={e=>setFkCol(e.target.value)} disabled={!fkTable}>
            <option value="">(columna)</option>
            {(refTbl?.cols||[]).map(c=><option key={c.name} value={c.name}>{c.pk?'🔑 ':''}{c.name}</option>)}

      </div>
      <div style={{display:'flex',gap:8}}>
        <button className="btn btn-sm" onClick={onClose}>Cancelar</button>

        {col.fk_table && <button className="btn btn-danger btn-sm" onClick={()=>onSave('','')}>Eliminar FK</button>}
      </div>
    </div>
  );
}

  const[editing,setEditing]=useState(null);
  const[noteText,setNoteText]=useState('');
  const[detailTab,setDetailTab]=useState('timeline');
  const[composing,setComposing]=useState(false);
  const eF={name:'',email:'',phone:'',company:'',position:'',stage:'lead',source:'manual',notes:''};
  const[form,setForm]=useState(eF);
  const sf=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const contacts=useMemo(()=>store.contacts.filter(c=>{
    if(stageF&&c.stage!==stageF)return false;
    const q=search.toLowerCase();
    if(q&&!c.name.toLowerCase().includes(q)&&!(c.company||'').toLowerCase().includes(q)&&!(c.email||'').toLowerCase().includes(q))return false;
    return true;
  }),[store.contacts,search,stageF]);

  const selDeals=sel?store.deals.filter(d=>d.contact_id===sel.id):[];
  const selNotes=sel?store.notes.filter(n=>n.contact_id===sel.id).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)):[];

      const newContact={id:uid(),...form};

      setStore(s=>({...s,contacts:[...s.contacts,newContact],tasks:[...s.tasks,...adds.tasks],notes:[...s.notes,...adds.notes]}));

                  <div style={{display:'flex',justifyContent:'space-between',marginTop:5,alignItems:'center'}}>
                    <Badge stage={d.stage}/>
                    <span style={{fontSize:13,fontWeight:700,color:'var(--accent2)'}}>{eur(d.value)}</span>
                  </div>
                  {d.close_date&&<div style={{fontSize:11,color:'var(--text3)',marginTop:3}}>Cierre: {fmtDate(d.close_date)}</div>}
                </div>
              ))
            )}
            {detailTab==='notes' && (
              <div>
                <div style={{display:'flex',gap:6,marginBottom:10}}>
                  <input className="form-input" style={{flex:1,fontSize:12}} placeholder="Añadir nota..." value={noteText} maxLength={2000} onChange={e=>setNoteText(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addNote();}}/>
                  <button className="btn btn-accent btn-sm" onClick={addNote}>{Ic.plus}</button>
                </div>
                {selNotes.map(n=>(
                  <div key={n.id} style={{background:'var(--bg3)',borderRadius:'var(--r)',padding:'8px 10px',marginBottom:6,position:'relative'}}>
                    <div style={{fontSize:12,color:'var(--text2)',paddingRight:20}}>{n.content}</div>
                    <div style={{fontSize:10,color:'var(--text3)',marginTop:3}}>{timeAgo(n.created_at)}</div>
                    <button style={{position:'absolute',top:6,right:6,background:'none',border:'none',color:'var(--text3)',cursor:'pointer',padding:2}} onClick={()=>delNote(n.id)}>{Ic.trash}</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </>}
      </div>
      <Modal open={modal} onClose={()=>setModal(false)} title={editing?'Editar contacto':'Nuevo contacto'}>
        <div className="modal-body">
          <div className="form-row">
            <div className="form-field"><label className="form-label">Nombre *</label><input className="form-input" value={form.name} onChange={sf('name')} maxLength={200}/></div>
            <div className="form-field"><label className="form-label">Email</label><input className="form-input" type="email" value={form.email} onChange={sf('email')} maxLength={200}/></div>
          </div>
          <div className="form-row">
            <div className="form-field"><label className="form-label">Empresa</label><input className="form-input" value={form.company} onChange={sf('company')} maxLength={200}/></div>
            <div className="form-field"><label className="form-label">Cargo</label><input className="form-input" value={form.position} onChange={sf('position')} maxLength={200}/></div>
          </div>
          <div className="form-row">
            <div className="form-field"><label className="form-label">Etapa</label><select className="form-select" value={form.stage} onChange={sf('stage')}>{STAGES.map(s=><option key={s} value={s}>{SL[s]}</option>)}</select></div>
            <div className="form-field"><label className="form-label">Fuente</label><select className="form-select" value={form.source} onChange={sf('source')}>{Object.entries(SRCS).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></div>
          </div>
          <div className="form-field"><label className="form-label">Notas</label><textarea className="form-input" value={form.notes} onChange={sf('notes')}/></div>
        </div>
        <div className="modal-footer"><button className="btn" onClick={()=>setModal(false)}>Cancelar</button><button className="btn btn-accent" onClick={submit}>{Ic.save} Guardar</button></div>
      </Modal>
    </div>
  );
}

/* ══════════════════════════════════════════════
   PIPELINE
══════════════════════════════════════════════ */
function Pipeline(){
  const[store,setStore]=useStore();
  const[modal,setModal]=useState(false);
  const[editing,setEditing]=useState(null);
  const eF={contact_id:'',title:'',value:'',stage:'lead',description:'',close_date:''};
  const[form,setForm]=useState(eF);
  const sf=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const STAGES_KANBAN=['lead','proposal','negotiation','won'];
  const stageColors={lead:'#3b9eff',proposal:'#f5a623',negotiation:'#7c6af7',won:'#22c97a'};
  function submit(){
    if(!form.title.trim()){showToast('El título es obligatorio','error');return;}
    setStore(s=>{
      const rawVal=parseFloat(form.value)||0;const deal={...form,value:isFinite(rawVal)&&rawVal>=0&&rawVal<=999999999?rawVal:0};
      if(editing)return{...s,deals:s.deals.map(d=>d.id===editing.id?{...d,...deal}:d)};
      return{...s,deals:[...s.deals,{id:uid(),...deal}]};
    });
    showToast(editing?'Deal actualizado':'Deal creado ✓');setModal(false);
  }
  function del(id){if(!confirm('¿Eliminar deal?'))return;setStore(s=>({...s,deals:s.deals.filter(d=>d.id!==id)}));showToast('Deal eliminado');}
  return(
    <div>
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:14}}>
        <button className="btn btn-accent" onClick={()=>{setEditing(null);setForm(eF);setModal(true);}}>{Ic.plus} Nuevo deal</button>
      </div>
      <div className="kanban">
        {STAGES_KANBAN.map(s=>{
          const col=store.deals.filter(d=>d.stage===s);
          const total=col.reduce((a,d)=>a+d.value,0);
          return(
            <div key={s} className="kanban-col">
              <div className="kanban-col-header">
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:stageColors[s]}}/>
                  <span style={{fontFamily:'var(--font-head)',fontSize:13,fontWeight:600}}>{SL[s]}</span>
                  <span style={{background:'var(--bg4)',color:'var(--text3)',fontSize:11,padding:'1px 6px',borderRadius:99}}>{col.length}</span>
                </div>
                <span style={{fontSize:12,color:'var(--accent2)',fontWeight:600}}>{eur(total)}</span>
              </div>
              {col.map(d=>{const c=store.contacts.find(x=>x.id===d.contact_id);return(
                <div key={d.id} className="deal-card">
                  <div className="deal-name">{d.title}</div>
                  {c&&<div className="deal-company">{c.name} · {c.company||'—'}</div>}
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:6}}>
                    <span className="deal-value">{eur(d.value)}</span>
                    <div style={{display:'flex',gap:4}}>
                      <button className="btn btn-ghost btn-sm" onClick={()=>{setEditing(d);setForm({...d,value:String(d.value)});setModal(true);}}>{Ic.edit}</button>
                      <button className="btn btn-ghost btn-sm" style={{color:'var(--red)'}} onClick={()=>del(d.id)}>{Ic.trash}</button>
                    </div>
                  </div>
                  {d.close_date&&<div className="deal-date">{fmtDate(d.close_date)}</div>}
                </div>
              );})}
            </div>
          );
        })}
      </div>
      <Modal open={modal} onClose={()=>setModal(false)} title={editing?'Editar deal':'Nuevo deal'}>
        <div className="modal-body">
          <div className="form-field"><label className="form-label">Título *</label><input className="form-input" value={form.title} onChange={sf('title')} maxLength={200}/></div>
          <div className="form-row">
            <div className="form-field"><label className="form-label">Valor (€)</label><input className="form-input" type="number" value={form.value} onChange={sf('value')}/></div>
            <div className="form-field"><label className="form-label">Etapa</label><select className="form-select" value={form.stage} onChange={sf('stage')}>{STAGES.map(s=><option key={s} value={s}>{SL[s]}</option>)}</select></div>
          </div>
          <div className="form-row">
            <div className="form-field"><label className="form-label">Contacto</label><select className="form-select" value={form.contact_id} onChange={sf('contact_id')}><option value="">Sin contacto</option>{getStore().contacts.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
            <div className="form-field"><label className="form-label">Fecha cierre</label><input className="form-input" type="date" value={form.close_date} onChange={sf('close_date')}/></div>
          </div>
          <div className="form-field"><label className="form-label">Descripción</label><textarea className="form-input" value={form.description} onChange={sf('description')}/></div>
        </div>
        <div className="modal-footer"><button className="btn" onClick={()=>setModal(false)}>Cancelar</button><button className="btn btn-accent" onClick={submit}>{Ic.save} Guardar</button></div>
      </Modal>
    </div>
  );
}

/* ══════════════════════════════════════════════
   TASKS
══════════════════════════════════════════════ */
function Tasks(){
  const[store,setStore]=useStore();
  const[filter,setFilter]=useState('all');
  const[modal,setModal]=useState(false);
  const[editing,setEditing]=useState(null);
  const eF={contact_id:'',title:'',description:'',due_date:'',priority:'medium',done:false};
  const[form,setForm]=useState(eF);
  const sf=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const tasks=useMemo(()=>{const t=store.tasks;if(filter==='pending')return t.filter(x=>!x.done);if(filter==='done')return t.filter(x=>x.done);return t;},[store.tasks,filter]);
  function toggle(t){setStore(s=>({...s,tasks:s.tasks.map(x=>x.id===t.id?{...x,done:!x.done}:x)}));}
  function submit(){
    if(!form.title.trim()){showToast('El título es obligatorio','error');return;}
    setStore(s=>{if(editing)return{...s,tasks:s.tasks.map(t=>t.id===editing.id?{...t,...form}:t)};return{...s,tasks:[...s.tasks,{id:uid(),...form}]};});
    showToast(editing?'Tarea actualizada':'Tarea creada ✓');setModal(false);
  }
  function del(t){if(!confirm('¿Eliminar tarea?'))return;setStore(s=>({...s,tasks:s.tasks.filter(x=>x.id!==t.id)}));showToast('Tarea eliminada');}
  return(
    <div>
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:14}}>
        {[['all','Todas'],['pending','Pendientes'],['done','Completadas']].map(([v,l])=>(
          <button key={v} className={`btn btn-sm ${filter===v?'btn-accent':''}`} onClick={()=>setFilter(v)}>{l}</button>
        ))}
        <button className="btn btn-accent btn-sm" style={{marginLeft:'auto'}} onClick={()=>{setEditing(null);setForm(eF);setModal(true);}}>{Ic.plus} Nueva tarea</button>
      </div>
      <div className="card" style={{padding:0}}>
        {tasks.length===0?<div className="empty"><div className="empty-title">Sin tareas</div></div>:
          tasks.map(t=>{
            const c=store.contacts.find(x=>x.id===t.contact_id);
            const overdue=!t.done&&t.due_date&&t.due_date<todayStr();
            return(
              <div key={t.id} className="task-item" style={{padding:'12px 16px'}}>
                <div className={`task-check ${t.done?'done':''}`} onClick={()=>toggle(t)}>{t.done&&Ic.check}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div className={`task-text ${t.done?'done':''}`}>{t.title}</div>
                  {t.description&&<div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>{t.description}</div>}
                  <div style={{display:'flex',gap:8,marginTop:4,flexWrap:'wrap'}}>
                    {c&&<div className="task-contact">{c.name}</div>}
                    <div className="task-date" style={{color:overdue?'var(--red)':'var(--text3)'}}>{fmtDate(t.due_date)}{overdue?' ⚠️':''}</div>
                    <Badge stage={t.priority} type="priority"/>
                  </div>
                </div>
                <div style={{display:'flex',gap:4}}>
                  <button className="btn btn-ghost btn-sm" onClick={()=>{setEditing(t);setForm({...t});setModal(true);}}>{Ic.edit}</button>
                  <button className="btn btn-ghost btn-sm" style={{color:'var(--red)'}} onClick={()=>del(t)}>{Ic.trash}</button>
                </div>
              </div>
            );
          })
        }
      </div>
      <Modal open={modal} onClose={()=>setModal(false)} title={editing?'Editar tarea':'Nueva tarea'}>
        <div className="modal-body">
          <div className="form-field"><label className="form-label">Título *</label><input className="form-input" value={form.title} onChange={sf('title')}/></div>
          <div className="form-field"><label className="form-label">Descripción</label><textarea className="form-input" value={form.description} onChange={sf('description')}/></div>
          <div className="form-row">
            <div className="form-field"><label className="form-label">Contacto</label><select className="form-select" value={form.contact_id} onChange={sf('contact_id')}><option value="">Sin contacto</option>{getStore().contacts.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
            <div className="form-field"><label className="form-label">Prioridad</label><select className="form-select" value={form.priority} onChange={sf('priority')}>{Object.entries(PL).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></div>
          </div>
          <div className="form-field"><label className="form-label">Fecha límite</label><input className="form-input" type="date" value={form.due_date} onChange={sf('due_date')}/></div>
        </div>
        <div className="modal-footer"><button className="btn" onClick={()=>setModal(false)}>Cancelar</button><button className="btn btn-accent" onClick={submit}>{Ic.save} Guardar</button></div>
      </Modal>
    </div>
  );
}

/* ══════════════════════════════════════════════
   NAV BADGE & RESET
══════════════════════════════════════════════ */
function NavBadge({view}){
  const[store]=useStore();
  const count={contacts:store.contacts.length,pipeline:store.deals.filter(d=>d.stage!=='won'&&d.stage!=='lost').length,tasks:store.tasks.filter(t=>!t.done).length,docs:(store.documents||[]).length}[view];
  if(!count)return null;
  return <span className="nav-badge">{count}</span>;
}
function ResetButton(){
  return(
    <button className="btn btn-ghost btn-sm" style={{color:'var(--text3)',fontSize:11}} onClick={()=>{if(!confirm('¿Restablecer datos de demo?'))return;localStorage.removeItem(LS_KEY);window.location.reload();}}>
      {Ic.reset} Resetear
    </button>
  );
}

  dashboard:{label:'Dashboard',icon:Ic.dashboard,section:'CRM'},
  contacts:{label:'Contactos',icon:Ic.contacts,section:'CRM'},
  pipeline:{label:'Pipeline',icon:Ic.pipeline,section:'CRM'},
  tasks:{label:'Tareas',icon:Ic.tasks,section:'CRM'},
  automations:{label:'Automatizaciones',icon:'⚡',section:'CRM'},
};
const VIEWS_TOOLS={
  docs:{label:'Procesador de Textos',icon:Ic.docs,section:'Herramientas'},
  charts:{label:'Visualizaciones',icon:Ic.chart,section:'Herramientas'},
  warehouse:{label:'Data Warehouse',icon:Ic.database,section:'Herramientas'},
};
const PAGE_TITLES={
  dashboard:'Dashboard',contacts:'Contactos',pipeline:'Pipeline',tasks:'Tareas',
  automations:'Automatizaciones',
  docs:'Procesador de Textos',charts:'Visualizaciones & Gráficos',warehouse:'Data Warehouse & SQL',
};

/* ══════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════ */
function SaveButton() {
  const [store] = useStore();
  const [saving, setSaving] = useState(false);
  const [lastSaved, setLastSaved] = useState(() => {
    try { const t = localStorage.getItem(LS_KEY+'_ts'); return t ? new Date(t) : null; } catch { return null; }
  });

  function handleSave() {
    setSaving(true);
    try {
      localStorage.setItem(LS_KEY, JSON.stringify(store));
      const now = new Date();
      localStorage.setItem(LS_KEY+'_ts', now.toISOString());
      setLastSaved(now);
      showToast('✓ Todo guardado correctamente');
    } catch(e) {
      showToast('Error al guardar — puede que el almacenamiento esté lleno', 'error');
    }
    setTimeout(() => setSaving(false), 800);
  }

  const timeSince = lastSaved ? (() => {
    const diff = Math.floor((Date.now() - lastSaved) / 1000);
    if (diff < 60) return `${diff}s`;
    if (diff < 3600) return `${Math.floor(diff/60)}m`;
    return `${Math.floor(diff/3600)}h`;
  })() : null;

  return (
    <button className="btn btn-accent btn-sm" onClick={handleSave} disabled={saving}
      title="Guardar todo el estado del CRM (Ctrl+S)"
      style={{display:'flex',alignItems:'center',gap:5,fontSize:12,opacity:saving?0.7:1}}>
      {saving ? (
        <span style={{display:'inline-block',width:10,height:10,border:'1.5px solid rgba(255,255,255,0.4)',borderTopColor:'white',borderRadius:'50%',animation:'spin 0.6s linear infinite'}}/>
      ) : Ic.save}
      {saving ? 'Guardando...' : 'Guardar'}
      {timeSince && !saving && <span style={{opacity:.65,fontSize:10}}>({timeSince})</span>}
    </button>
  );
}

function App(){
  const[view,setView]=useState('dashboard');
  const[store]=useStore();

  // Global Ctrl+S handler
  useEffect(() => {
    function handleGlobalKeyDown(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        try {
          localStorage.setItem(LS_KEY, JSON.stringify(store));
          localStorage.setItem(LS_KEY+'_ts', new Date().toISOString());
          showToast('✓ Guardado con Ctrl+S');
        } catch(err) {
          showToast('Error al guardar', 'error');
        }
      }
    }
    document.addEventListener('keydown', handleGlobalKeyDown);
    return () => document.removeEventListener('keydown', handleGlobalKeyDown);
  }, [store]);

  return(
    <div className="app">
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div className="sidebar">
        <div className="logo">
          <div className="logo-icon"><svg viewBox="0 0 16 16"><path d="M8 1L14 4.5V11.5L8 15L2 11.5V4.5L8 1Z" fill="white"/></svg></div>

        </div>
        <div style={{padding:'0.5rem 0',flex:1}}>
          <div className="nav-section">CRM</div>
          {Object.entries(VIEWS_CRM).map(([k,v])=>(
            <div key={k} className={`nav-item ${view===k?'active':''}`} onClick={()=>setView(k)}>
              <span className="nav-icon">{v.icon}</span>{v.label}<NavBadge view={k}/>
            </div>
          ))}

          {Object.entries(VIEWS_TOOLS).map(([k,v])=>(
            <div key={k} className={`nav-item ${view===k?'active':''}`} onClick={()=>setView(k)}>
              <span className="nav-icon">{v.icon}</span><span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,fontSize:12.5}}>{v.label}</span><NavBadge view={k}/>
            </div>
          ))}
        </div>
        <div className="sidebar-footer">
          <div style={{display:'flex',alignItems:'center',gap:5,padding:'0 8px 8px',fontSize:11,color:'var(--green)'}}>
            <div style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',flexShrink:0,boxShadow:'0 0 6px var(--green)'}}/>
            Autosave activo · Ctrl+S para guardar
          </div>
          <div className="user-card">
            <div className="user-avatar">A</div>
            <div><div className="user-name">Admin</div><div className="user-role">Data Analyst</div></div>
          </div>
          <div style={{marginTop:6}}><ResetButton/></div>
        </div>
      </div>
      <div className="main">
        <div className="topbar">
          <div className="topbar-left">
            <span className="page-title">{PAGE_TITLES[view]||view}</span>
            <span className="section-pill">
              <span style={{width:6,height:6,borderRadius:'50%',background:['docs','charts','warehouse'].includes(view)?'var(--teal)':'var(--accent)',display:'inline-block'}}/>
              {['docs','charts','warehouse'].includes(view)?'Analytics Suite':'CRM'}
            </span>
          </div>
          <div className="topbar-right">
            <div style={{position:'relative'}}>
              <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'var(--text3)',pointerEvents:'none'}}>{Ic.search}</span>
              <input style={{background:'var(--bg3)',border:'1px solid var(--border)',color:'var(--text)',padding:'6px 10px 6px 32px',borderRadius:'var(--r)',fontSize:13,fontFamily:'var(--font-body)',width:200,outline:'none'}} placeholder="Buscar..."/>
            </div>
            <SaveButton/>
          </div>
        </div>
        <div className="content">
          {view==='dashboard'&&<Dashboard onNav={setView}/>}
          {view==='contacts'&&<Contacts/>}
          {view==='pipeline'&&<Pipeline/>}
          {view==='tasks'&&<Tasks/>}
          {view==='automations'&&<Automations/>}
          {view==='docs'&&<DocumentProcessor/>}
          {view==='charts'&&<Visualizaciones/>}
          {view==='warehouse'&&<DataWarehouse/>}
        </div>
      </div>
      <Chatbot currentView={PAGE_TITLES[view]||view}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
