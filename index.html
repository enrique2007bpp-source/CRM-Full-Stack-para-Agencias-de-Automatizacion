                <strong>Tipos disponibles:</strong><br/>TEXT — cadena de texto<br/>INTEGER — número entero<br/>REAL — decimal<br/>BOOLEAN — verdadero/falso<br/>DATE — fecha<br/>DATETIME — fecha+hora<br/>BLOB — datos binarios
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Data Grid (tabla de datos editable) ──────
function DataGrid({ table, onUpdate }) {
  const [editCell, setEditCell] = useState(null);
  const [editVal, setEditVal] = useState('');
  const [selRow, setSelRow] = useState(null);
  const [newRowData, setNewRowData] = useState(null);
  const [sortCol, setSortCol] = useState(null);
  const [sortDir, setSortDir] = useState('asc');
  const [filterText, setFilterText] = useState('');
  const [ctxMenu, setCtxMenu] = useState(null);
  const editRef = useRef(null);

  if (!table) return <div className="empty"><div className="empty-title">Selecciona una tabla</div></div>;

  const cols = table.cols || [];
  const pkIdx = cols.findIndex(c => c.pk);

  let rows = [...(table.rows || [])];

  // Filter
  if (filterText.trim()) {
    const q = filterText.toLowerCase();
    rows = rows.filter(r => r.some(cell => String(cell ?? '').toLowerCase().includes(q)));
  }

  // Sort
  if (sortCol !== null) {
    rows.sort((a, b) => {
      const av = a[sortCol] ?? '', bv = b[sortCol] ?? '';
      const an = parseFloat(av), bn = parseFloat(bv);
      const cmp = (!isNaN(an) && !isNaN(bn)) ? an - bn : String(av).localeCompare(String(bv));
      return sortDir === 'asc' ? cmp : -cmp;
    });
  }

  function getNextId() {
    if (pkIdx < 0) return String(table.rows.length + 1);
    const vals = table.rows.map(r => parseInt(r[pkIdx]) || 0);
    return String(Math.max(0, ...vals) + 1);
  }

  function startEdit(rowIdx, colIdx) {
    setEditCell({ row: rowIdx, col: colIdx });
    setEditVal(String(table.rows[rowIdx]?.[colIdx] ?? ''));
    setTimeout(() => editRef.current?.focus(), 0);
  }

  function commitEdit() {
    if (!editCell) return;
    const nr = table.rows.map((r, ri) => ri === editCell.row ? r.map((cell, ci) => ci === editCell.col ? editVal : cell) : r);
    onUpdate({ ...table, rows: nr });
    setEditCell(null);
  }

  function addRow() {
    const newRow = cols.map((c, i) => {
      if (c.pk) return getNextId();
      return c.default || '';
    });
    const nr = [...table.rows, newRow];
    onUpdate({ ...table, rows: nr });
    setSelRow(nr.length - 1);
  }

  function deleteRow(ri) {
    const actualIdx = table.rows.indexOf(rows[ri]);
    if (actualIdx < 0) return;
    const nr = table.rows.filter((_, i) => i !== actualIdx);
    onUpdate({ ...table, rows: nr });
    setSelRow(null);
  }

  function dupRow(ri) {
    const r = [...rows[ri]];
    if (pkIdx >= 0) r[pkIdx] = getNextId();
    const nr = [...table.rows, r];
    onUpdate({ ...table, rows: nr });
  }

  function importCSVToTable() {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.csv,.tsv';
    inp.onchange = e => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const parsed = parseCSVRobust(ev.target.result);
        // Map CSV cols to table cols
        const nr = [...table.rows];
        parsed.rows.forEach(r => {
          const newRow = cols.map((c, ci) => {
            if (c.pk) return getNextId();
            const csvIdx = parsed.cols.findIndex(pc => pc.toUpperCase() === c.name.toUpperCase());
            return csvIdx >= 0 ? r[csvIdx] : (c.default || '');
          });
          nr.push(newRow);
        });
        onUpdate({ ...table, rows: nr });
        showToast(`${parsed.rows.length} filas importadas ✓`);
      };
      reader.readAsText(file, 'UTF-8');
    };
    inp.click();
  }

  function exportCSVFromTable() {
    const header = cols.map(c => c.name).join(',');
    const body = table.rows.map(r => r.map(cell => {
      const s = String(cell ?? '');
      return s.includes(',') || s.includes('"') ? `"${s.replace(/"/g,'""')}"` : s;
    }).join(',')).join('\n');
    const blob = new Blob([header + '\n' + body], {type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = table.name + '.csv';
    a.click(); URL.revokeObjectURL(url);
    showToast('CSV exportado ✓');
  }

  function handleCellKeyDown(e) {
    if (e.key === 'Escape') { setEditCell(null); return; }
    if (e.key === 'Enter') { e.preventDefault(); commitEdit(); }
    if (e.key === 'Tab') { e.preventDefault(); commitEdit(); }
  }

  useEffect(() => {
    if (ctxMenu) {
      const h = () => setCtxMenu(null);
      document.addEventListener('click', h);
      return () => document.removeEventListener('click', h);
    }
  }, [ctxMenu]);

  return (
    <div className="data-grid">
      {/* Toolbar */}
      <div className="access-toolbar">
        <span style={{fontSize:12,fontWeight:700,color:'var(--accent2)',marginRight:4}}>📋 {table.name}</span>
        <span style={{fontSize:11,color:'var(--text3)'}}>{table.rows.length} registros · {cols.length} campos</span>
        <div className="toolbar-sep"/>
        <button className="toolbar-btn" style={{fontSize:11}} onClick={addRow}>➕ Nuevo registro</button>
        <button className="toolbar-btn" style={{fontSize:11}} onClick={importCSVToTable}>↑ Importar CSV</button>
        <button className="toolbar-btn" style={{fontSize:11}} onClick={exportCSVFromTable}>↓ Exportar CSV</button>
        <div className="toolbar-sep"/>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:11,color:'var(--text3)'}}>🔍</span>
          <input value={filterText} onChange={e=>setFilterText(e.target.value)} placeholder="Filtrar..."
            style={{background:'var(--bg4)',border:'1px solid var(--border)',color:'var(--text)',padding:'3px 8px',borderRadius:5,fontSize:12,outline:'none',width:160}}/>
          {filterText && <button className="toolbar-btn" style={{fontSize:11,padding:'2px 5px'}} onClick={()=>setFilterText('')}>✕</button>}
        </div>
      </div>
      {/* Header */}
      <div className="dg-header">
        <div className="dg-hcell" style={{minWidth:36,background:'var(--bg4)',padding:'6px 8px'}}></div>
        {pkIdx >= 0 && <div className="dg-hcell pk">🔑 {cols[pkIdx]?.name}</div>}
        {cols.map((c, i) => i !== pkIdx && (
          <div key={i} className="dg-hcell" onClick={() => { setSortCol(i); setSortDir(sortCol===i&&sortDir==='asc'?'desc':'asc'); }}>
            <span style={{fontSize:10,color:'var(--text3)',marginRight:3}}>{FIELD_TYPE_ICONS[c.type]||'Aa'}</span>
            {c.name}
            {sortCol===i && <span style={{fontSize:10}}>{sortDir==='asc'?'↑':'↓'}</span>}
          </div>
        ))}
        <div className="dg-hcell" style={{minWidth:60,background:'var(--bg4)'}}>Acciones</div>
      </div>
      {/* Rows */}
      <div className="dg-body">
        {rows.length === 0 && (
          <div style={{padding:'32px',textAlign:'center',color:'var(--text3)'}}>
            <div style={{fontSize:32,marginBottom:8}}>📭</div>
            <div style={{fontSize:14,fontWeight:600,color:'var(--text2)',marginBottom:4}}>Sin registros</div>
            <div style={{fontSize:12}}>Haz clic en "Nuevo registro" para añadir datos</div>
          </div>
        )}
        {rows.map((row, ri) => {
          const actualIdx = table.rows.indexOf(row);
          return (
            <div key={ri} className={`dg-row${selRow===actualIdx?' selected':''}`}
              onClick={() => setSelRow(actualIdx)}
              onContextMenu={e => { e.preventDefault(); setCtxMenu({x:e.clientX,y:e.clientY,ri:actualIdx,rowData:row}); }}>
              <div className="dg-cell" style={{minWidth:36,justifyContent:'center',background:'var(--bg3)',fontSize:11,color:'var(--text3)'}}>{ri+1}</div>
              {pkIdx >= 0 && <div className="dg-cell pk"><div style={{padding:'5px 8px',fontSize:12}}>{row[pkIdx]}</div></div>}
              {cols.map((c, ci) => {
                if (ci === pkIdx) return null;
                const isEditing = editCell?.row === actualIdx && editCell?.col === ci;
                const val = String(row[ci] ?? '');
                return (
                  <div key={ci} className={`dg-cell${isEditing?' editing':''}`} onDoubleClick={() => startEdit(actualIdx, ci)}>
                    {isEditing ? (
                      c.type === 'BOOLEAN' ? (
                        <select ref={editRef} value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={commitEdit} onKeyDown={handleCellKeyDown}>
                          <option value="">—</option><option value="1">Sí</option><option value="0">No</option>
                        </select>
                      ) : c.type === 'DATE' ? (
                        <input ref={editRef} type="date" value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={commitEdit} onKeyDown={handleCellKeyDown}/>
                      ) : c.type === 'DATETIME' ? (
                        <input ref={editRef} type="datetime-local" value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={commitEdit} onKeyDown={handleCellKeyDown}/>
                      ) : (
                        <input ref={editRef} type={c.type==='INTEGER'||c.type==='REAL'?'number':'text'}
                          value={editVal} onChange={e=>setEditVal(e.target.value)} onBlur={commitEdit} onKeyDown={handleCellKeyDown}/>
                      )
                    ) : (
                      <div style={{padding:'5px 8px',fontSize:12.5,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                        color: c.type==='BOOLEAN' ? (val==='1'?'var(--green)':'var(--text3)') : 'var(--text)'}}>
                        {c.type==='BOOLEAN' ? (val==='1'?'✓ Sí':'✗ No') : val || <span style={{color:'var(--text3)',fontStyle:'italic'}}>—</span>}
                      </div>
                    )}
                  </div>
                );
              })}
              <div className="dg-cell" style={{minWidth:60,gap:2,justifyContent:'center',background:'var(--bg3)'}}>
                <button className="btn btn-ghost btn-sm" style={{padding:'2px 5px',fontSize:11}} onClick={e=>{e.stopPropagation();dupRow(ri)}} title="Duplicar">⎘</button>
                <button className="btn btn-ghost btn-sm" style={{padding:'2px 5px',fontSize:11,color:'var(--red)'}} onClick={e=>{e.stopPropagation();if(confirm('¿Eliminar registro?'))deleteRow(ri);}} title="Eliminar">✕</button>
              </div>
            </div>
          );
        })}
        {/* New row footer */}
        <div className="dg-row new-row" onClick={addRow} style={{cursor:'pointer',opacity:.6}}>
          <div className="dg-cell" style={{minWidth:36,justifyContent:'center',background:'var(--bg3)',fontSize:16}}>+</div>
          {pkIdx >= 0 && <div className="dg-cell pk"><div style={{padding:'5px 8px',fontSize:11,color:'var(--text3)'}}>(auto)</div></div>}
          {cols.map((c, ci) => ci !== pkIdx && <div key={ci} className="dg-cell"><div style={{padding:'5px 8px',fontSize:12,color:'var(--text3)',fontStyle:'italic'}}>Haz clic para añadir</div></div>)}
          <div className="dg-cell" style={{minWidth:60}}/>
        </div>
      </div>
      {/* Context menu */}
      {ctxMenu && (
        <div className="ctx-menu" style={{top:ctxMenu.y,left:ctxMenu.x}}>
          <div className="ctx-item" onClick={()=>{dupRow(table.rows.indexOf(ctxMenu.rowData));setCtxMenu(null);}}>⎘ Duplicar registro</div>
          <div className="ctx-item" onClick={()=>{
            navigator.clipboard?.writeText(ctxMenu.rowData.join('\t')).catch(()=>{});
            showToast('Fila copiada ✓'); setCtxMenu(null);
          }}>📋 Copiar fila</div>
          <div className="ctx-sep"/>
          <div className="ctx-item danger" onClick={()=>{
            if(confirm('¿Eliminar registro?')) { const ri=rows.findIndex(r=>r===ctxMenu.rowData); deleteRow(ri); }
            setCtxMenu(null);
          }}>✕ Eliminar registro</div>
        </div>
      )}
    </div>
  );
}

    ['UPDATE', `UPDATE ${tables[0]?.name || 'tabla'}\nSET col1 = 'nuevo'\nWHERE ID = 1`],
    ['DELETE', `DELETE FROM ${tables[0]?.name || 'tabla'}\nWHERE ID = 1`],
    ['CREATE TABLE', `CREATE TABLE NuevaTbla (\n  ID INTEGER PRIMARY KEY,\n  Nombre TEXT NOT NULL,\n  Valor REAL,\n  Activo BOOLEAN DEFAULT '1'\n)`],
    ['JOIN', tables.length >= 2 ? `SELECT a.*, b.*\nFROM ${tables[0]?.name} a\nINNER JOIN ${tables[1]?.name} b ON a.ID = b.${tables[0]?.name}_ID` : `-- Necesitas al menos 2 tablas para JOIN`],
  ];

  function execute() {
    const q = mode === 'sql' ? sql.trim() : buildVisualSQL();
    if (!q) return;
    // Add to history
    setHistory(prev => [q, ...prev.filter(h => h !== q)].slice(0, 30));
    // Clone tables for safe mutation
    const tCopy = tables.map(t => ({...t, cols:[...t.cols], rows:t.rows.map(r=>[...r])}));
    const res = MicroSQL.execute(q, tCopy);
    if (res.error) {
      setError(res.error); setResult(null);
    } else {
      setResult(res); setError(null);
      if (res.tables) onQueryResult(res.tables);
    }
  }

  function buildVisualSQL() {
    const tbl = tables.find(t => t.name === vTable);
    if (!tbl) return '';
    const fields = vFields.length > 0 ? vFields.join(', ') : '*';
    let q = `SELECT ${fields}\nFROM ${vTable}`;
    const conditions = vWhere.filter(w => w.field && w.op);
    if (conditions.length > 0) {
      const clause = conditions.map((w, i) => {
        const v = w.op.includes('NULL') ? '' : ` '${w.val}'`;
        return (i > 0 ? w.and + ' ' : '') + `${w.field} ${w.op}${v}`;
      }).join('\n  ');
      q += `\nWHERE ${clause}`;
    }
    if (vOrder) q += `\nORDER BY ${vOrder} ${vDir}`;
    if (vLimit) q += `\nLIMIT ${vLimit}`;
    return q;
  }

  function exportResult() {
    if (!result?.rows) return;
    const header = result.cols.join(',');
    const body = result.rows.map(r => r.map(c => {
      const s = String(c ?? ''); return s.includes(',') ? `"${s}"` : s;
    }).join(',')).join('\n');
    const blob = new Blob([header+'\n'+body], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'consulta.csv';
    a.click(); URL.revokeObjectURL(url);
    showToast('Resultados exportados ✓');
  }

  const OPS = ['=','!=','<','>','<=','>=','LIKE','NOT LIKE','IS NULL','IS NOT NULL'];
  const selTbl = tables.find(t => t.name === vTable);

  return (
    <div className="qb-layout">
      {/* Mode tabs & toolbar */}
      <div className="access-toolbar">
        <button className={`toolbar-btn${mode==='visual'?' active':''}`} onClick={()=>setMode('visual')}>⚙️ Visual</button>
        <button className={`toolbar-btn${mode==='sql'?' active':''}`} onClick={()=>setMode('sql')}>💻 SQL</button>
        <div className="toolbar-sep"/>
        <button className="btn btn-accent btn-sm" onClick={execute} style={{fontSize:12}}>▶ Ejecutar</button>
        <div className="toolbar-sep"/>
        {mode === 'sql' && SNIPPET_TEMPLATES.map(([label, tmpl]) => (
          <button key={label} className="toolbar-btn" style={{fontSize:11}} onClick={() => setSql(tmpl)}>{label}</button>
        ))}
        {result?.rows && (
          <>
            <div className="toolbar-sep"/>
            <button className="toolbar-btn" style={{fontSize:11,marginLeft:'auto'}} onClick={exportResult}>↓ CSV</button>
            <span style={{fontSize:11,color:'var(--green)',padding:'0 6px'}}>{result.rowCount} resultado(s)</span>
          </>
        )}
      </div>

      {/* Visual builder or SQL editor */}
      {mode === 'visual' ? (
        <div style={{padding:14,borderBottom:'1px solid var(--border)',background:'var(--bg3)',flexShrink:0,display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:6,textTransform:'uppercase'}}>Tabla</div>
            <select className="form-select" style={{fontSize:12}} value={vTable} onChange={e=>{setVTable(e.target.value);setVFields([]);}}>
              {tables.map(t => <option key={t.id} value={t.name}>{t.name}</option>)}
            </select>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',margin:'10px 0 6px',textTransform:'uppercase'}}>Campos a mostrar</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
              {selTbl?.cols.map(c => (
                <label key={c.name} style={{display:'flex',alignItems:'center',gap:4,fontSize:11.5,cursor:'pointer',
                  background:vFields.includes(c.name)?'var(--accent-bg)':'var(--bg4)',
                  border:`1px solid ${vFields.includes(c.name)?'var(--accent)':'var(--border)'}`,
                  borderRadius:4,padding:'3px 7px',color:vFields.includes(c.name)?'var(--accent2)':'var(--text2)',transition:'all var(--transition)'}}>
                  <input type="checkbox" style={{display:'none'}} checked={vFields.includes(c.name)}
                    onChange={e=>setVFields(prev=>e.target.checked?[...prev,c.name]:prev.filter(f=>f!==c.name))}/>
                  {FIELD_TYPE_ICONS[c.type]||'Aa'} {c.name}
                </label>
              ))}
            </div>
            <div style={{display:'flex',gap:8,marginTop:10}}>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:'var(--text3)',marginBottom:3}}>Ordenar por</div>
                <select className="form-select" style={{fontSize:12}} value={vOrder} onChange={e=>setVOrder(e.target.value)}>
                  <option value="">(ninguno)</option>
                  {selTbl?.cols.map(c=><option key={c.name} value={c.name}>{c.name}</option>)}
                </select>
              </div>
              <div>
                <div style={{fontSize:11,color:'var(--text3)',marginBottom:3}}>Dirección</div>
                <select className="form-select" style={{fontSize:12,width:80}} value={vDir} onChange={e=>setVDir(e.target.value)}>
                  <option value="ASC">↑ ASC</option><option value="DESC">↓ DESC</option>
                </select>
              </div>
              <div>
                <div style={{fontSize:11,color:'var(--text3)',marginBottom:3}}>Límite</div>
                <input type="number" value={vLimit} onChange={e=>setVLimit(e.target.value)} className="form-input" style={{fontSize:12,width:70}} min="1" max="10000"/>
              </div>
            </div>
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:6,textTransform:'uppercase'}}>Condiciones WHERE</div>
            {vWhere.map((w, i) => (
              <div key={i} style={{display:'grid',gridTemplateColumns:'60px 1fr 110px 1fr 28px',gap:4,marginBottom:5,alignItems:'center'}}>
                {i === 0 ? <span style={{fontSize:11,color:'var(--text3)',textAlign:'center'}}>DONDE</span> : (
                  <select value={w.and} onChange={e=>setVWhere(p=>p.map((x,j)=>j===i?{...x,and:e.target.value}:x))} className="form-select" style={{fontSize:11,padding:'3px 4px'}}>
                    <option value="AND">Y</option><option value="OR">O</option>
                  </select>
                )}
                <select value={w.field} onChange={e=>setVWhere(p=>p.map((x,j)=>j===i?{...x,field:e.target.value}:x))} className="form-select" style={{fontSize:11}}>
                  <option value="">(campo)</option>
                  {selTbl?.cols.map(c=><option key={c.name} value={c.name}>{c.name}</option>)}
                </select>
                <select value={w.op} onChange={e=>setVWhere(p=>p.map((x,j)=>j===i?{...x,op:e.target.value}:x))} className="form-select" style={{fontSize:11}}>
                  {OPS.map(o=><option key={o} value={o}>{o}</option>)}
                </select>
                <input value={w.val} onChange={e=>setVWhere(p=>p.map((x,j)=>j===i?{...x,val:e.target.value}:x))}
                  className="form-input" style={{fontSize:11}} placeholder="valor" disabled={w.op.includes('NULL')}/>
                <button className="btn btn-ghost btn-sm" style={{padding:'2px 4px',fontSize:12,color:'var(--red)'}}
                  onClick={()=>setVWhere(p=>p.length>1?p.filter((_,j)=>j!==i):p)}>✕</button>
              </div>
            ))}
            <button className="btn btn-sm" style={{fontSize:11,marginTop:4}} onClick={()=>setVWhere(p=>[...p,{field:'',op:'=',val:'',and:'AND'}])}>+ Condición</button>
            {/* SQL preview */}
            <div style={{marginTop:10,padding:'8px 10px',background:'var(--bg4)',borderRadius:6,fontFamily:'monospace',fontSize:11.5,color:'#a8d5a2',whiteSpace:'pre',border:'1px solid var(--border)'}}>
              {buildVisualSQL() || '-- configura la consulta arriba'}
            </div>
          </div>
        </div>
      ) : (
        <div className="sql-editor-area" style={{flexShrink:0}}>
          {/* History */}
          {history.length > 0 && (
            <div style={{padding:'4px 10px',borderBottom:'1px solid var(--border)',display:'flex',gap:4,overflowX:'auto',flexShrink:0}}>
              <span style={{fontSize:10,color:'var(--text3)',whiteSpace:'nowrap',alignSelf:'center'}}>Historial:</span>
              {history.slice(0,8).map((h,i) => (
                <button key={i} className="toolbar-btn" style={{fontSize:10,maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} onClick={()=>setSql(h)}>
                  {h.split('\n')[0].slice(0,40)}
                </button>
              ))}
            </div>
          )}
          <textarea ref={sqlRef} className="sql-textarea" value={sql} onChange={e=>setSql(e.target.value)}
            style={{minHeight:140}} spellCheck={false}
            onKeyDown={e=>{
              if ((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();execute();}
              if (e.key==='Tab'){e.preventDefault();const s=e.target.selectionStart,end=e.target.selectionEnd;setSql(p=>p.slice(0,s)+'  '+p.slice(end));setTimeout(()=>{e.target.selectionStart=e.target.selectionEnd=s+2;},0);}
            }}
            placeholder="-- Escribe SQL aquí (Ctrl+Enter para ejecutar)&#10;-- Tablas disponibles: "/>
          <div style={{padding:'3px 10px',fontSize:11,color:'var(--text3)',borderTop:'1px solid var(--border)',background:'var(--bg4)'}}>
            Ctrl+Enter · Tablas: {tables.map(t=>t.name).join(', ') || '(ninguna)'}
          </div>
        </div>
      )}

      {/* Results */}
      <div className="qb-result">
        {error && (
          <div style={{margin:14,padding:'12px 14px',background:'var(--red-bg)',border:'1px solid var(--red)',borderRadius:'var(--r)',color:'var(--red)',fontFamily:'monospace',fontSize:13}}>
            ⚠️ {error}
          </div>
        )}
        {result?.message && (
          <div style={{margin:14,padding:'12px 14px',background:'var(--green-bg)',border:'1px solid var(--green)',borderRadius:'var(--r)',color:'var(--green)',fontSize:13}}>
            ✓ {result.message}
          </div>
        )}
        {result?.rows && (
          <div style={{overflow:'auto',flex:1}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
              <thead>
                <tr>
                  {result.cols.map((c,i) => <th key={i} style={{padding:'7px 10px',background:'var(--bg3)',border:'1px solid var(--border)',fontWeight:700,fontSize:11,color:'var(--text3)',textAlign:'left',textTransform:'uppercase',whiteSpace:'nowrap'}}>{c}</th>)}
                </tr>
              </thead>
              <tbody>
                {result.rows.map((r,ri) => (
                  <tr key={ri} style={{borderBottom:'1px solid var(--border)'}}>
                    {r.map((cell,ci) => <td key={ci} style={{padding:'5px 10px',border:'1px solid var(--border)',color:cell===''?'var(--text3)':'var(--text)',fontStyle:cell===''?'italic':'normal'}}>{cell===''?'—':String(cell)}</td>)}
                  </tr>
                ))}
                {result.rows.length === 0 && (
                  <tr><td colSpan={result.cols.length} style={{padding:'20px',textAlign:'center',color:'var(--text3)'}}>0 resultados</td></tr>
                )}
              </tbody>
            </table>
          </div>
        )}
        {!result && !error && (
          <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:10,padding:32,color:'var(--text3)'}}>
            <span style={{fontSize:40}}>🔍</span>
            <div style={{fontSize:14,fontWeight:600,color:'var(--text2)'}}>Ejecuta una consulta</div>
            <div style={{fontSize:12,textAlign:'center',maxWidth:400}}>
              Usa el modo visual para construir SELECT/WHERE/ORDER BY sin escribir SQL,<br/>
              o el modo SQL para consultas avanzadas con JOIN, agregados, INSERT, UPDATE, DELETE, CREATE TABLE…
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Relations view ────────────────────────────
function RelationsView({ tables, queries, onUpdate }) {
  const [positions, setPositions] = useState(() => {
    return tables.reduce((acc, t, i) => ({
      ...acc,
      [t.id]: { x: 20 + (i % 4) * 200, y: 20 + Math.floor(i / 4) * 220 }
    }), {});
  });
  const [dragging, setDragging] = useState(null);
  const [dragOffset, setDragOffset] = useState({x:0,y:0});

  function onMouseDown(e, tId) {
    e.preventDefault();
    const pos = positions[tId] || {x:0,y:0};
    setDragging(tId);
    setDragOffset({x: e.clientX - pos.x, y: e.clientY - pos.y});
  }
  function onMouseMove(e) {
    if (!dragging) return;
    setPositions(prev => ({...prev, [dragging]: {x: e.clientX - dragOffset.x, y: e.clientY - dragOffset.y}}));
  }
  function onMouseUp() { setDragging(null); }

  return (
    <div style={{position:'relative',width:'100%',height:'100%',background:'radial-gradient(circle at 50% 50%,rgba(124,106,247,0.04) 0%,transparent 70%)',overflow:'auto'}}
      onMouseMove={onMouseMove} onMouseUp={onMouseUp}>
      {tables.length === 0 && (
        <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',textAlign:'center',color:'var(--text3)'}}>
          <div style={{fontSize:40}}>🗄️</div>
          <div style={{fontSize:14,fontWeight:600,color:'var(--text2)',marginTop:8}}>Sin tablas</div>
          <div style={{fontSize:12,marginTop:4}}>Crea tablas en "Tablas" para verlas aquí</div>
        </div>
      )}
      {tables.map(t => {
        const pos = positions[t.id] || {x:20,y:20};
        return (
          <div key={t.id} className="rel-table" style={{left:pos.x,top:pos.y,minWidth:160}}>
            <div className="rel-table-header" onMouseDown={e=>onMouseDown(e,t.id)} style={{cursor:'grab'}}>
              🗄️ {t.name}
              <span style={{fontSize:10,color:'var(--text3)',marginLeft:'auto'}}>{t.rows.length}r</span>
            </div>
            {t.cols.map((c,i) => (
              <div key={i} className={`rel-table-field${c.pk?' pk':''}`}>
                {c.pk && <span style={{fontSize:11}}>🔑</span>}
                <span style={{fontSize:10,color:'var(--text3)',marginRight:4}}>{FIELD_TYPE_ICONS[c.type]||'Aa'}</span>
                <span style={{fontSize:12}}>{c.name}</span>
                <span style={{marginLeft:'auto',fontSize:10,color:'var(--text3)'}}>{c.type}</span>
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

// ── Forms Designer ────────────────────────────
function FormView({ table, tables, onUpdate }) {
  const [selForm, setSelForm] = useState(null);
  const [formData, setFormData] = useState({});
  const [saved, setSaved] = useState(false);

  if (!table) return <div className="empty"><div className="empty-title">Selecciona una tabla</div></div>;

  function handleChange(fieldName, val) {
    setFormData(prev => ({...prev, [fieldName]: val}));
    setSaved(false);
  }

  function submitForm() {
    const cols = table.cols.map(c => c.name);
    const vals = table.cols.map(c => {
      if (c.pk) return String(Math.max(0, ...table.rows.map(r => parseInt(r[table.cols.indexOf(c)]) || 0)) + 1);
      return formData[c.name] || c.default || '';
    });
    const nr = [...table.rows, vals];
    onUpdate({...table, rows: nr});
    setFormData({});
    setSaved(true);
    showToast(`Registro añadido a "${table.name}" ✓`);
    setTimeout(() => setSaved(false), 2000);
  }

  const nonPK = (table.cols || []).filter(c => !c.pk);

  return (
    <div style={{padding:20,maxWidth:600}}>
      <div style={{marginBottom:16,display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:40,height:40,background:'var(--accent-bg)',borderRadius:'var(--r)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>📋</div>
        <div>
          <div style={{fontFamily:'var(--font-head)',fontSize:15,fontWeight:700}}>Formulario: {table.name}</div>
          <div style={{fontSize:11,color:'var(--text3)'}}>{table.rows.length} registros existentes · Introduce datos para añadir uno nuevo</div>
        </div>
      </div>
      <div className="access-form">
        <div className="access-form-header">Nuevo registro — {table.name}</div>
        <div className="access-form-body">
          {nonPK.map(c => (
            <div key={c.name} className="access-form-row">
              <div className="access-form-label">
                <span style={{fontSize:10,color:'var(--text3)',marginRight:4}}>{FIELD_TYPE_ICONS[c.type]||'Aa'}</span>
                {c.name}
                {c.notNull && <span style={{color:'var(--red)',marginLeft:2}}>*</span>}
              </div>
              <div>
                {c.type === 'BOOLEAN' ? (
                  <select className="form-select" style={{fontSize:12}} value={formData[c.name]||''} onChange={e=>handleChange(c.name,e.target.value)}>
                    <option value="">—</option><option value="1">Sí</option><option value="0">No</option>
                  </select>
                ) : c.type === 'DATE' ? (
                  <input type="date" className="form-input" style={{fontSize:12}} value={formData[c.name]||''} onChange={e=>handleChange(c.name,e.target.value)}/>
                ) : c.type === 'DATETIME' ? (
                  <input type="datetime-local" className="form-input" style={{fontSize:12}} value={formData[c.name]||''} onChange={e=>handleChange(c.name,e.target.value)}/>
                ) : c.type === 'INTEGER' || c.type === 'REAL' ? (
                  <input type="number" className="form-input" style={{fontSize:12}} value={formData[c.name]||''} onChange={e=>handleChange(c.name,e.target.value)} placeholder={c.default||''}/>
                ) : (
                  <input type="text" className="form-input" style={{fontSize:12}} value={formData[c.name]||''} onChange={e=>handleChange(c.name,e.target.value)} placeholder={c.default||''}/>
                )}
              </div>
            </div>
          ))}
          {nonPK.length === 0 && (
            <div style={{textAlign:'center',padding:'20px',color:'var(--text3)',fontSize:13}}>
              Esta tabla solo tiene clave primaria. Añade más campos desde el Diseñador.
            </div>
          )}
        </div>
        <div style={{padding:'10px 16px',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--bg3)'}}>
          <button className="btn btn-sm" onClick={()=>setFormData({})}>Limpiar</button>
          <button className={`btn btn-sm ${saved?'btn-green':'btn-accent'}`} onClick={submitForm} disabled={nonPK.some(c=>c.notNull&&!formData[c.name])}>
            {saved ? '✓ Guardado' : `${Ic.save} Guardar registro`}
          </button>
        </div>
      </div>
      {/* Recent records */}
      {table.rows.length > 0 && (
        <div style={{marginTop:16}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',marginBottom:8}}>Últimos registros</div>
          <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--r2)',overflow:'hidden'}}>
            <div style={{display:'flex',borderBottom:'1px solid var(--border)',background:'var(--bg3)'}}>
              {table.cols.map(c=><div key={c.name} style={{flex:1,padding:'5px 8px',fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase'}}>{c.name}</div>)}
            </div>
            {[...table.rows].slice(-5).reverse().map((r,i)=>(
              <div key={i} style={{display:'flex',borderBottom:'1px solid var(--border)'}}>
                {r.map((cell,ci)=><div key={ci} style={{flex:1,padding:'5px 8px',fontSize:12,color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{String(cell??'—')}</div>)}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Reports ────────────────────────────────────
function ReportsView({ tables }) {
  const [selTable, setSelTable] = useState(tables[0]?.name || '');
  const tbl = tables.find(t => t.name === selTable);

  function printReport() {
    if (!tbl) return;
    const now = new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'long',year:'numeric'});
    const header = tbl.cols.map(c=>`<th style="padding:7px 10px;background:#7c6af715;font-size:11px;font-weight:700;color:#555;text-transform:uppercase;border:1px solid #e0e0e0">${esc(c.name)}</th>`).join('');
    const body = tbl.rows.map(r=>`<tr>${r.map(cell=>`<td style="padding:6px 10px;font-size:12px;border:1px solid #eee;color:#333">${esc(String(cell??''))}</td>`).join('')}</tr>`).join('');
    const stats = tbl.cols.filter(c=>c.type==='INTEGER'||c.type==='REAL').map(c=>{
      const ci = tbl.cols.indexOf(c);
      const vals = tbl.rows.map(r=>parseFloat(r[ci])||0);
      const sum = vals.reduce((a,b)=>a+b,0);
      return `<div style="display:inline-block;margin:4px 8px;font-size:12px;color:#555"><strong>${c.name}</strong>: Σ ${sum.toFixed(2)} · Avg ${vals.length?(sum/vals.length).toFixed(2):0} · Min ${Math.min(...vals)} · Max ${Math.max(...vals)}</div>`;
    }).join('');
    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Informe — ${esc(tbl.name)}</title>
      <style>body{font-family:'Segoe UI',Arial,sans-serif;padding:28px;color:#111;background:white}@page{size:A4;margin:1.5cm}@media print{body{padding:0}}</style>
      </head><body>
      <div style="margin-bottom:20px;padding-bottom:12px;border-bottom:3px solid #7c6af7;display:flex;justify-content:space-between;align-items:flex-end">
        <div><div style="font-size:22px;font-weight:700">Informe: ${esc(tbl.name)}</div><div style="font-size:11px;color:#888;margin-top:2px">${tbl.rows.length} registros · ${now}</div></div>
        <div style="font-size:11px;color:#aaa">FlowCRM Access</div>
      </div>
      ${stats ? `<div style="background:#f8f8ff;border:1px solid #e8e8ff;border-radius:6px;padding:10px 14px;margin-bottom:16px">${stats}</div>` : ''}
      <table style="width:100%;border-collapse:collapse"><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table>
      <div style="margin-top:16px;padding-top:8px;border-top:1px solid #eee;font-size:10px;color:#bbb;text-align:center">FlowCRM · ${now}</div>
      </body></html>`;
    safeOpenPrint(html);
    showToast('Informe generado ✓');
  }

  return (
    <div style={{padding:20}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:600}}>Tabla:</div>
        <select className="form-select" style={{width:200}} value={selTable} onChange={e=>setSelTable(e.target.value)}>
          {tables.map(t=><option key={t.id} value={t.name}>{t.name}</option>)}
        </select>
        <button className="btn btn-accent btn-sm" onClick={printReport} disabled={!tbl}>{Ic.pdf} Imprimir informe</button>
        {tbl && <span style={{fontSize:12,color:'var(--text3)'}}>{tbl.rows.length} registros · {tbl.cols.length} campos</span>}
      </div>
      {tbl && (
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:10,marginBottom:16}}>
          {tbl.cols.filter(c=>c.type==='INTEGER'||c.type==='REAL').map(c=>{
            const ci=tbl.cols.indexOf(c);
            const vals=tbl.rows.map(r=>parseFloat(r[ci])||0);
            const sum=vals.reduce((a,b)=>a+b,0);
            return(
              <div key={c.name} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--r2)',padding:'12px 14px'}}>
                <div style={{fontSize:11,color:'var(--text3)',marginBottom:4}}>{c.name} ({c.type})</div>
                <div style={{fontSize:18,fontWeight:700,color:'var(--accent2)'}}>{sum.toFixed(2)}</div>
                <div style={{fontSize:11,color:'var(--text3)',marginTop:3}}>Suma · Avg: {vals.length?(sum/vals.length).toFixed(2):0} · Min: {vals.length?Math.min(...vals):0} · Max: {vals.length?Math.max(...vals):0}</div>
              </div>
            );
          })}
        </div>
      )}
      {tbl && <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--r2)',overflow:'auto',maxHeight:400}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
          <thead><tr>{tbl.cols.map(c=><th key={c.name} style={{padding:'7px 10px',background:'var(--bg3)',border:'1px solid var(--border)',fontWeight:700,fontSize:11,color:'var(--text3)',textAlign:'left',textTransform:'uppercase'}}>{c.name}</th>)}</tr></thead>
          <tbody>{tbl.rows.map((r,i)=><tr key={i}>{r.map((cell,ci)=><td key={ci} style={{padding:'5px 10px',border:'1px solid var(--border)',color:'var(--text2)'}}>{String(cell??'')}</td>)}</tr>)}</tbody>
        </table>
      </div>}
    </div>
  );
}

function AccessEditor({ doc, onUpdate }) {
  const [section, setSection] = useState('tables'); // tables|queries|forms|reports|relations
  const [activeTable, setActiveTable] = useState(null);
  const [designing, setDesigning] = useState(null); // null | 'new' | tableId
  const [activeQuery, setActiveQuery] = useState(null);

  const tables = doc.accessTables || [];
  const queries = doc.accessQueries || [];

  function saveTables(newTables) { onUpdate({...doc, accessTables: newTables}); }
  function saveQueries(newQueries) { onUpdate({...doc, accessQueries: newQueries}); }

  function handleTableSave(tbl) {
    const existing = tables.find(t => t.id === tbl.id);
    if (existing) saveTables(tables.map(t => t.id === tbl.id ? tbl : t));
    else saveTables([...tables, tbl]);
    setDesigning(null);
    setActiveTable(tbl.id);
    showToast(`Tabla "${tbl.name}" guardada ✓`);
  }

  function deleteTable(id) {
    if (!confirm('¿Eliminar tabla y todos sus datos?')) return;
    saveTables(tables.filter(t => t.id !== id));
    if (activeTable === id) setActiveTable(null);
    showToast('Tabla eliminada');
  }

  function updateTable(tbl) {
    saveTables(tables.map(t => t.id === tbl.id ? tbl : t));
  }

  function saveQuery(q) {
    const existing = queries.find(x => x.id === q.id);
    if (existing) saveQueries(queries.map(x => x.id === q.id ? q : x));
    else saveQueries([...queries, q]);
  }

  function handleQueryResult(updatedTables) {
    saveTables(updatedTables);
  }

  const selTbl = tables.find(t => t.id === activeTable);

  // If designing a table
  if (designing !== null) {
    const editingTable = designing === 'new' ? null : tables.find(t => t.id === designing);
    return (
      <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
        <TableDesigner table={editingTable} onSave={handleTableSave} onCancel={()=>setDesigning(null)}/>
      </div>
    );
  }

  return (
    <div className="access-layout">
      {/* Left nav */}
      <div className="access-nav">
        <div style={{padding:'10px 12px 4px',display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:18}}>🗄️</span>
          <div style={{fontSize:13,fontWeight:700,fontFamily:'var(--font-head)',color:'var(--text)'}}>Base de Datos</div>
        </div>
        {[
          ['tables','📋 Tablas',tables.length],
          ['queries','🔍 Consultas',queries.length],
          ['forms','📝 Formularios',null],
          ['reports','📊 Informes',null],
          ['relations','🔗 Relaciones',null],
        ].map(([s,label,badge]) => (
          <div key={s} className={`access-nav-item${section===s?' active':''}`} onClick={()=>setSection(s)}>
            {label}
            {badge !== null && <span className="access-nav-badge">{badge}</span>}
          </div>
        ))}
        <div className="access-nav-section" style={{marginTop:12}}>Tablas</div>
        {tables.map(t => (
          <div key={t.id} className={`access-nav-item${activeTable===t.id&&(section==='tables')?' active':''}`}
            onClick={()=>{ setSection('tables'); setActiveTable(t.id); }}
            style={{paddingLeft:20,fontSize:12}}>
            🗄️ {t.name}
            <span className="access-nav-badge">{t.rows.length}</span>
          </div>
        ))}
        {tables.length === 0 && <div style={{padding:'6px 20px',fontSize:11,color:'var(--text3)',fontStyle:'italic'}}>Sin tablas</div>}
      </div>

      {/* Main area */}
      <div className="access-main">
        {/* Section toolbar */}
        {section === 'tables' && (
          <div className="access-toolbar">
            <span style={{fontSize:13,fontWeight:700,color:'var(--text2)'}}>📋 Tablas</span>
            <div className="toolbar-sep"/>
            <button className="toolbar-btn" style={{fontSize:11}} onClick={()=>setDesigning('new')}>🗄️ Nueva tabla</button>
            {selTbl && <>
              <button className="toolbar-btn" style={{fontSize:11}} onClick={()=>setDesigning(selTbl.id)}>✏️ Diseñar</button>
              <button className="toolbar-btn" style={{fontSize:11}} onClick={()=>{
                const errors = validateForeignKeys(tables);
                if (errors.length===0) showToast('✓ Integridad referencial OK — sin errores');
                else { alert('Errores de integridad:\n\n'+errors.join('\n')); showToast(`${errors.length} error(es) de integridad referencial`, 'error'); }
              }} title="Verificar claves foráneas">🔗 Verificar FK</button>
              <button className="toolbar-btn" style={{fontSize:11,color:'var(--red)'}} onClick={()=>deleteTable(selTbl.id)}>🗑️ Eliminar</button>
            </>}
            <div style={{marginLeft:'auto',display:'flex',gap:4}}>
              {tables.map(t => (
                <button key={t.id} className={`sheet-tab-btn${activeTable===t.id?' active':''}`} onClick={()=>setActiveTable(t.id)}>
                  🗄️ {t.name}
                </button>
              ))}
              <button className="sheet-add-tab" onClick={()=>setDesigning('new')} title="Nueva tabla">+</button>
            </div>
          </div>
        )}
        {section === 'queries' && (
          <div className="access-toolbar">
            <span style={{fontSize:13,fontWeight:700,color:'var(--text2)'}}>🔍 Consultas</span>
            <div className="toolbar-sep"/>
            <span style={{fontSize:11,color:'var(--text3)'}}>Usa modo Visual o SQL para consultar y modificar datos</span>
          </div>
        )}
        {section === 'forms' && (
          <div className="access-toolbar">
            <span style={{fontSize:13,fontWeight:700,color:'var(--text2)'}}>📝 Formularios</span>
            <div className="toolbar-sep"/>
            <div style={{display:'flex',gap:4}}>
              {tables.map(t=>(
                <button key={t.id} className={`sheet-tab-btn${activeTable===t.id?' active':''}`} onClick={()=>setActiveTable(t.id)}>{t.name}</button>
              ))}
            </div>
          </div>
        )}
        {section === 'reports' && (
          <div className="access-toolbar">
            <span style={{fontSize:13,fontWeight:700,color:'var(--text2)'}}>📊 Informes</span>
          </div>
        )}
        {section === 'relations' && (
          <div className="access-toolbar">
            <span style={{fontSize:13,fontWeight:700,color:'var(--text2)'}}>🔗 Relaciones entre tablas</span>
            <div className="toolbar-sep"/>
            <span style={{fontSize:11,color:'var(--text3)'}}>Arrastra las tablas para organizarlas</span>
          </div>
        )}

        {/* Content */}
        <div className="access-content">
          {section === 'tables' && (
            tables.length === 0 ? (
              <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,padding:32}}>
                <div style={{fontSize:52}}>🗄️</div>
                <div style={{fontFamily:'var(--font-head)',fontSize:18,fontWeight:700}}>Sin tablas</div>
                <div style={{fontSize:13,color:'var(--text3)',textAlign:'center',maxWidth:380,lineHeight:1.6}}>
                  Crea tu primera tabla para almacenar datos estructurados, con tipos de campo, claves primarias y valores por defecto.
                </div>
                <button className="btn btn-accent" onClick={()=>setDesigning('new')}>🗄️ Crear primera tabla</button>
              </div>
            ) : selTbl ? (
              <DataGrid table={selTbl} onUpdate={updateTable}/>
            ) : (
              <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,color:'var(--text3)'}}>
                <div style={{fontSize:36}}>👈</div>
                <div style={{fontSize:13}}>Selecciona una tabla del panel izquierdo</div>
              </div>
            )
          )}
          {section === 'queries' && (
            <QueryBuilder tables={tables} onQueryResult={handleQueryResult}/>
          )}
          {section === 'forms' && (
            tables.length === 0 ? (
              <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text3)',fontSize:13}}>
                Crea al menos una tabla para usar formularios
              </div>
            ) : (
              <div style={{overflow:'auto',flex:1}}>
                <FormView table={selTbl || tables[0]} tables={tables} onUpdate={updateTable}/>
              </div>
            )
          )}
          {section === 'reports' && (
            tables.length === 0 ? (
              <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text3)',fontSize:13}}>
                Crea al menos una tabla para generar informes
              </div>
            ) : (
              <div style={{overflow:'auto',flex:1}}>
                <ReportsView tables={tables}/>
              </div>
            )
          )}
          {section === 'relations' && (
            <div style={{flex:1,overflow:'hidden'}}>
              <RelationsView tables={tables} queries={queries} onUpdate={saveTables}/>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

  const badgeStyle = {fontSize:11,color:'var(--text3)',background:'var(--bg3)',padding:'2px 9px',borderRadius:99,flexShrink:0};

          <AccessEditor doc={doc} onUpdate={onUpdate}/>

  if (doc.type === 'xlsx' || doc.type === 'csv') {
    return (
      <div style={{display:'flex',flexDirection:'column',flex:1,gap:8,overflow:'hidden',minHeight:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'2px 0',flexShrink:0}}>

            onFocus={e => e.target.style.borderBottomColor='var(--accent)'}
            onBlur={e => e.target.style.borderBottomColor='var(--border2)'}
          />
          <span style={badgeStyle}>📊 {doc.type.toUpperCase()}</span>
          <span style={{...badgeStyle,background:'var(--accent-bg)',color:'var(--accent2)'}}>Fórmulas: SUM, AVG, IF, VLOOKUP…</span>
        </div>
        <div className="doc-editor-wrap" style={{flex:1,minHeight:0}}>
          <SheetEditor doc={doc} onChange={onUpdate}/>

      </div>
    );
  }

  if (doc.type === 'pptx') {
    return (
      <div style={{display:'flex',flexDirection:'column',flex:1,gap:8,overflow:'hidden',minHeight:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'2px 0',flexShrink:0}}>
          <input value={name} onChange={e => handleNameChange(e.target.value)}
            style={{background:'transparent',border:'none',borderBottom:'1px dashed var(--border2)',color:'var(--text)',fontFamily:'var(--font-head)',fontSize:15,fontWeight:600,padding:'4px 0',outline:'none',flex:1}}/>
          <span style={badgeStyle}>📑 PPTX · {(doc.slides||[]).length} diapositivas</span>
        </div>
        <div className="doc-editor-wrap" style={{flex:1,minHeight:0}}>
          <SlideEditor doc={doc} onChange={onUpdate}/>
        </div>
      </div>
    );
  }

  // docx / default — full rich text editor
  return (
    <div style={{display:'flex',flexDirection:'column',flex:1,gap:8,overflow:'hidden',minHeight:0}}>
      <div style={{display:'flex',alignItems:'center',gap:8,padding:'2px 0',flexShrink:0}}>
        <input value={name} onChange={e => handleNameChange(e.target.value)} maxLength={200}
          style={{background:'transparent',border:'none',borderBottom:'1px dashed var(--border2)',color:'var(--text)',fontFamily:'var(--font-head)',fontSize:15,fontWeight:600,padding:'4px 0',outline:'none',flex:1}}/>
        <span style={badgeStyle}>📝 Documento</span>
      </div>
      <div className="doc-editor-wrap" style={{flex:1,minHeight:0}}>
        <RichTextEditor doc={doc} onUpdate={onUpdate}/>
      </div>
    </div>
  );
}

function ChartWidget({title,type,data,chartId}){
  const canvasRef=useRef(null);
  const chartRef=useRef(null);
  useEffect(()=>{
    if(!canvasRef.current||!window.Chart)return;
    if(chartRef.current){chartRef.current.destroy();}
    const ctx=canvasRef.current.getContext('2d');
    const palette=['rgba(124,106,247,0.8)','rgba(59,158,255,0.8)','rgba(34,201,122,0.8)','rgba(245,166,35,0.8)','rgba(240,80,80,0.8)','rgba(0,212,180,0.8)'];
    chartRef.current=new Chart(ctx,{
      type:type==='column'?'bar':type==='area'?'line':type==='scatter'?'scatter':type==='histogram'?'bar':type,
      data:{
        labels:data.labels,
        datasets:[{
          label:data.label||title,
          data:data.values,
          backgroundColor:type==='pie'||type==='doughnut'?palette:palette[0],
          borderColor:type==='line'||type==='area'?palette[0]:undefined,
          fill:type==='area',
          tension:0.4,
          borderWidth:2,
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:'#9898a8',font:{size:11}}},tooltip:{backgroundColor:'rgba(13,13,15,0.9)',titleColor:'#f0f0f4',bodyColor:'#9898a8'}},
        scales:type==='pie'||type==='doughnut'?{}:{x:{ticks:{color:'#5a5a6e'},grid:{color:'#2a2a32'}},y:{ticks:{color:'#5a5a6e'},grid:{color:'#2a2a32'}}},
      }
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[type,JSON.stringify(data)]);
  return(
    <div className="chart-card">
      <div className="chart-card-header"><span className="chart-card-title">{title}</span></div>
      <div className="chart-canvas-wrap">
        <canvas ref={canvasRef} data-chart-export data-chart-title={title}/>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   DATA WAREHOUSE / SQL
══════════════════════════════════════════════ */
function DataWarehouse(){
  const[store,setStore]=useStore();
  const tables=store.warehouseTables||[];
  const[query,setQuery]=useState('SELECT * FROM clientes WHERE activo = \'true\'');
  const[results,setResults]=useState(null);
  const[error,setError]=useState('');
  const[activeTable,setActiveTable]=useState(tables[0]?.id||null);
  const[mlRunning,setMlRunning]=useState(false);
  const[mlProgress,setMlProgress]=useState(0);
  const[mlResult,setMlResult]=useState(null);

  function executeQuery(){
    setError('');setResults(null);
    // SECURITY: enforce query length limit
    if(query.length>2000){setError('Error: Consulta demasiado larga (máx 2000 caracteres)');return;}
    try{
      const q=query.trim();
      const ql=q.toLowerCase();
      // SECURITY: only allow SELECT statements
      if(!/^\s*select\s/i.test(q)){setError('Error: Solo se permiten consultas SELECT');return;}
      // SECURITY: block dangerous keywords
      const blocked=['drop','delete','insert','update','create','alter','exec','execute','script','union',';'];
      for(const kw of blocked){if(ql.includes(kw)){setError(`Error: Operación no permitida: "${kw}"`);return;}}
      let tableMatch=ql.match(/from\s+([a-z_][a-z0-9_]*)/i);
      if(!tableMatch){setError('Error: No se encontró cláusula FROM');return;}
      const tname=tableMatch[1].toLowerCase();
      // SECURITY: only allow tables that exist in the warehouse (whitelist)
      const table=tables.find(t=>t.name.toLowerCase()===tname);
      if(!table){setError(`Error: Tabla '${escapeHtml(tname)}' no encontrada. Tablas disponibles: ${tables.map(t=>t.name).join(', ')}`);return;}
      let rows=[...table.rows];
      const whereMatch=ql.match(/where\s+(.+?)(?:\s+(?:group by|order by|limit)|$)/i);
      if(whereMatch){
        const cond=whereMatch[1].trim();
        // SECURITY: strict column=value parser - only allow whitelisted column names
        const colMatch=cond.match(/^([a-z_][a-z0-9_]*)\s*(=|!=|like)\s*['"]?([^'";<>]{0,200})['"]?$/i);
        if(colMatch){
          const[,col,op,val]=colMatch;
          // SECURITY: only allow columns that exist in the table schema
          const ci=table.cols.findIndex(c=>c.n.toLowerCase()===col.toLowerCase());
          if(ci<0){setError(`Error: Columna '${escapeHtml(col)}' no existe en tabla '${escapeHtml(tname)}'`);return;}
          const safeVal=val.trim().toLowerCase();
          rows=rows.filter(r=>{
            const rv=(r[ci]||'').toString().toLowerCase();
            if(op==='=')return rv===safeVal;
            if(op==='like')return rv.includes(safeVal.replace(/%/g,''));
            if(op==='!=')return rv!==safeVal;
            return true;
          });
        }
      }
      const limitMatch=ql.match(/limit\s+(\d{1,4})$/i);
      // SECURITY: default limit 500, max 500
      const limit=limitMatch?Math.min(parseInt(limitMatch[1]),500):500;
      rows=rows.slice(0,limit);
      setResults({cols:table.cols,rows,total:rows.length});
    }catch(e){setError('Error al ejecutar consulta: '+escapeHtml(e.message));}
  }

  function runML(){
    setMlRunning(true);setMlProgress(0);setMlResult(null);
    let p=0;
    const iv=setInterval(()=>{
      p+=Math.random()*15+5;
      if(p>=100){p=100;clearInterval(iv);setMlRunning(false);
        setMlResult({model:'Regresión Logística',accuracy:87.3,precision:84.1,recall:89.6,features:['valor_deal','etapa','fuente','prioridad_tareas'],prediction:'Los deals en etapa "Negociación" con valor >8000€ tienen 73% de probabilidad de cierre en 30 días.'});}
      setMlProgress(Math.min(p,100));
    },200);
  }

  const at=tables.find(t=>t.id===activeTable);

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',gap:12}}>
      <div style={{background:'linear-gradient(135deg,rgba(59,158,255,0.08),rgba(0,212,180,0.04))',border:'1px solid rgba(59,158,255,0.18)',borderRadius:'var(--r2)',padding:'14px 18px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:40,height:40,background:'var(--blue-bg)',borderRadius:'var(--r)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--blue)',border:'1px solid rgba(59,158,255,0.25)'}}>{Ic.database}</div>
          <div>
            <div style={{fontFamily:'var(--font-head)',fontSize:16,fontWeight:700}}>Data Warehouse & SQL</div>
            <div style={{fontSize:12,color:'var(--text3)',marginTop:1}}>SELECT, FROM, WHERE, GROUP BY, JOIN · Machine Learning integrado</div>
          </div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn" style={{borderColor:'var(--teal)',color:'var(--teal)',background:'var(--teal-bg)'}} onClick={runML} disabled={mlRunning}>
            {Ic.ml} {mlRunning?`Entrenando ${Math.round(mlProgress)}%`:'Entrenar Modelo IA'}
          </button>
        </div>
      </div>

      <div className="sql-layout" style={{flex:1}}>
        <div className="sql-sidebar">
          <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:8}}>Tablas</div>
          {tables.map(t=>(
            <div key={t.id}>
              <div className={`table-tree-item ${activeTable===t.id?'active':''}`} onClick={()=>setActiveTable(t.id)} style={{background:activeTable===t.id?'var(--blue-bg)':'transparent',color:activeTable===t.id?'var(--blue)':'var(--text2)'}}>
                {Ic.table} {t.name}
                <span style={{marginLeft:'auto',fontSize:10,color:'var(--text3)'}}>{t.rows.length}r</span>
              </div>
              {activeTable===t.id&&t.cols.map((c,i)=>(
                <div key={i} className="table-tree-col">
                  <span className={`type-badge type-${c.t}`}>{c.t}</span>
                  <span>{c.n}</span>
                </div>
              ))}
            </div>
          ))}
          <div style={{marginTop:12,fontSize:11,fontWeight:600,color:'var(--text3)',letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:8}}>Consultas rápidas</div>
          {[
            'SELECT * FROM clientes',
            'SELECT * FROM pedidos WHERE estado = \'ganado\'',
            'SELECT nombre, empresa FROM clientes',
            'SELECT COUNT(*) FROM pedidos',
          ].map((q,i)=>(
            <div key={i} onClick={()=>setQuery(q)} style={{padding:'5px 8px',fontSize:11,color:'var(--text3)',cursor:'pointer',borderRadius:6,fontFamily:'monospace',wordBreak:'break-all',transition:'background var(--transition)'}} onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              {q.slice(0,40)}{q.length>40?'...':''}
            </div>
          ))}
        </div>

        <div className="sql-main">
          <div className="sql-editor-wrap">
            <div style={{padding:'8px 12px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:8,background:'var(--bg3)'}}>
              <span style={{fontSize:11,fontWeight:600,color:'var(--text3)',letterSpacing:'0.06em'}}>SQL EDITOR</span>
              <button className="btn btn-accent btn-sm" style={{marginLeft:'auto'}} onClick={executeQuery}>
                {Ic.play} Ejecutar (Ctrl+Enter)
              </button>
            </div>
            <textarea className="sql-editor" value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>{if(e.ctrlKey&&e.key==='Enter')executeQuery();}} placeholder="Escribe tu consulta SQL aquí..." maxLength={2000} spellCheck={false}/>
          </div>

          {error&&<div style={{background:'var(--red-bg)',border:'1px solid var(--red)',borderRadius:'var(--r)',padding:'10px 14px',fontSize:13,color:'var(--red)'}}>{error}</div>}

          {results&&(
            <div className="sql-results">
              <div style={{padding:'8px 14px',borderBottom:'1px solid var(--border)',background:'var(--bg3)',display:'flex',alignItems:'center',gap:10,fontSize:12}}>
                <span style={{color:'var(--green)'}}>✓ {results.total} filas</span>
                <span style={{color:'var(--text3)'}}>· {results.cols.length} columnas</span>
              </div>
              <table>
                <thead><tr>{results.cols.map((c,i)=><th key={i}>{c.n}</th>)}</tr></thead>
                <tbody>
                  {results.rows.map((r,ri)=>(
                    <tr key={ri}>{r.map((cell,ci)=><td key={ci}>{cell}</td>)}</tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {mlResult&&(
            <div className="ml-card">
              <div style={{fontFamily:'var(--font-head)',fontSize:14,fontWeight:600,marginBottom:10,color:'var(--teal)'}}>🤖 Resultado del Modelo IA — {mlResult.model}</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:12}}>
                {[['Accuracy',mlResult.accuracy+'%'],['Precision',mlResult.precision+'%'],['Recall',mlResult.recall+'%']].map(([k,v])=>(
                  <div key={k} style={{background:'var(--bg3)',borderRadius:'var(--r)',padding:'10px 12px',textAlign:'center'}}>
                    <div style={{fontSize:11,color:'var(--text3)',marginBottom:4}}>{k}</div>
                    <div style={{fontFamily:'var(--font-head)',fontSize:20,fontWeight:700,color:'var(--teal)'}}>{v}</div>
                  </div>
                ))}
              </div>
              <div style={{background:'var(--teal-bg)',border:'1px solid rgba(0,212,180,0.25)',borderRadius:'var(--r)',padding:'10px 14px',fontSize:13,color:'var(--text2)'}}>
                <strong style={{color:'var(--teal)'}}>Predicción:</strong> {mlResult.prediction}
              </div>
              <div style={{marginTop:10,fontSize:12,color:'var(--text3)'}}>Features: {mlResult.features.join(', ')}</div>
            </div>
          )}

          {mlRunning&&(
            <div className="ml-card">
              <div style={{fontSize:13,color:'var(--text2)',marginBottom:8}}>Entrenando modelo... {Math.round(mlProgress)}%</div>
              <div className="ml-progress"><div className="ml-progress-bar" style={{width:`${mlProgress}%`}}/></div>
            </div>
          )}

          {!results&&!error&&!mlRunning&&!mlResult&&(
            <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8,color:'var(--text3)',padding:'2rem'}}>
              <div style={{fontSize:32}}>🗄️</div>
              <div style={{fontSize:14,fontWeight:500,color:'var(--text2)'}}>Ejecuta una consulta SQL</div>
              <div style={{fontSize:12}}>Usa Ctrl+Enter o el botón Ejecutar</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

const CHAT_SUGGESTIONS=['¿Cómo va el pipeline?','Resumen del CRM','Crea una hoja Excel','Genera gráfico de ventas','¿Qué tareas tengo?','Análisis predictivo'];

function localAI(msg){
  const m=msg.toLowerCase();
  const store=getStore();
  const{contacts,deals,tasks,documents}=store;
  const pending=tasks.filter(t=>!t.done);
  const pipeV=deals.filter(d=>d.stage!=='won'&&d.stage!=='lost').reduce((s,d)=>s+d.value,0);
  const wonV=deals.filter(d=>d.stage==='won').reduce((s,d)=>s+d.value,0);
  const today=todayStr();

  if(m.match(/pipeline|ventas|deals|negociac/)){
    const by={};deals.forEach(d=>{if(!by[d.stage])by[d.stage]={c:0,v:0};by[d.stage].c++;by[d.stage].v+=d.value;});
    const lines=Object.entries(by).map(([s,v])=>`  • ${SL[s]}: ${v.c} deals — ${eur(v.v)}`).join('\n');
    return`**Pipeline activo:** ${eur(pipeV)}\n**Facturado:** ${eur(wonV)}\n\nPor etapa:\n${lines}`;
  }
  if(m.match(/tarea|pendiente|hacer|urgente/)){
    if(!pending.length)return'✅ No tienes tareas pendientes.';
    const urgent=pending.filter(t=>t.priority==='high');
    const lines=pending.slice(0,5).map(t=>{const c=contacts.find(x=>x.id===t.contact_id);return`  • ${t.title}${c?' ('+c.name+')':''}${t.due_date?' — '+fmtDateShort(t.due_date):''}`;}).join('\n');
    return`Tienes **${pending.length} tareas pendientes**:\n\n${lines}${urgent.length?'\n\n⚠️ '+urgent.length+' de alta prioridad.':''}`;
  }
  if(m.match(/contacto|cliente|cuántos|lead/)){
    const by={};contacts.forEach(c=>by[c.stage]=(by[c.stage]||0)+1);
    const lines=Object.entries(by).map(([s,v])=>`  • ${SL[s]}: ${v}`).join('\n');
    return`Tienes **${contacts.length} contactos**:\n\n${lines}`;
  }
  if(m.match(/crea|genera|hacer|nueva|nuevo/).test&&(m.includes('excel')||m.includes('hoja')||m.includes('xlsx'))){
    return`📊 Para crear una **Hoja de Cálculo Excel**, ve a:\n\n  1. Sección **Procesador de Textos** (menú lateral)\n  2. Pulsa **Nueva Página** → **Hoja de Cálculo (.xlsx)**\n\n¿Quieres que te ayude a diseñar la estructura de la hoja? Dime qué columnas necesitas.`;
  }
  if(m.match(/gráfico|grafico|visualiz|chart|barra|pastel|lineal/)){
    return`📈 Puedes crear gráficos en la sección **Visualizaciones**:\n\n  • Barras, Pastel, Dónut, Lineal\n  • Áreas, Columnas, Dispersión\n\nLos gráficos se generan automáticamente con datos del CRM. También puedes exportarlos a PDF directamente.`;
  }
  if(m.match(/sql|consulta|tabla|warehouse|datos/)){
    return`🗄️ El **Data Warehouse** está en el menú lateral.\n\nPuedes:\n  • Ejecutar consultas SQL (SELECT, FROM, WHERE, JOIN)\n  • Ver tablas: clientes, pedidos, actividad\n  • Entrenar modelos de **Machine Learning**\n\nEjemplo: \`SELECT * FROM clientes WHERE activo = 'true'\``;
  }
  if(m.match(/analisis|predicci|ml|inteligencia|modelo|ia/)){
    const neg=deals.filter(d=>d.stage==='negotiation');
    return`🤖 **Análisis Predictivo del CRM:**\n\n📊 Tengo ${neg.length} deals en negociación (${eur(neg.reduce((s,d)=>s+d.value,0))}).\n\nPara entrenar un modelo de ML:\n  1. Ve a **Data Warehouse**\n  2. Pulsa **Entrenar Modelo IA**\n\nEl modelo analizará patrones de cierre basándose en etapa, valor, fuente y prioridad.`;
  }
  if(m.match(/documento|word|docx|presentaci|pptx|powerpoint/)){
    return`📝 Puedes crear documentos profesionales en el **Procesador de Textos**:\n\n  • 📝 **Word (.docx)** — Editor de texto enriquecido\n  • 📊 **Excel (.xlsx)** — Motor de cálculo con fórmulas\n  • 📑 **PowerPoint (.pptx)** — Editor de diapositivas\n\n¿Qué tipo de documento necesitas crear?`;
  }
  if(m.match(/exportar|pdf|descargar/)){
    return`📄 **Exportación disponible en cada sección:**\n\n  • **Procesador de Textos** → botón "Exportar PDF" en el hero\n  • **Visualizaciones** → botón "Exportar PDF" en el hero\n  • **CRM/Dashboard** → botón "Crear informe PDF"\n\nCada sección exporta únicamente su propio contenido.`;
  }
  if(m.match(/resumen|estado|hola|buenos|buenas|ayuda/)){
    const ov=pending.filter(t=>t.due_date&&t.due_date<today).length;
    const docs=documents||[];
    return`**Resumen completo del SaaS:**\n\n📊 Pipeline activo: ${eur(pipeV)}\n💚 Facturado: ${eur(wonV)}\n👥 Contactos: ${contacts.length}\n📋 Tareas pendientes: ${pending.length}${ov?' ('+ov+' vencidas)':''}\n📄 Documentos: ${docs.length}\n\n¿En qué te puedo ayudar?`;
  }
  for(const c of contacts){
    const fn=c.name.split(' ')[0].toLowerCase();
    const co=(c.company||'').split(' ')[0].toLowerCase();
    if(fn.length>2&&(m.includes(fn)||m.includes(co))){
      const ds=deals.filter(d=>d.contact_id===c.id);
      return`**${c.name}** — ${c.company||'sin empresa'}\nCargo: ${c.position||'—'}\nEmail: ${c.email||'—'}\nEtapa: ${SL[c.stage]}${ds.length?'\nDeals: '+ds.map(d=>d.title+' ('+eur(d.value)+')').join(', '):''}${c.notes?'\nNotas: '+c.notes:''}`;
    }
  }
  if(m.match(/consejo|recomiend|qué hago|priorid/)){
    const tips=[];
    const urgent=pending.filter(t=>t.priority==='high');
    if(urgent.length)tips.push(`🔴 **${urgent.length} tarea(s) urgente(s)** — atiéndelas hoy.`);
    const neg=deals.filter(d=>d.stage==='negotiation');
    if(neg.length)tips.push(`💰 **${neg.length} deals en negociación** (${eur(neg.reduce((s,d)=>s+d.value,0))}) — haz seguimiento activo.`);
    const ov=pending.filter(t=>t.due_date&&t.due_date<today);
    if(ov.length)tips.push(`⚠️ **${ov.length} tarea(s) vencidas** — actualiza o cierra.`);
    if(!tips.length)return'Todo está en orden. Revisa el pipeline y agenda tus próximas reuniones.';
    return'**Recomendaciones:**\n\n'+tips.join('\n\n');
  }
  const fb=[
    'Puedo ayudarte con el **pipeline**, **contactos**, **tareas**, crear **documentos**, **gráficos** o consultas **SQL**. ¿Qué necesitas?',
    'Soy tu asistente Coworker IA. Analizo el contexto del CRM y puedo ayudarte a crear reportes, hojas de cálculo, presentaciones y más.',
  ];
  return fb[Math.floor(Math.random()*fb.length)];
}

function Chatbot({currentView}){
  const[open,setOpen]=useState(false);
  const[msgs,setMsgs]=useState([]);
  const[input,setInput]=useState('');
  const[typing,setTyping]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{if(open&&msgs.length===0)setMsgs([{role:'bot',content:`¡Hola! Soy tu asistente **Coworker IA**. Analizo el contexto completo del SaaS (CRM, documentos, datos).\n\nAhora estás en: **${currentView}**\n\n¿En qué te ayudo?`,ts:new Date().toISOString()}]);},[open]);
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[msgs,typing]);
  const lastSendRef=useRef(0);
  function send(text=input){
    const msg=text.trim().slice(0,1000);if(!msg)return;
    // SECURITY: rate limit - 1 message per 500ms
    const now=Date.now();
    if(now-lastSendRef.current<500){return;}
    lastSendRef.current=now;
    setInput('');
    setMsgs(p=>[...p,{role:'user',content:msg,ts:new Date().toISOString()}]);
    setTyping(true);
    setTimeout(()=>{setTyping(false);setMsgs(p=>[...p,{role:'bot',content:localAI(msg),ts:new Date().toISOString()}]);},400+Math.random()*400);
  }
  return(
    <>
      <div className={`chat-window ${open?'open':''}`}>
        <div className="chat-header">
          <div className="chat-header-avatar"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" fill="white"/></svg></div>
          <div style={{flex:1}}>
            <div className="chat-header-name">Coworker IA</div>
            <div className="chat-header-status">Analiza contexto · En línea</div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={()=>setOpen(false)}>{Ic.close}</button>
        </div>
        <div className="chat-msgs" ref={ref}>
          {msgs.map((m,i)=>(
            <div key={i} className={`msg msg-${m.role}`}>
              <div className="msg-bubble" dangerouslySetInnerHTML={{__html:mdLight(m.content)}} data-safe="true"/>
              <div className="msg-time">{timeAgo(m.ts)}</div>
            </div>
          ))}
          {typing&&<div className="msg msg-bot"><div className="chat-typing"><span/><span/><span/></div></div>}
        </div>
        {msgs.length<=1&&<div className="chat-suggestions">{CHAT_SUGGESTIONS.map((s,i)=><button key={i} className="chat-suggestion" onClick={()=>send(s)}>{s}</button>)}</div>}
        <div className="chat-input-row">
          <textarea className="chat-input" rows={1} maxLength={1000} placeholder="Pregunta sobre el CRM, crea documentos, analiza datos..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}/>
          <button className="chat-send" onClick={()=>send()}>{Ic.send}</button>
        </div>
      </div>
      <button className="chat-fab" onClick={()=>setOpen(p=>!p)}>
        {open?<svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>:Ic.chat}
      </button>
    </>
  );
}

function Dashboard({onNav}){
  const[store]=useStore();

function ContactTimeline({contactId}) {
  const [store] = useStore();
  const {notes, emails, tasks, deals, contacts} = store;
  const contact = contacts.find(c => c.id === contactId);

  const events = useMemo(() => {
    const all = [];
    (notes.filter(n => n.contact_id === contactId)).forEach(n =>
      all.push({id:n.id, type:'note', date:n.created_at, content:n.content, icon:'📝'}));
    (emails.filter(e => e.contact_id === contactId)).forEach(e =>
      all.push({id:e.id, type: e.from_me ? 'email-out' : 'email-in', date:e.created_at,
        subject:e.subject, body:e.body, from_me:e.from_me, icon: e.from_me ? '📤' : '📨'}));
    (tasks.filter(t => t.contact_id === contactId)).forEach(t =>
      all.push({id:t.id, type:'task', date:t.due_date+'T09:00:00', content:t.title,
        done:t.done, priority:t.priority, icon: t.done ? '✅' : '📋'}));
    (deals.filter(d => d.contact_id === contactId)).forEach(d =>
      all.push({id:d.id, type:'deal', date:d.close_date+'T12:00:00',
        content:`Deal: ${d.title}`, value:d.value, stage:d.stage, icon:'💰'}));
    if (contact?.created_at)
      all.push({id:'created', type:'created', date:contact.created_at, content:'Contacto creado', icon:'🎉'});
    return all.sort((a,b) => new Date(b.date) - new Date(a.date));
  }, [notes, emails, tasks, deals, contactId, contact]);

  const TYPE_LABELS = {note:'Nota', 'email-out':'Email enviado', 'email-in':'Email recibido', task:'Tarea', deal:'Deal', created:'Creado'};
  const TYPE_COLORS = {note:'var(--text3)', 'email-out':'var(--accent)', 'email-in':'var(--teal)', task:'var(--green)', deal:'var(--amber)', created:'var(--border2)'};

  if (events.length === 0) return (
    <div style={{textAlign:'center',padding:'20px',color:'var(--text3)',fontSize:12}}>
      <div style={{fontSize:28,marginBottom:6}}>🕐</div>Sin actividad registrada
    </div>
  );

  return (
    <div className="timeline">
      {events.map(ev => (
        <div key={ev.id} className="tl-item">
          <div className={`tl-dot ${ev.type}`}>{ev.icon}</div>
          <div className={`tl-card ${ev.type.startsWith('email') ? 'email-card' + (ev.type==='email-in'?' incoming':'') : ''}`}>
            <div className="tl-meta">
              <span className="tl-type-badge" style={{background:TYPE_COLORS[ev.type]+'22',color:TYPE_COLORS[ev.type]}}>
                {TYPE_LABELS[ev.type] || ev.type}
              </span>
              <span style={{fontSize:11,color:'var(--text3)',marginLeft:'auto'}}>{timeAgo(ev.date)} · {fmtDate(ev.date?.split('T')[0])}</span>
            </div>
            {ev.subject && <div style={{fontSize:13,fontWeight:600,color:'var(--text)',marginBottom:3}}>{ev.subject}</div>}
            {ev.content && <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.5,whiteSpace:'pre-wrap'}}>{ev.content.slice(0,200)}{ev.content.length>200?'…':''}</div>}
            {ev.body && !ev.content && <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.5}}>{ev.body.slice(0,200)}{ev.body.length>200?'…':''}</div>}
            {ev.value && <div style={{fontSize:12,fontWeight:600,color:'var(--amber)',marginTop:3}}>{eur(ev.value)} · <Badge stage={ev.stage}/></div>}
            {ev.type==='task' && <div style={{marginTop:3}}><span style={{fontSize:11,color:ev.done?'var(--green)':'var(--text3)'}}>{ev.done?'✓ Completada':'⏳ Pendiente'}</span></div>}
          </div>
        </div>
      ))}
    </div>
  );
}

function EmailComposer({contact, onSend, onClose}) {
  const [subject, setSubject] = useState('');
  const [body, setBody] = useState('');
  const [selTemplate, setSelTemplate] = useState('');

  function applyTemplate(idx) {
    const t = EMAIL_TEMPLATES[idx];
    if (!t) return;
    const replace = s => s.replace(/{nombre}/g, contact?.name||'').replace(/{empresa}/g, contact?.company||'');
    setSubject(replace(t.subject));
    setBody(replace(t.body));
    setSelTemplate(idx);
  }

  function send() {
    if (!subject.trim()) { showToast('El asunto es obligatorio','error'); return; }
    if (!body.trim()) { showToast('El cuerpo del email no puede estar vacío','error'); return; }
    // Open mailto as real email client fallback
    if (contact?.email) {
      const mailto = `mailto:${encodeURIComponent(contact.email)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      window.open(mailto, '_blank');
    }
    onSend({subject, body});
    showToast('Email enviado y guardado en historial ✓');
    onClose();
  }

  return (
    <div className="email-compose">
      <div className="email-compose-header">
        <span>✉️</span>
        <span>Nuevo email</span>
        {contact && <span style={{fontSize:11,color:'var(--text3)',marginLeft:4}}>→ {contact.email || contact.name}</span>}
        <div style={{marginLeft:'auto',display:'flex',gap:6}}>
          <select className="toolbar-select" style={{fontSize:11}} value={selTemplate} onChange={e=>applyTemplate(Number(e.target.value))}>
            <option value="">Plantilla...</option>
            {EMAIL_TEMPLATES.map((t,i)=><option key={i} value={i}>{t.name}</option>)}
          </select>
          <button className="btn btn-ghost btn-sm" onClick={onClose} style={{fontSize:16,padding:'2px 6px'}}>✕</button>
        </div>
      </div>
      <div className="email-field"><span className="email-field-label">Para:</span>
        <span className="email-field-input" style={{color:'var(--text3)'}}>{contact?.email || '—'}</span>
      </div>
      <div className="email-field"><span className="email-field-label">Asunto:</span>
        <input className="email-field-input" value={subject} onChange={e=>setSubject(e.target.value)} placeholder="Asunto del email..."/>
      </div>
      <div className="email-body-area">
        <textarea className="email-body-input" value={body} onChange={e=>setBody(e.target.value)} placeholder="Escribe el mensaje..." rows={7}/>
      </div>
      <div style={{padding:'10px 14px',borderTop:'1px solid var(--border)',display:'flex',gap:8,justifyContent:'flex-end',background:'var(--bg3)'}}>
        <span style={{fontSize:11,color:'var(--text3)',alignSelf:'center',flex:1}}>
          {contact?.email ? `Se abrirá tu cliente de email con ${contact.email}` : 'Sin email registrado'}
        </span>
        <button className="btn btn-sm" onClick={onClose}>Cancelar</button>
        <button className="btn btn-accent btn-sm" onClick={send}>📤 Enviar</button>
      </div>
    </div>
  );
}
